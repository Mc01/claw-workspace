<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="none"/>
  <!-- Backpack on body rear -->
  <rect x="130" y="94" width="24" height="30" fill="#1a1a2e"/>
  <rect x="132" y="96" width="20" height="26" fill="#222244"/>
  <!-- Backpack straps -->
  <rect x="128" y="94" width="4" height="30" fill="#333355"/>
  <!-- Screen/display on pack -->
  <rect x="134" y="100" width="14" height="10" fill="#000011"/>
  <rect x="135" y="101" width="12" height="8" fill="#001122"/>
  <!-- Screen data lines -->
  <rect x="136" y="103" width="10" height="1" fill="#00ffff" opacity="0.8"/>
  <rect x="136" y="105" width="8" height="1" fill="#ff00ff" opacity="0.8"/>
  <rect x="136" y="107" width="10" height="1" fill="#00ffff" opacity="0.6"/>
  <!-- Status LED -->
  <rect x="138" y="116" width="4" height="4" fill="#00ff00"/>
  <rect x="136" y="114" width="8" height="8" fill="#00ff00" opacity="0.2"/>
  <!-- Cables from pack -->
  <rect x="128" y="108" width="4" height="2" fill="#ff00ff" opacity="0.7"/>
  <rect x="124" y="108" width="6" height="2" fill="#ff00ff" opacity="0.5"/>
</svg>
