<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="none"/>
  <!-- Neon bomb held/carried at side -->
  <rect x="130" y="108" width="22" height="22" fill="#1a0030"/>
  <rect x="132" y="110" width="18" height="18" fill="#220040"/>
  <!-- Bomb casing detail -->
  <rect x="134" y="112" width="14" height="14" fill="#2a0050"/>
  <!-- Neon hazard stripes -->
  <rect x="130" y="114" width="22" height="4" fill="#ff00ff" opacity="0.6"/>
  <rect x="130" y="122" width="22" height="4" fill="#ff00ff" opacity="0.6"/>
  <!-- Fuse / wire -->
  <rect x="140" y="106" width="4" height="4" fill="#888800"/>
  <rect x="142" y="100" width="4" height="8" fill="#999900"/>
  <rect x="140" y="96" width="4" height="6" fill="#888800"/>
  <!-- Fuse spark -->
  <rect x="138" y="92" width="8" height="8" fill="#ffff00"/>
  <rect x="136" y="90" width="12" height="12" fill="#ffff00" opacity="0.25"/>
  <rect x="142" y="88" width="4" height="6" fill="#ffffff" opacity="0.6"/>
  <!-- Timer LED on bomb -->
  <rect x="136" y="116" width="6" height="6" fill="#ff0000"/>
  <rect x="134" y="114" width="10" height="10" fill="#ff0000" opacity="0.2"/>
</svg>
