<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="none"/>
  <!-- Data transmission horns on head -->
  <!-- Left horn -->
  <rect x="68" y="28" width="8" height="12" fill="#220044"/>
  <rect x="66" y="18" width="8" height="12" fill="#2a004a"/>
  <rect x="64" y="10" width="6" height="10" fill="#330055"/>
  <!-- Right horn -->
  <rect x="114" y="28" width="8" height="12" fill="#220044"/>
  <rect x="116" y="18" width="8" height="12" fill="#2a004a"/>
  <rect x="118" y="10" width="6" height="10" fill="#330055"/>
  <!-- Horn neon tips -->
  <rect x="64" y="6" width="8" height="6" fill="#ff00ff"/>
  <rect x="62" y="4" width="12" height="10" fill="#ff00ff" opacity="0.25"/>
  <rect x="118" y="6" width="8" height="6" fill="#cc00ff"/>
  <rect x="116" y="4" width="12" height="10" fill="#cc00ff" opacity="0.25"/>
  <!-- Data signal arcs between horns -->
  <rect x="72" y="12" width="6" height="2" fill="#00ffff" opacity="0.6"/>
  <rect x="82" y="8" width="6" height="2" fill="#00ffff" opacity="0.5"/>
  <rect x="92" y="6" width="6" height="2" fill="#00ffff" opacity="0.4"/>
  <rect x="102" y="6" width="6" height="2" fill="#00ffff" opacity="0.4"/>
  <rect x="112" y="8" width="6" height="2" fill="#00ffff" opacity="0.5"/>
</svg>
