<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Accessory: Cyber Collar</title>
  <!-- Collar band around neck area -->
  <rect x="8" y="13" width="8" height="2" fill="#37474f"/>
  <rect x="7" y="14" width="1" height="1" fill="#455a64"/>
  <rect x="16" y="14" width="1" height="1" fill="#455a64"/>
  <!-- LED strip -->
  <rect x="9" y="13" width="1" height="1" fill="#00e5ff"/>
  <rect x="11" y="13" width="1" height="1" fill="#00ffff"/>
  <rect x="13" y="13" width="1" height="1" fill="#00e5ff"/>
  <rect x="15" y="13" width="1" height="1" fill="#00ffff"/>
  <!-- Power indicator -->
  <rect x="12" y="14" width="2" height="1" fill="#00e5ff"/>
  <rect x="12" y="14" width="1" height="1" fill="#80ffff"/>
  <!-- Edge glow -->
  <rect x="8" y="12" width="8" height="1" fill="#00e5ff" opacity="0.15"/>
  <rect x="8" y="15" width="8" height="1" fill="#00e5ff" opacity="0.15"/>
</svg>
