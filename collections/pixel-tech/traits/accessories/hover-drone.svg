<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Accessory: Hover Drone</title>
  <!-- Drone body -->
  <rect x="22" y="4" width="4" height="2" fill="#37474f"/>
  <rect x="21" y="5" width="6" height="2" fill="#455a64"/>
  <rect x="22" y="7" width="4" height="1" fill="#37474f"/>
  <!-- Rotors -->
  <rect x="19" y="3" width="3" height="1" fill="#607d8b"/>
  <rect x="26" y="3" width="3" height="1" fill="#607d8b"/>
  <!-- Rotor blur -->
  <rect x="19" y="2" width="3" height="1" fill="#00e5ff" opacity="0.3"/>
  <rect x="26" y="2" width="3" height="1" fill="#00e5ff" opacity="0.3"/>
  <!-- Camera eye -->
  <rect x="23" y="6" width="2" height="1" fill="#00ffff"/>
  <!-- LED indicators -->
  <rect x="22" y="4" width="1" height="1" fill="#00e5ff"/>
  <rect x="25" y="4" width="1" height="1" fill="#00e5ff"/>
  <!-- Signal beam down -->
  <rect x="24" y="8" width="1" height="2" fill="#00e5ff" opacity="0.3"/>
  <rect x="24" y="10" width="1" height="1" fill="#00e5ff" opacity="0.15"/>
</svg>
