<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Accessory: Shield Matrix</title>
  <!-- Hex shield outline -->
  <rect x="2" y="6" width="6" height="1" fill="#00e5ff" opacity="0.6"/>
  <rect x="1" y="7" width="1" height="4" fill="#00e5ff" opacity="0.6"/>
  <rect x="8" y="7" width="1" height="4" fill="#00e5ff" opacity="0.6"/>
  <rect x="2" y="11" width="6" height="1" fill="#00e5ff" opacity="0.6"/>
  <rect x="1" y="11" width="1" height="3" fill="#00e5ff" opacity="0.4"/>
  <rect x="8" y="11" width="1" height="3" fill="#00e5ff" opacity="0.4"/>
  <rect x="2" y="14" width="6" height="1" fill="#00e5ff" opacity="0.4"/>
  <!-- Shield interior -->
