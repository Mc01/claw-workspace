  <rect x="3" y="12" width="1" height="1" fill="#00ffff" opacity="0.3"/>
  <rect x="5" y="12" width="1" height="1" fill="#00ffff" opacity="0.3"/>
  <rect x="7" y="12" width="1" height="1" fill="#00ffff" opacity="0.3"/>
