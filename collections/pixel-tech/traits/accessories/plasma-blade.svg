<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Accessory: Plasma Blade</title>
  <!-- Handle -->
  <rect x="4" y="18" width="2" height="4" fill="#455a64"/>
  <rect x="4" y="17" width="2" height="1" fill="#607d8b"/>
  <rect x="4" y="22" width="2" height="1" fill="#607d8b"/>
  <!-- Guard -->
  <rect x="3" y="16" width="4" height="1" fill="#546e7a"/>
  <!-- Blade - glowing plasma -->
  <rect x="4" y="6" width="2" height="2" fill="#00ffff"/>
  <rect x="4" y="8" width="2" height="2" fill="#00e5ff"/>
  <rect x="4" y="10" width="2" height="2" fill="#00e5ff"/>
  <rect x="4" y="12" width="2" height="2" fill="#00bcd4"/>
  <rect x="4" y="14" width="2" height="2" fill="#0097a7"/>
  <!-- Blade tip -->
  <rect x="4" y="5" width="1" height="1" fill="#80ffff"/>
  <!-- Glow aura -->
  <rect x="3" y="7" width="1" height="8" fill="#00e5ff" opacity="0.2"/>
  <rect x="6" y="7" width="1" height="8" fill="#00e5ff" opacity="0.2"/>
  <!-- Core line -->
  <rect x="5" y="6" width="1" height="10" fill="#ffffff" opacity="0.3"/>
</svg>
