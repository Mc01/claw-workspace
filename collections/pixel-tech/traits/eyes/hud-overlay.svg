<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Eyes: HUD Overlay</title>
  <!-- Main eye -->
  <rect x="8" y="8" width="3" height="2" fill="#00ffff"/>
  <rect x="9" y="8" width="1" height="1" fill="#ffffff"/>
  <!-- HUD frame around eye -->
  <rect x="6" y="6" width="8" height="1" fill="#00e5ff" opacity="0.4"/>
  <rect x="6" y="11" width="8" height="1" fill="#00e5ff" opacity="0.4"/>
  <rect x="6" y="6" width="1" height="6" fill="#00e5ff" opacity="0.4"/>
  <rect x="13" y="6" width="1" height="6" fill="#00e5ff" opacity="0.4"/>
  <!-- Data readout bars -->
  <rect x="7" y="6" width="2" height="1" fill="#00ffff" opacity="0.6"/>
  <rect x="7" y="11" width="3" height="1" fill="#00bcd4" opacity="0.5"/>
  <!-- Status indicators -->
  <rect x="12" y="6" width="1" height="1" fill="#00ffff"/>
  <rect x="11" y="6" width="1" height="1" fill="#0097a7"/>
  <!-- Percentage bar -->
  <rect x="14" y="8" width="1" height="1" fill="#00e5ff" opacity="0.5"/>
  <rect x="14" y="9" width="1" height="1" fill="#00bcd4" opacity="0.5"/>
</svg>
