<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Eyes: Glitch Eye</title>
  <!-- Main eye -->
  <rect x="8" y="8" width="3" height="2" fill="#00e5ff"/>
  <rect x="9" y="8" width="1" height="1" fill="#ffffff"/>
  <!-- Glitch fragments - shifted copies -->
  <rect x="7" y="7" width="3" height="1" fill="#ff0040" opacity="0.5"/>
  <rect x="9" y="10" width="3" height="1" fill="#00e5ff" opacity="0.5"/>
  <rect x="11" y="8" width="2" height="1" fill="#ff0040" opacity="0.3"/>
  <rect x="6" y="9" width="2" height="1" fill="#00ffff" opacity="0.3"/>
  <!-- Scan lines -->
  <rect x="7" y="7" width="5" height="1" fill="#ffffff" opacity="0.1"/>
  <rect x="7" y="9" width="5" height="1" fill="#ffffff" opacity="0.1"/>
  <!-- Static noise -->
  <rect x="12" y="7" width="1" height="1" fill="#00e5ff" opacity="0.4"/>
  <rect x="6" y="8" width="1" height="1" fill="#ff0040" opacity="0.2"/>
</svg>
