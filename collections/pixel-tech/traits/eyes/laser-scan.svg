<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Eyes: Laser Scan</title>
  <!-- Main eye - enhanced with laser -->
  <rect x="8" y="8" width="3" height="2" fill="#00ffff"/>
  <rect x="9" y="8" width="1" height="1" fill="#ffffff"/>
  <!-- Laser beam projecting forward -->
  <rect x="5" y="8" width="3" height="1" fill="#00e5ff" opacity="0.8"/>
  <rect x="2" y="8" width="3" height="1" fill="#00e5ff" opacity="0.5"/>
  <rect x="0" y="8" width="2" height="1" fill="#00e5ff" opacity="0.3"/>
  <!-- Scan reticle -->
  <rect x="3" y="7" width="1" height="1" fill="#00ffff" opacity="0.4"/>
  <rect x="3" y="9" width="1" height="1" fill="#00ffff" opacity="0.4"/>
  <rect x="1" y="8" width="1" height="1" fill="#00ffff" opacity="0.3"/>
  <!-- Glow around eye -->
  <rect x="7" y="7" width="1" height="1" fill="#00e5ff" opacity="0.3"/>
  <rect x="11" y="7" width="1" height="1" fill="#00e5ff" opacity="0.3"/>
  <rect x="7" y="10" width="1" height="1" fill="#00e5ff" opacity="0.3"/>
  <rect x="11" y="10" width="1" height="1" fill="#00e5ff" opacity="0.3"/>
</svg>
