<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Eyes: Target Lock</title>
  <!-- Targeting reticle -->
  <rect x="8" y="7" width="4" height="4" fill="none"/>
  <!-- Crosshair horizontal -->
  <rect x="6" y="9" width="2" height="1" fill="#00e5ff" opacity="0.7"/>
  <rect x="12" y="9" width="2" height="1" fill="#00e5ff" opacity="0.7"/>
  <!-- Crosshair vertical -->
  <rect x="10" y="6" width="1" height="2" fill="#00e5ff" opacity="0.7"/>
  <rect x="10" y="11" width="1" height="2" fill="#00e5ff" opacity="0.7"/>
  <!-- Target center -->
  <rect x="9" y="8" width="2" height="2" fill="#ff0040"/>
  <rect x="10" y="9" width="1" height="1" fill="#ffffff"/>
  <!-- Corner brackets -->
  <rect x="7" y="7" width="2" height="1" fill="#00ffff"/>
  <rect x="7" y="7" width="1" height="2" fill="#00ffff"/>
  <rect x="12" y="7" width="1" height="2" fill="#00ffff"/>
  <rect x="11" y="7" width="2" height="1" fill="#00ffff"/>
  <rect x="7" y="10" width="1" height="2" fill="#00ffff"/>
  <rect x="7" y="11" width="2" height="1" fill="#00ffff"/>
  <rect x="12" y="10" width="1" height="2" fill="#00ffff"/>
  <rect x="11" y="11" width="2" height="1" fill="#00ffff"/>
</svg>
