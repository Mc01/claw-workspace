<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Eyes: Binary Iris</title>
  <!-- Eye socket -->
  <rect x="8" y="7" width="4" height="3" fill="#0d1b3e"/>
  <!-- Iris ring -->
  <rect x="9" y="7" width="2" height="1" fill="#00bcd4"/>
  <rect x="8" y="8" width="1" height="1" fill="#00bcd4"/>
  <rect x="11" y="8" width="1" height="1" fill="#00bcd4"/>
  <rect x="9" y="9" width="2" height="1" fill="#00bcd4"/>
  <!-- Binary pupil - 1/0 pattern -->
  <rect x="9" y="8" width="1" height="1" fill="#00ffff"/>
  <rect x="10" y="8" width="1" height="1" fill="#0d1b3e"/>
  <!-- Binary stream overlay -->
  <rect x="8" y="7" width="1" height="1" fill="#00e5ff" opacity="0.3"/>
  <rect x="11" y="9" width="1" height="1" fill="#00e5ff" opacity="0.3"/>
  <!-- Highlight -->
  <rect x="9" y="7" width="1" height="1" fill="#80ffff"/>
</svg>
