<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Background: Circuit Board</title>
  <rect width="32" height="32" fill="#0a0e1a"/>
  <!-- Horizontal traces -->
  <rect x="0" y="4" width="12" height="1" fill="#0097a7" opacity="0.4"/>
  <rect x="16" y="4" width="16" height="1" fill="#0097a7" opacity="0.4"/>
  <rect x="0" y="12" width="8" height="1" fill="#00bcd4" opacity="0.3"/>
  <rect x="20" y="12" width="12" height="1" fill="#00bcd4" opacity="0.3"/>
  <rect x="4" y="20" width="24" height="1" fill="#0097a7" opacity="0.4"/>
  <rect x="0" y="28" width="16" height="1" fill="#00bcd4" opacity="0.3"/>
  <!-- Vertical traces -->
  <rect x="4" y="0" width="1" height="8" fill="#0097a7" opacity="0.4"/>
  <rect x="12" y="4" width="1" height="16" fill="#00bcd4" opacity="0.3"/>
  <rect x="20" y="8" width="1" height="12" fill="#0097a7" opacity="0.4"/>
  <rect x="28" y="0" width="1" height="12" fill="#00bcd4" opacity="0.3"/>
  <!-- Junction nodes -->
  <rect x="4" y="4" width="2" height="2" fill="#00e5ff" opacity="0.6"/>
  <rect x="12" y="4" width="2" height="2" fill="#00e5ff" opacity="0.6"/>
  <rect x="12" y="12" width="2" height="2" fill="#00ffff" opacity="0.5"/>
  <rect x="20" y="12" width="2" height="2" fill="#00e5ff" opacity="0.6"/>
  <rect x="12" y="20" width="2" height="2" fill="#00e5ff" opacity="0.6"/>
  <rect x="20" y="20" width="2" height="2" fill="#00ffff" opacity="0.5"/>
  <rect x="4" y="20" width="2" height="2" fill="#00e5ff" opacity="0.6"/>
  <rect x="28" y="4" width="2" height="2" fill="#00ffff" opacity="0.5"/>
</svg>
