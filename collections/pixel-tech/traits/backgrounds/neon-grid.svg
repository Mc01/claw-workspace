<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Background: Neon Grid</title>
  <rect width="32" height="32" fill="#060818"/>
  <!-- Perspective grid lines - horizontal -->
  <rect x="0" y="24" width="32" height="1" fill="#00e5ff" opacity="0.6"/>
  <rect x="2" y="26" width="28" height="1" fill="#00bcd4" opacity="0.4"/>
  <rect x="4" y="28" width="24" height="1" fill="#0097a7" opacity="0.3"/>
  <rect x="6" y="30" width="20" height="1" fill="#00838f" opacity="0.2"/>
  <!-- Vertical grid lines -->
  <rect x="4" y="24" width="1" height="8" fill="#00e5ff" opacity="0.3"/>
  <rect x="10" y="24" width="1" height="8" fill="#00e5ff" opacity="0.3"/>
  <rect x="16" y="24" width="1" height="8" fill="#00e5ff" opacity="0.4"/>
  <rect x="22" y="24" width="1" height="8" fill="#00e5ff" opacity="0.3"/>
  <rect x="28" y="24" width="1" height="8" fill="#00e5ff" opacity="0.3"/>
  <!-- Horizon glow -->
  <rect x="0" y="22" width="32" height="2" fill="#00e5ff" opacity="0.1"/>
  <rect x="0" y="23" width="32" height="1" fill="#00e5ff" opacity="0.2"/>
  <!-- Stars -->
  <rect x="3" y="2" width="1" height="1" fill="#80ffff" opacity="0.6"/>
  <rect x="15" y="5" width="1" height="1" fill="#80ffff" opacity="0.4"/>
  <rect x="25" y="3" width="1" height="1" fill="#80ffff" opacity="0.5"/>
  <rect x="9" y="8" width="1" height="1" fill="#80ffff" opacity="0.3"/>
  <rect x="28" y="10" width="1" height="1" fill="#80ffff" opacity="0.4"/>
  <rect x="19" y="1" width="1" height="1" fill="#80ffff" opacity="0.6"/>
</svg>
