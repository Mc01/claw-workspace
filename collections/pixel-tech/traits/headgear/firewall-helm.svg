<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Headgear: Firewall Helm</title>
  <!-- Helmet shell -->
  <rect x="6" y="3" width="8" height="2" fill="#37474f"/>
  <rect x="5" y="5" width="10" height="2" fill="#455a64"/>
  <rect x="6" y="7" width="8" height="1" fill="#37474f"/>
  <!-- Face shield -->
  <rect x="6" y="7" width="6" height="2" fill="#00bcd4" opacity="0.5"/>
  <!-- Firewall glyph -->
  <rect x="8" y="3" width="1" height="1" fill="#00e5ff"/>
  <rect x="10" y="3" width="1" height="1" fill="#00e5ff"/>
  <rect x="9" y="4" width="1" height="1" fill="#00ffff"/>
  <rect x="7" y="4" width="1" height="1" fill="#0097a7"/>
  <rect x="11" y="4" width="1" height="1" fill="#0097a7"/>
  <!-- Vent slots -->
  <rect x="13" y="5" width="1" height="1" fill="#00e5ff" opacity="0.4"/>
  <rect x="13" y="6" width="1" height="1" fill="#00e5ff" opacity="0.4"/>
  <!-- Edge trim -->
  <rect x="5" y="5" width="1" height="1" fill="#00bcd4"/>
  <rect x="14" y="5" width="1" height="1" fill="#00bcd4"/>
</svg>
