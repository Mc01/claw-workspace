<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Headgear: Holo Visor</title>
  <!-- Visor band across eyes -->
  <rect x="4" y="7" width="10" height="3" fill="#00bcd4" opacity="0.7"/>
  <rect x="4" y="7" width="10" height="1" fill="#00e5ff" opacity="0.9"/>
  <rect x="4" y="9" width="10" height="1" fill="#0097a7" opacity="0.8"/>
  <!-- Holographic scan line -->
  <rect x="5" y="8" width="8" height="1" fill="#80ffff" opacity="0.5"/>
  <!-- Side mounts -->
  <rect x="3" y="8" width="1" height="1" fill="#546e7a"/>
  <rect x="14" y="8" width="1" height="1" fill="#546e7a"/>
  <!-- HUD elements -->
  <rect x="5" y="7" width="1" height="1" fill="#00ffff"/>
  <rect x="7" y="7" width="2" height="1" fill="#00ffff" opacity="0.6"/>
  <rect x="12" y="7" width="1" height="1" fill="#00ffff"/>
</svg>
