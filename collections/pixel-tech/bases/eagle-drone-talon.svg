<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Eagle - Drone Talon</title>
  <!-- Head facing left -->
  <rect x="4" y="8" width="2" height="2" fill="#1a237e"/>
  <rect x="6" y="8" width="2" height="2" fill="#0d1b3e"/>
  <rect x="8" y="8" width="2" height="2" fill="#1a237e"/>
  <rect x="6" y="6" width="2" height="2" fill="#1a237e"/>
  <rect x="8" y="6" width="2" height="2" fill="#0d1b3e"/>
  <rect x="10" y="6" width="2" height="2" fill="#1a237e"/>
  <rect x="10" y="8" width="2" height="2" fill="#0d1b3e"/>
  <!-- Eye -->
  <rect x="6" y="7" width="2" height="1" fill="#00ffff"/>
  <rect x="6" y="8" width="1" height="1" fill="#80ffff"/>
  <!-- Beak -->
  <rect x="2" y="9" width="2" height="1" fill="#b3e5fc"/>
  <rect x="4" y="9" width="2" height="2" fill="#80deea"/>
  <rect x="3" y="10" width="1" height="1" fill="#e0f7fa"/>
  <!-- Crown feathers -->
  <rect x="10" y="4" width="2" height="2" fill="#00e5ff"/>
  <rect x="12" y="4" width="2" height="2" fill="#00bcd4"/>
  <rect x="12" y="6" width="2" height="2" fill="#0097a7"/>
  <!-- Body -->
  <rect x="10" y="10" width="2" height="2" fill="#1a237e"/>
  <rect x="12" y="8" width="2" height="2" fill="#1a237e"/>
  <rect x="12" y="10" width="2" height="2" fill="#0d1b3e"/>
  <rect x="14" y="10" width="2" height="2" fill="#1a237e"/>
  <rect x="14" y="12" width="2" height="2" fill="#0d1b3e"/>
  <rect x="12" y="12" width="2" height="2" fill="#1a237e"/>
  <rect x="10" y="12" width="2" height="2" fill="#0d1b3e"/>
  <rect x="8" y="10" width="2" height="2" fill="#1a237e"/>
  <rect x="8" y="12" width="2" height="2" fill="#0d1b3e"/>
  <!-- Drone wing -->
  <rect x="14" y="6" width="2" height="2" fill="#0097a7"/>
  <rect x="16" y="4" width="2" height="2" fill="#00bcd4"/>
  <rect x="18" y="4" width="2" height="2" fill="#00e5ff"/>
  <rect x="20" y="4" width="2" height="2" fill="#00bcd4"/>
  <rect x="22" y="4" width="2" height="2" fill="#0097a7"/>
  <rect x="16" y="6" width="2" height="2" fill="#1a237e"/>
  <rect x="18" y="6" width="2" height="2" fill="#0d1b3e"/>
  <rect x="20" y="6" width="2" height="1" fill="#00e5ff" opacity="0.5"/>
  <!-- Wing rivets -->
  <rect x="15" y="7" width="1" height="1" fill="#00ffff"/>
  <rect x="19" y="5" width="1" height="1" fill="#00ffff"/>
  <!-- Legs -->
  <rect x="10" y="14" width="2" height="2" fill="#1a237e"/>
  <rect x="10" y="16" width="2" height="2" fill="#0d1b3e"/>
  <rect x="14" y="14" width="2" height="2" fill="#1a237e"/>
  <rect x="14" y="16" width="2" height="2" fill="#0d1b3e"/>
  <!-- Talons -->
  <rect x="8" y="18" width="2" height="2" fill="#00bcd4"/>
  <rect x="10" y="18" width="2" height="2" fill="#00e5ff"/>
  <rect x="12" y="18" width="2" height="2" fill="#00bcd4"/>
  <rect x="14" y="18" width="2" height="2" fill="#00e5ff"/>
  <rect x="16" y="18" width="2" height="2" fill="#00bcd4"/>
  <rect x="8" y="20" width="1" height="1" fill="#e0f7fa"/>
  <rect x="12" y="20" width="1" height="1" fill="#e0f7fa"/>
  <rect x="16" y="20" width="1" height="1" fill="#e0f7fa"/>
  <!-- Tail -->
  <rect x="16" y="12" width="2" height="2" fill="#1a237e"/>
  <rect x="18" y="12" width="2" height="2" fill="#0d1b3e"/>
  <rect x="20" y="10" width="2" height="2" fill="#0097a7"/>
</svg>
