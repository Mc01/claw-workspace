<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Beetle - Circuit Shell</title>
  <!-- Head facing left -->
  <rect x="6" y="12" width="2" height="2" fill="#1a237e"/>
  <rect x="8" y="12" width="2" height="2" fill="#0d1b3e"/>
  <rect x="6" y="14" width="2" height="2" fill="#0d1b3e"/>
  <rect x="8" y="14" width="2" height="2" fill="#1a237e"/>
  <!-- Compound eye -->
  <rect x="6" y="12" width="1" height="1" fill="#00ffff"/>
  <rect x="7" y="13" width="1" height="1" fill="#80ffff"/>
  <!-- Mandibles -->
  <rect x="4" y="14" width="2" height="1" fill="#00bcd4"/>
  <rect x="4" y="15" width="1" height="1" fill="#00e5ff"/>
  <rect x="5" y="16" width="1" height="1" fill="#00bcd4"/>
  <!-- Antennae -->
  <rect x="7" y="10" width="1" height="2" fill="#0097a7"/>
  <rect x="6" y="9" width="1" height="1" fill="#00e5ff"/>
  <rect x="5" y="8" width="1" height="1" fill="#00ffff"/>
  <rect x="9" y="10" width="1" height="2" fill="#0097a7"/>
  <rect x="10" y="9" width="1" height="1" fill="#00e5ff"/>
  <rect x="11" y="8" width="1" height="1" fill="#00ffff"/>
  <!-- Thorax -->
  <rect x="10" y="12" width="2" height="2" fill="#1a237e"/>
  <rect x="10" y="14" width="2" height="2" fill="#0d1b3e"/>
  <!-- Shell/Elytra -->
  <rect x="12" y="10" width="2" height="2" fill="#1a237e"/>
  <rect x="14" y="10" width="2" height="2" fill="#0d1b3e"/>
  <rect x="16" y="10" width="2" height="2" fill="#1a237e"/>
  <rect x="12" y="12" width="2" height="2" fill="#0d1b3e"/>
  <rect x="14" y="12" width="2" height="2" fill="#1a237e"/>
  <rect x="16" y="12" width="2" height="2" fill="#0d1b3e"/>
  <rect x="12" y="14" width="2" height="2" fill="#1a237e"/>
  <rect x="14" y="14" width="2" height="2" fill="#0d1b3e"/>
  <rect x="16" y="14" width="2" height="2" fill="#1a237e"/>
  <rect x="18" y="10" width="2" height="2" fill="#0d1b3e"/>
  <rect x="18" y="12" width="2" height="2" fill="#1a237e"/>
  <rect x="18" y="14" width="2" height="2" fill="#0d1b3e"/>
  <!-- Circuit traces on shell -->
  <rect x="13" y="11" width="1" height="1" fill="#00e5ff"/>
  <rect x="14" y="11" width="2" height="1" fill="#00e5ff" opacity="0.6"/>
  <rect x="16" y="11" width="1" height="3" fill="#00e5ff" opacity="0.6"/>
  <rect x="17" y="13" width="2" height="1" fill="#00e5ff" opacity="0.6"/>
  <rect x="19" y="11" width="1" height="1" fill="#00e5ff"/>
  <rect x="13" y="13" width="1" height="1" fill="#00ffff"/>
  <rect x="15" y="15" width="1" height="1" fill="#00ffff"/>
  <rect x="19" y="13" width="1" height="1" fill="#00ffff"/>
  <!-- Shell edge -->
  <rect x="20" y="10" width="1" height="6" fill="#0097a7"/>
  <!-- Legs - 3 pairs -->
  <rect x="10" y="16" width="2" height="2" fill="#1a237e"/>
  <rect x="10" y="18" width="1" height="1" fill="#00bcd4"/>
  <rect x="13" y="16" width="2" height="2" fill="#0d1b3e"/>
  <rect x="13" y="18" width="1" height="1" fill="#00bcd4"/>
  <rect x="16" y="16" width="2" height="2" fill="#1a237e"/>
  <rect x="16" y="18" width="1" height="1" fill="#00bcd4"/>
</svg>
