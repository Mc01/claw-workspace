<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Croc - Metal Jaw</title>
  <!-- Head - long snout facing left -->
  <rect x="2" y="10" width="2" height="2" fill="#0d1b3e"/>
  <rect x="4" y="10" width="2" height="2" fill="#1a237e"/>
  <rect x="6" y="10" width="2" height="2" fill="#1a237e"/>
  <rect x="8" y="10" width="2" height="2" fill="#0d1b3e"/>
  <rect x="10" y="10" width="2" height="2" fill="#1a237e"/>
  <rect x="2" y="12" width="2" height="1" fill="#1a237e"/>
  <rect x="4" y="12" width="2" height="2" fill="#0d1b3e"/>
  <rect x="6" y="12" width="2" height="2" fill="#1a237e"/>
  <rect x="8" y="12" width="2" height="2" fill="#0d1b3e"/>
  <rect x="10" y="12" width="2" height="2" fill="#1a237e"/>
  <!-- Eye ridge -->
  <rect x="8" y="8" width="2" height="2" fill="#1a237e"/>
  <rect x="10" y="8" width="2" height="2" fill="#0d1b3e"/>
  <!-- Eye -->
  <rect x="9" y="9" width="1" height="2" fill="#00ffff"/>
  <rect x="9" y="10" width="1" height="1" fill="#80ffff"/>
  <!-- Metal jaw -->
  <rect x="2" y="13" width="2" height="2" fill="#546e7a"/>
  <rect x="4" y="14" width="2" height="2" fill="#607d8b"/>
  <rect x="6" y="14" width="2" height="2" fill="#546e7a"/>
  <rect x="8" y="14" width="2" height="2" fill="#607d8b"/>
  <rect x="10" y="14" width="2" height="2" fill="#546e7a"/>
  <!-- Metal teeth -->
  <rect x="2" y="12" width="1" height="1" fill="#e0f7fa"/>
  <rect x="4" y="13" width="1" height="1" fill="#b3e5fc"/>
  <rect x="6" y="13" width="1" height="1" fill="#e0f7fa"/>
  <rect x="8" y="13" width="1" height="1" fill="#b3e5fc"/>
  <!-- Jaw rivets -->
  <rect x="3" y="14" width="1" height="1" fill="#00e5ff"/>
  <rect x="7" y="15" width="1" height="1" fill="#00e5ff"/>
  <!-- Armor scales -->
  <rect x="11" y="9" width="1" height="1" fill="#00bcd4" opacity="0.5"/>
  <rect x="9" y="8" width="1" height="1" fill="#00bcd4" opacity="0.5"/>
  <!-- Body -->
  <rect x="12" y="10" width="2" height="2" fill="#1a237e"/>
  <rect x="14" y="10" width="2" height="2" fill="#0d1b3e"/>
  <rect x="12" y="12" width="2" height="2" fill="#0d1b3e"/>
  <rect x="14" y="12" width="2" height="2" fill="#1a237e"/>
  <rect x="16" y="10" width="2" height="2" fill="#1a237e"/>
  <rect x="16" y="12" width="2" height="2" fill="#0d1b3e"/>
  <rect x="18" y="10" width="2" height="2" fill="#0d1b3e"/>
  <rect x="18" y="12" width="2" height="2" fill="#1a237e"/>
  <!-- Dorsal ridges -->
  <rect x="13" y="9" width="1" height="1" fill="#00e5ff"/>
  <rect x="15" y="9" width="1" height="1" fill="#00bcd4"/>
  <rect x="17" y="9" width="1" height="1" fill="#00e5ff"/>
  <rect x="19" y="9" width="1" height="1" fill="#00bcd4"/>
  <!-- Circuit traces -->
  <rect x="13" y="11" width="5" height="1" fill="#00e5ff" opacity="0.4"/>
  <!-- Legs -->
  <rect x="12" y="14" width="2" height="2" fill="#1a237e"/>
  <rect x="12" y="16" width="2" height="2" fill="#0d1b3e"/>
  <rect x="18" y="14" width="2" height="2" fill="#1a237e"/>
  <rect x="18" y="16" width="2" height="2" fill="#0d1b3e"/>
  <!-- Claws -->
  <rect x="12" y="18" width="2" height="1" fill="#00bcd4"/>
  <rect x="18" y="18" width="2" height="1" fill="#00bcd4"/>
  <!-- Tail -->
  <rect x="20" y="10" width="2" height="2" fill="#1a237e"/>
  <rect x="22" y="10" width="2" height="2" fill="#0d1b3e"/>
  <rect x="24" y="10" width="2" height="1" fill="#0097a7"/>
  <rect x="26" y="10" width="1" height="1" fill="#00e5ff"/>
</svg>
