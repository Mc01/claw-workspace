<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <title>Lion - Cyber Mane</title>
  <!-- Mane - neon cyan pixel blocks -->
  <rect x="6" y="4" width="2" height="2" fill="#00e5ff"/>
  <rect x="8" y="2" width="2" height="2" fill="#00bcd4"/>
  <rect x="10" y="2" width="2" height="2" fill="#00e5ff"/>
  <rect x="12" y="3" width="2" height="2" fill="#0097a7"/>
  <rect x="4" y="6" width="2" height="2" fill="#00e5ff"/>
  <rect x="6" y="6" width="2" height="2" fill="#00bcd4"/>
  <rect x="14" y="4" width="2" height="2" fill="#00e5ff"/>
  <rect x="14" y="6" width="2" height="2" fill="#0097a7"/>
  <rect x="4" y="8" width="2" height="2" fill="#00bcd4"/>
  <rect x="6" y="8" width="2" height="2" fill="#0097a7"/>
  <rect x="4" y="10" width="2" height="2" fill="#00e5ff"/>
  <rect x="4" y="12" width="2" height="2" fill="#0097a7"/>
  <!-- Head -->
  <rect x="8" y="6" width="2" height="2" fill="#1a237e"/>
  <rect x="10" y="6" width="2" height="2" fill="#1a237e"/>
  <rect x="12" y="6" width="2" height="2" fill="#1a237e"/>
  <rect x="8" y="8" width="2" height="2" fill="#0d1b3e"/>
  <rect x="10" y="8" width="2" height="2" fill="#1a237e"/>
  <rect x="12" y="8" width="2" height="2" fill="#1a237e"/>
  <rect x="8" y="10" width="2" height="2" fill="#1a237e"/>
  <rect x="10" y="10" width="2" height="2" fill="#0d1b3e"/>
  <rect x="12" y="10" width="2" height="2" fill="#1a237e"/>
  <rect x="6" y="10" width="2" height="2" fill="#1a237e"/>
  <!-- Eye -->
  <rect x="10" y="7" width="2" height="1" fill="#00ffff"/>
  <rect x="10" y="8" width="1" height="1" fill="#80ffff"/>
  <!-- Snout -->
  <rect x="6" y="11" width="2" height="1" fill="#0d47a1"/>
  <rect x="8" y="11" width="1" height="1" fill="#00e5ff"/>
  <rect x="8" y="12" width="2" height="2" fill="#1a237e"/>
  <rect x="10" y="12" width="2" height="2" fill="#0d1b3e"/>
  <rect x="12" y="12" width="2" height="1" fill="#1a237e"/>
  <rect x="6" y="13" width="2" height="1" fill="#0d1b3e"/>
  <rect x="8" y="14" width="2" height="2" fill="#1a237e"/>
  <!-- Ear -->
  <rect x="10" y="4" width="2" height="2" fill="#1a237e"/>
  <rect x="11" y="4" width="1" height="1" fill="#00e5ff"/>
  <!-- Body -->
  <rect x="10" y="14" width="2" height="2" fill="#0d1b3e"/>
  <rect x="12" y="14" width="2" height="2" fill="#1a237e"/>
  <rect x="14" y="14" width="2" height="2" fill="#1a237e"/>
  <rect x="10" y="16" width="2" height="2" fill="#1a237e"/>
  <rect x="12" y="16" width="2" height="2" fill="#0d1b3e"/>
  <rect x="14" y="16" width="2" height="2" fill="#0d1b3e"/>
  <rect x="16" y="14" width="2" height="2" fill="#0d1b3e"/>
  <rect x="16" y="16" width="2" height="2" fill="#1a237e"/>
  <rect x="18" y="16" width="2" height="2" fill="#0d1b3e"/>
  <!-- Circuit lines on body -->
  <rect x="13" y="15" width="3" height="1" fill="#00e5ff" opacity="0.6"/>
  <rect x="15" y="16" width="1" height="2" fill="#00e5ff" opacity="0.6"/>
  <!-- Legs -->
  <rect x="10" y="18" width="2" height="2" fill="#1a237e"/>
  <rect x="10" y="20" width="2" height="2" fill="#0d1b3e"/>
  <rect x="16" y="18" width="2" height="2" fill="#1a237e"/>
  <rect x="16" y="20" width="2" height="2" fill="#0d1b3e"/>
  <!-- Paws -->
  <rect x="10" y="22" width="2" height="2" fill="#00bcd4"/>
  <rect x="16" y="22" width="2" height="2" fill="#00bcd4"/>
  <!-- Tail -->
  <rect x="18" y="14" width="2" height="2" fill="#1a237e"/>
  <rect x="20" y="12" width="2" height="2" fill="#00e5ff"/>
  <rect x="22" y="10" width="2" height="2" fill="#00bcd4"/>
  <rect x="24" y="10" width="2" height="2" fill="#00e5ff"/>
</svg>
