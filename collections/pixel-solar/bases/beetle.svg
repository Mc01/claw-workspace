<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="256" height="256">
  <!-- Solar Beetle - side profile, 32x32 pixel art (scarab inspired) -->
  <!-- Abdomen -->
  <rect x="4" y="18" width="12" height="10" fill="#E8820C"/>
  <rect x="5" y="19" width="10" height="8" fill="#F5A623"/>
  <!-- Abdomen segments -->
  <rect x="5" y="21" width="10" height="1" fill="#E8820C"/>
  <rect x="5" y="23" width="10" height="1" fill="#E8820C"/>
  <rect x="5" y="25" width="10" height="1" fill="#E8820C"/>
  <!-- Wing covers (elytra) -->
  <rect x="6" y="12" width="14" height="8" fill="#F5A623"/>
  <rect x="7" y="13" width="12" height="6" fill="#FFD07A"/>
  <!-- Elytra sheen / solar pattern -->
  <rect x="9" y="13" width="2" height="6" fill="#F5A623"/>
  <rect x="13" y="13" width="2" height="6" fill="#F5A623"/>
  <!-- Solar disc on back -->
  <rect x="10" y="14" width="4" height="4" fill="#FFE066"/>
  <rect x="11" y="13" width="2" height="1" fill="#FFE066"/>
  <rect x="11" y="17" width="2" height="1" fill="#FFE066"/>
  <rect x="9" y="14" width="1" height="4" fill="#FFE066"/>
  <rect x="14" y="14" width="1" height="4" fill="#FFE066"/>
  <!-- Sun center -->
  <rect x="11" y="15" width="2" height="2" fill="#C0390B"/>
  <!-- Thorax -->
  <rect x="14" y="14" width="6" height="6" fill="#E8820C"/>
  <rect x="15" y="15" width="4" height="4" fill="#F5A623"/>
  <!-- Head -->
  <rect x="19" y="14" width="7" height="6" fill="#F5A623"/>
  <rect x="20" y="15" width="5" height="4" fill="#E8820C"/>
  <!-- Horn (solar ray horn) -->
  <rect x="24" y="10" width="2" height="5" fill="#F5A623"/>
  <rect x="25" y="8" width="2" height="4" fill="#FFD07A"/>
  <rect x="26" y="6" width="2" height="4" fill="#FFE066"/>
  <rect x="23" y="12" width="2" height="3" fill="#E8820C"/>
  <!-- Secondary horn -->
  <rect x="22" y="11" width="2" height="4" fill="#F5A623"/>
  <rect x="21" y="9" width="2" height="4" fill="#FFD07A"/>
  <!-- Eye -->
  <rect x="21" y="15" width="2" height="2" fill="#FFE066"/>
  <rect x="22" y="15" width="1" height="1" fill="#000000"/>
  <!-- Antennae -->
  <rect x="25" y="14" width="1" height="3" fill="#E8820C"/>
  <rect x="26" y="13" width="1" height="2" fill="#F5A623"/>
  <rect x="27" y="12" width="2" height="2" fill="#FFD07A"/>
  <rect x="29" y="11" width="2" height="2" fill="#E8820C"/>
  <!-- Legs - 3 pairs (beetle style) -->
  <!-- Front legs -->
  <rect x="18" y="19" width="2" height="5" fill="#E8820C"/>
  <rect x="17" y="23" width="4" height="2" fill="#F5A623"/>
  <!-- Mid legs -->
  <rect x="12" y="21" width="2" height="5" fill="#E8820C"/>
  <rect x="10" y="24" width="4" height="2" fill="#F5A623"/>
  <!-- Back legs -->
  <rect x="6" y="23" width="2" height="5" fill="#E8820C"/>
  <rect x="4" y="26" width="4" height="2" fill="#F5A623"/>
  <!-- Leg claws -->
  <rect x="16" y="25" width="1" height="1" fill="#FFE066"/>
  <rect x="19" y="25" width="1" height="1" fill="#FFE066"/>
  <rect x="10" y="26" width="1" height="1" fill="#FFE066"/>
  <rect x="4" y="28" width="1" height="1" fill="#FFE066"/>
</svg>
