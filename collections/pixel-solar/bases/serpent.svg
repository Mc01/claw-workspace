<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="256" height="256">
  <!-- Solar Serpent - side profile, 32x32 pixel art -->
  <!-- Tail tip -->
  <rect x="1" y="24" width="2" height="2" fill="#FFD07A"/>
  <!-- Tail body -->
  <rect x="2" y="22" width="3" height="3" fill="#F5A623"/>
  <rect x="4" y="20" width="3" height="4" fill="#F5A623"/>
  <!-- Mid coil -->
  <rect x="6" y="18" width="4" height="4" fill="#E8820C"/>
  <rect x="9" y="16" width="4" height="4" fill="#F5A623"/>
  <!-- Scale stripe -->
  <rect x="6" y="19" width="4" height="1" fill="#FFD07A"/>
  <rect x="9" y="17" width="4" height="1" fill="#FFD07A"/>
  <!-- Upper coil -->
  <rect x="12" y="14" width="4" height="4" fill="#E8820C"/>
  <rect x="15" y="12" width="4" height="4" fill="#F5A623"/>
  <rect x="12" y="15" width="4" height="1" fill="#FFD07A"/>
  <rect x="15" y="13" width="4" height="1" fill="#FFD07A"/>
  <!-- Neck -->
  <rect x="18" y="10" width="4" height="4" fill="#F5A623"/>
  <rect x="18" y="11" width="4" height="1" fill="#FFD07A"/>
  <!-- Head -->
  <rect x="20" y="7" width="8" height="5" fill="#F5A623"/>
  <rect x="21" y="6" width="6" height="2" fill="#F5A623"/>
  <!-- Snout / jaw -->
  <rect x="26" y="8" width="4" height="3" fill="#FFD07A"/>
  <rect x="28" y="10" width="3" height="2" fill="#E8820C"/>
  <!-- Forked tongue -->
  <rect x="30" y="9" width="1" height="1" fill="#C0390B"/>
  <rect x="31" y="8" width="1" height="1" fill="#C0390B"/>
  <rect x="31" y="10" width="1" height="1" fill="#C0390B"/>
  <!-- Eye -->
  <rect x="23" y="7" width="2" height="2" fill="#FFE066"/>
  <rect x="24" y="7" width="1" height="1" fill="#000000"/>
  <!-- Solar crest/frill -->
  <rect x="20" y="4" width="2" height="4" fill="#E8820C"/>
  <rect x="22" y="3" width="2" height="4" fill="#F5A623"/>
  <rect x="24" y="2" width="2" height="5" fill="#FFD07A"/>
  <rect x="26" y="3" width="2" height="4" fill="#F5A623"/>
  <rect x="28" y="4" width="2" height="3" fill="#E8820C"/>
  <!-- Frill glow tips -->
  <rect x="24" y="1" width="2" height="1" fill="#FFE066"/>
  <rect x="22" y="2" width="2" height="1" fill="#FFE066"/>
  <rect x="26" y="2" width="2" height="1" fill="#FFE066"/>
  <!-- Scale detail on body -->
  <rect x="5" y="20" width="1" height="1" fill="#C0390B"/>
  <rect x="10" y="16" width="1" height="1" fill="#C0390B"/>
  <rect x="13" y="14" width="1" height="1" fill="#C0390B"/>
  <rect x="16" y="12" width="1" height="1" fill="#C0390B"/>
</svg>
