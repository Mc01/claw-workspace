<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="256" height="256">
  <!-- Solar Croc - side profile, 32x32 pixel art -->
  <!-- Tail -->
  <rect x="1" y="19" width="3" height="3" fill="#FFD07A"/>
  <rect x="2" y="18" width="2" height="4" fill="#F5A623"/>
  <rect x="3" y="17" width="3" height="5" fill="#F5A623"/>
  <rect x="5" y="16" width="3" height="6" fill="#E8820C"/>
  <!-- Tail spines -->
  <rect x="2" y="17" width="1" height="2" fill="#FFD07A"/>
  <rect x="4" y="16" width="1" height="2" fill="#FFD07A"/>
  <rect x="6" y="15" width="1" height="2" fill="#F5A623"/>
  <!-- Body -->
  <rect x="7" y="17" width="16" height="8" fill="#F5A623"/>
  <rect x="8" y="18" width="14" height="6" fill="#E8820C"/>
  <!-- Belly (lighter underside) -->
  <rect x="9" y="21" width="13" height="4" fill="#FFD07A"/>
  <!-- Dorsal spines / solar plates -->
  <rect x="8" y="13" width="2" height="5" fill="#E8820C"/>
  <rect x="10" y="12" width="2" height="5" fill="#F5A623"/>
  <rect x="12" y="11" width="2" height="6" fill="#FFD07A"/>
  <rect x="14" y="12" width="2" height="5" fill="#F5A623"/>
  <rect x="16" y="13" width="2" height="4" fill="#E8820C"/>
  <rect x="18" y="14" width="2" height="3" fill="#F5A623"/>
  <!-- Spine tips glow -->
  <rect x="12" y="10" width="2" height="1" fill="#FFE066"/>
  <rect x="10" y="11" width="2" height="1" fill="#FFE066"/>
  <rect x="14" y="11" width="2" height="1" fill="#FFE066"/>
  <!-- Head -->
  <rect x="21" y="16" width="8" height="5" fill="#F5A623"/>
  <rect x="20" y="17" width="2" height="4" fill="#F5A623"/>
  <!-- Snout (long) -->
  <rect x="24" y="17" width="7" height="3" fill="#E8820C"/>
  <rect x="27" y="18" width="4" height="4" fill="#FFD07A"/>
  <!-- Teeth -->
  <rect x="25" y="20" width="1" height="2" fill="#FFE066"/>
  <rect x="27" y="20" width="1" height="2" fill="#FFE066"/>
  <rect x="29" y="20" width="1" height="2" fill="#FFE066"/>
  <rect x="31" y="20" width="1" height="2" fill="#FFE066"/>
  <!-- Top teeth -->
  <rect x="26" y="16" width="1" height="2" fill="#FFE066"/>
  <rect x="28" y="16" width="1" height="2" fill="#FFE066"/>
  <rect x="30" y="16" width="1" height="2" fill="#FFE066"/>
  <!-- Eye -->
  <rect x="22" y="15" width="2" height="2" fill="#FFE066"/>
  <rect x="23" y="15" width="1" height="1" fill="#000000"/>
  <!-- Nostril -->
  <rect x="30" y="17" width="1" height="1" fill="#C0390B"/>
  <!-- Legs -->
  <rect x="10" y="24" width="3" height="4" fill="#E8820C"/>
  <rect x="16" y="24" width="3" height="4" fill="#E8820C"/>
  <rect x="21" y="22" width="3" height="5" fill="#F5A623"/>
  <!-- Feet / claws -->
  <rect x="9" y="27" width="5" height="2" fill="#F5A623"/>
  <rect x="15" y="27" width="5" height="2" fill="#F5A623"/>
  <rect x="20" y="26" width="5" height="2" fill="#E8820C"/>
  <!-- Claw tips -->
  <rect x="9" y="28" width="1" height="1" fill="#FFE066"/>
  <rect x="11" y="28" width="1" height="1" fill="#FFE066"/>
  <rect x="13" y="28" width="1" height="1" fill="#FFE066"/>
</svg>
