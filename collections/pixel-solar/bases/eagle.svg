<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="256" height="256">
  <!-- Solar Eagle - side profile, 32x32 pixel art -->
  <!-- Tail feathers -->
  <rect x="1" y="22" width="2" height="5" fill="#FFD07A"/>
  <rect x="3" y="21" width="2" height="6" fill="#F5A623"/>
  <rect x="5" y="20" width="2" height="7" fill="#E8820C"/>
  <rect x="7" y="21" width="2" height="5" fill="#F5A623"/>
  <!-- Body -->
  <rect x="7" y="16" width="14" height="10" fill="#F5A623"/>
  <rect x="9" y="18" width="10" height="7" fill="#E8820C"/>
  <!-- Chest / belly (lighter) -->
  <rect x="17" y="17" width="5" height="8" fill="#FFD07A"/>
  <!-- Wing - upper -->
  <rect x="7" y="10" width="14" height="7" fill="#E8820C"/>
  <rect x="6" y="11" width="14" height="5" fill="#F5A623"/>
  <rect x="5" y="12" width="12" height="3" fill="#E8820C"/>
  <!-- Wing feather tips -->
  <rect x="3" y="13" width="2" height="4" fill="#F5A623"/>
  <rect x="1" y="14" width="2" height="5" fill="#FFD07A"/>
  <rect x="5" y="14" width="2" height="4" fill="#F5A623"/>
  <!-- Wing feather detail -->
  <rect x="7" y="15" width="12" height="1" fill="#FFD07A"/>
  <rect x="8" y="13" width="10" height="1" fill="#FFD07A"/>
  <!-- Neck -->
  <rect x="19" y="13" width="4" height="5" fill="#F5A623"/>
  <!-- Head -->
  <rect x="20" y="8" width="7" height="7" fill="#FFD07A"/>
  <rect x="19" y="9" width="2" height="5" fill="#FFD07A"/>
  <!-- Beak (hooked) -->
  <rect x="26" y="10" width="4" height="3" fill="#F5A623"/>
  <rect x="28" y="12" width="3" height="2" fill="#E8820C"/>
  <rect x="30" y="13" width="2" height="1" fill="#C0390B"/>
  <!-- Eye -->
  <rect x="22" y="9" width="2" height="2" fill="#FFE066"/>
  <rect x="23" y="9" width="1" height="1" fill="#000000"/>
  <!-- Solar crown / crest -->
  <rect x="21" y="5" width="2" height="4" fill="#FFE066"/>
  <rect x="23" y="4" width="2" height="5" fill="#F5A623"/>
  <rect x="25" y="5" width="2" height="4" fill="#FFD07A"/>
  <rect x="23" y="3" width="2" height="1" fill="#FFE066"/>
  <!-- Legs -->
  <rect x="18" y="26" width="3" height="4" fill="#F5A623"/>
  <rect x="22" y="26" width="3" height="4" fill="#F5A623"/>
  <!-- Talons -->
  <rect x="16" y="29" width="2" height="2" fill="#E8820C"/>
  <rect x="18" y="30" width="3" height="1" fill="#E8820C"/>
  <rect x="20" y="29" width="2" height="2" fill="#E8820C"/>
  <rect x="22" y="30" width="3" height="1" fill="#E8820C"/>
  <rect x="24" y="29" width="2" height="2" fill="#E8820C"/>
  <!-- Talon claws -->
  <rect x="16" y="30" width="1" height="1" fill="#FFE066"/>
  <rect x="21" y="30" width="1" height="1" fill="#FFE066"/>
  <rect x="25" y="30" width="1" height="1" fill="#FFE066"/>
</svg>
