<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="256" height="256">
  <!-- Solar Lion - side profile, 32x32 pixel art -->
  <!-- Body -->
  <rect x="8" y="16" width="16" height="10" fill="#F5A623"/>
  <rect x="7" y="17" width="2" height="8" fill="#F5A623"/>
  <rect x="23" y="17" width="2" height="8" fill="#F5A623"/>
  <!-- Belly -->
  <rect x="10" y="20" width="12" height="5" fill="#FFD07A"/>
  <!-- Head -->
  <rect x="18" y="12" width="8" height="7" fill="#F5A623"/>
  <rect x="17" y="13" width="2" height="5" fill="#F5A623"/>
  <!-- Snout -->
  <rect x="24" y="14" width="4" height="4" fill="#FFD07A"/>
  <rect x="27" y="15" width="2" height="2" fill="#E8820C"/>
  <!-- Nose -->
  <rect x="26" y="14" width="2" height="1" fill="#C0390B"/>
  <!-- Eye -->
  <rect x="21" y="13" width="2" height="2" fill="#FFE066"/>
  <rect x="22" y="13" width="1" height="1" fill="#000000"/>
  <!-- Ear -->
  <rect x="21" y="10" width="3" height="3" fill="#F5A623"/>
  <rect x="22" y="11" width="1" height="1" fill="#FFD07A"/>
  <!-- Mane - solar rays -->
  <rect x="14" y="10" width="3" height="3" fill="#E8820C"/>
  <rect x="15" y="9" width="2" height="2" fill="#F5A623"/>
  <rect x="16" y="8" width="2" height="2" fill="#FFD07A"/>
  <rect x="12" y="11" width="3" height="5" fill="#E8820C"/>
  <rect x="11" y="12" width="2" height="4" fill="#C0390B"/>
  <rect x="13" y="9" width="2" height="2" fill="#F5A623"/>
  <rect x="14" y="13" width="4" height="4" fill="#E8820C"/>
  <!-- Front legs -->
  <rect x="10" y="24" width="3" height="5" fill="#F5A623"/>
  <rect x="15" y="24" width="3" height="5" fill="#F5A623"/>
  <!-- Back leg -->
  <rect x="9" y="22" width="3" height="7" fill="#E8820C"/>
  <!-- Paws -->
  <rect x="9" y="28" width="4" height="2" fill="#E8820C"/>
  <rect x="14" y="28" width="4" height="2" fill="#E8820C"/>
  <!-- Tail -->
  <rect x="5" y="17" width="2" height="3" fill="#F5A623"/>
  <rect x="3" y="15" width="2" height="3" fill="#F5A623"/>
  <rect x="4" y="13" width="2" height="3" fill="#FFD07A"/>
  <rect x="3" y="12" width="2" height="2" fill="#E8820C"/>
  <rect x="2" y="11" width="3" height="3" fill="#C0390B"/>
  <!-- Claws -->
  <rect x="9" y="30" width="1" height="1" fill="#FFE066"/>
  <rect x="11" y="30" width="1" height="1" fill="#FFE066"/>
  <rect x="14" y="30" width="1" height="1" fill="#FFE066"/>
  <rect x="16" y="30" width="1" height="1" fill="#FFE066"/>
</svg>
