  <!-- Right wing detail -->
  <rect x="21" y="14" width="8" height="1" fill="#FFD07A"/>
  <rect x="21" y="17" width="8" height="1" fill="#FFD07A"/>
  <rect x="21" y="20" width="8" height="1" fill="#E8820C"/>
