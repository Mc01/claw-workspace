<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="256" height="256">
  <!-- Trait: Solar Eyes - sun symbol eyes -->
  <rect x="10" y="13" width="4" height="4" fill="#FFE066"/>
  <rect x="12" y="12" width="2" height="1" fill="#FFE066"/>
  <rect x="12" y="17" width="2" height="1" fill="#FFE066"/>
  <rect x="9" y="14" width="1" height="2" fill="#FFE066"/>
  <rect x="14" y="14" width="1" height="2" fill="#FFE066"/>
  <!-- Sun center (pupil) -->
  <rect x="11" y="14" width="2" height="2" fill="#F5A623"/>
  <rect x="12" y="14" width="1" height="1" fill="#C0390B"/>
  <!-- Corner rays -->
  <rect x="9" y="12" width="1" height="1" fill="#FFE066"/>
  <rect x="14" y="12" width="1" height="1" fill="#FFE066"/>
  <rect x="9" y="17" width="1" height="1" fill="#FFE066"/>
  <rect x="14" y="17" width="1" height="1" fill="#FFE066"/>
</svg>
