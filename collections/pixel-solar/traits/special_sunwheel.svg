<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="256" height="256">
  <!-- Trait: Sun Wheel - spinning solar disc weapon/orb -->
  <!-- Outer ring -->
  <rect x="10" y="6" width="12" height="2" fill="#FFE066"/>
  <rect x="10" y="24" width="12" height="2" fill="#FFE066"/>
  <rect x="6" y="10" width="2" height="12" fill="#FFE066"/>
  <rect x="24" y="10" width="2" height="12" fill="#FFE066"/>
  <!-- Diagonal ring segments -->
  <rect x="7" y="7" width="3" height="3" fill="#FFD07A"/>
  <rect x="22" y="7" width="3" height="3" fill="#FFD07A"/>
  <rect x="7" y="22" width="3" height="3" fill="#FFD07A"/>
  <rect x="22" y="22" width="3" height="3" fill="#FFD07A"/>
  <!-- Spokes -->
  <rect x="15" y="8" width="2" height="16" fill="#F5A623"/>
  <rect x="8" y="15" width="16" height="2" fill="#F5A623"/>
  <rect x="9" y="9" width="2" height="2" fill="#E8820C"/>
  <rect x="9" y="21" width="2" height="2" fill="#E8820C"/>
  <rect x="21" y="9" width="2" height="2" fill="#E8820C"/>
  <rect x="21" y="21" width="2" height="2" fill="#E8820C"/>
  <!-- Center orb -->
  <rect x="13" y="13" width="6" height="6" fill="#FFE066"/>
  <rect x="14" y="14" width="4" height="4" fill="#FFFFFF"/>
  <rect x="15" y="15" width="2" height="2" fill="#FFE066"/>
</svg>
