<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="256" height="256">
  <!-- Trait: Dawn Aura - soft gradient sunrise glow -->
  <!-- Horizon glow at bottom -->
  <rect x="0" y="28" width="32" height="4" fill="#FF6600" opacity="0.4"/>
  <rect x="0" y="26" width="32" height="3" fill="#FF9900" opacity="0.3"/>
  <rect x="0" y="24" width="32" height="3" fill="#FFD07A" opacity="0.2"/>
  <rect x="0" y="22" width="32" height="3" fill="#FFE066" opacity="0.1"/>
  <!-- Sunrise rays fanning upward -->
  <rect x="13" y="20" width="2" height="8" fill="#FFE066" opacity="0.5"/>
  <rect x="10" y="22" width="2" height="6" fill="#FFD07A" opacity="0.4"/>
  <rect x="16" y="22" width="2" height="6" fill="#FFD07A" opacity="0.4"/>
  <rect x="7" y="24" width="2" height="4" fill="#FF9900" opacity="0.3"/>
  <rect x="19" y="24" width="2" height="4" fill="#FF9900" opacity="0.3"/>
  <rect x="4" y="25" width="2" height="3" fill="#FF6600" opacity="0.3"/>
  <rect x="22" y="25" width="2" height="3" fill="#FF6600" opacity="0.3"/>
  <!-- Pink/rose dawn tints at sides -->
  <rect x="0" y="18" width="4" height="10" fill="#FF4500" opacity="0.2"/>
  <rect x="28" y="18" width="4" height="10" fill="#FF4500" opacity="0.2"/>
  <!-- Soft golden top glow -->
  <rect x="6" y="4" width="20" height="4" fill="#FFE066" opacity="0.15"/>
</svg>
