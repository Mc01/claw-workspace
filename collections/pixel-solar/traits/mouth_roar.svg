<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="256" height="256">
  <!-- Trait: Solar Roar - open roaring mouth with flame breath -->
  <rect x="11" y="18" width="10" height="6" fill="#C0390B"/>
  <rect x="12" y="19" width="8" height="4" fill="#FF4500"/>
  <!-- Teeth top row -->
  <rect x="12" y="18" width="2" height="2" fill="#FFE066"/>
  <rect x="15" y="18" width="2" height="2" fill="#FFE066"/>
  <rect x="18" y="18" width="2" height="2" fill="#FFE066"/>
  <!-- Flame breath -->
  <rect x="20" y="17" width="2" height="3" fill="#FF6600"/>
  <rect x="22" y="16" width="2" height="4" fill="#FF9900"/>
  <rect x="24" y="15" width="2" height="5" fill="#FFD07A"/>
  <rect x="23" y="14" width="1" height="2" fill="#FFE066"/>
  <!-- Tongue -->
  <rect x="14" y="21" width="4" height="3" fill="#FF0033"/>
  <rect x="15" y="23" width="1" height="1" fill="#CC0033"/>
  <rect x="17" y="23" width="1" height="1" fill="#CC0033"/>
</svg>
