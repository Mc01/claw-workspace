<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="256" height="256">
  <!-- Trait: Solar Beam Mouth - firing a beam of light -->
  <rect x="18" y="19" width="4" height="3" fill="#FF9900"/>
  <!-- Beam -->
  <rect x="22" y="20" width="4" height="1" fill="#FFE066"/>
  <rect x="26" y="19" width="4" height="3" fill="#FFD700"/>
  <rect x="26" y="20" width="6" height="1" fill="#FFFFFF"/>
  <!-- Energy charge glow -->
  <rect x="18" y="18" width="4" height="1" fill="#FFE066" opacity="0.7"/>
  <rect x="18" y="22" width="4" height="1" fill="#FFE066" opacity="0.7"/>
  <!-- Lip detail -->
  <rect x="14" y="19" width="4" height="1" fill="#E8820C"/>
  <rect x="14" y="22" width="4" height="1" fill="#C0390B"/>
</svg>
