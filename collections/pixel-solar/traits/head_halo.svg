<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="256" height="256">
  <!-- Trait: Solar Halo - floating ring of light above head -->
  <!-- Halo ring (arc shape in pixel art) -->
  <rect x="11" y="4" width="10" height="2" fill="#FFE066"/>
  <rect x="9" y="5" width="2" height="2" fill="#FFE066"/>
  <rect x="21" y="5" width="2" height="2" fill="#FFE066"/>
  <rect x="8" y="6" width="2" height="1" fill="#FFD700"/>
  <rect x="22" y="6" width="2" height="1" fill="#FFD700"/>
  <!-- Halo glow -->
  <rect x="11" y="3" width="10" height="1" fill="#FFE066" opacity="0.5"/>
  <rect x="11" y="6" width="10" height="1" fill="#FFE066" opacity="0.3"/>
  <!-- Inner halo (gap) -->
  <rect x="12" y="4" width="8" height="2" fill="none"/>
  <!-- Light shafts downward -->
  <rect x="13" y="7" width="1" height="2" fill="#FFE066" opacity="0.4"/>
  <rect x="16" y="7" width="1" height="3" fill="#FFE066" opacity="0.4"/>
  <rect x="19" y="7" width="1" height="2" fill="#FFE066" opacity="0.4"/>
</svg>
