<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="256" height="256">
  <!-- Trait: Solar Markings - tribal sun markings on body -->
  <!-- Forehead mark -->
  <rect x="14" y="8" width="4" height="1" fill="#C0390B"/>
  <rect x="15" y="7" width="2" height="1" fill="#C0390B"/>
  <rect x="15" y="9" width="2" height="1" fill="#C0390B"/>
  <!-- Cheek marks -->
  <rect x="10" y="13" width="3" height="1" fill="#FF6600"/>
  <rect x="11" y="12" width="1" height="3" fill="#FF6600"/>
  <rect x="21" y="13" width="3" height="1" fill="#FF6600"/>
  <rect x="22" y="12" width="1" height="3" fill="#FF6600"/>
  <!-- Shoulder mark (sun disc) -->
  <rect x="7" y="17" width="4" height="4" fill="#F5A623"/>
  <rect x="8" y="18" width="2" height="2" fill="#FFE066"/>
  <rect x="8" y="17" width="2" height="1" fill="#FFE066"/>
  <rect x="8" y="21" width="2" height="1" fill="#FFE066"/>
  <rect x="7" y="18" width="1" height="2" fill="#FFE066"/>
  <rect x="11" y="18" width="1" height="2" fill="#FFE066"/>
  <!-- Flank marks -->
  <rect x="17" y="19" width="5" height="1" fill="#E8820C"/>
  <rect x="18" y="18" width="3" height="3" fill="none" stroke="#E8820C" stroke-width="1"/>
  <rect x="18" y="18" width="1" height="1" fill="#E8820C"/>
  <rect x="20" y="18" width="1" height="1" fill="#E8820C"/>
  <rect x="18" y="20" width="1" height="1" fill="#E8820C"/>
  <rect x="20" y="20" width="1" height="1" fill="#E8820C"/>
  <!-- Leg mark -->
  <rect x="12" y="25" width="4" height="1" fill="#FF6600"/>
  <rect x="13" y="24" width="2" height="3" fill="#FF6600"/>
</svg>
