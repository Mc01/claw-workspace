<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Base Eagle - Ancient Stone Theme -->
  <rect width="32" height="32" fill="#8a7f8d" />
  
  <!-- Stone body -->
  <path d="M12,18 C14,20 18,20 20,18 L20,22 C18,24 14,24 12,22 Z" fill="#7d6d7f" />
  
  <!-- Head -->
  <path d="M16,10 C18,8 22,8 24,10 L24,14 C22,16 18,16 16,14 Z" fill="#8a7f8d" />
  
  <!-- Wings -->
  <path d="M8,16 C6,18 6,22 8,24 L12,20 C10,18 10,16 12,14 Z" fill="#635c68" />
  <path d="M24,16 C26,18 26,22 24,24 L20,20 C22,18 22,16 20,14 Z" fill="#635c68" />
  
  <!-- Bronze beak -->
  <path d="M22,12 L24,10 L26,12 L24,14 Z" fill="#d4a017" />
  
  <!-- Stone texture -->
  <path d="M14,18 L16,20" stroke="#635c68" stroke-width="0.5" />
  <path d="M18,18 L16,20" stroke="#635c68" stroke-width="0.5" />
  
  <!-- Eyes -->
  <circle cx="20" cy="12" r="0.5" fill="#000" />
</svg>