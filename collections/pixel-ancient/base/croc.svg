  <!-- Bronze spikes -->
  <path d="M12,16 L10,14" stroke="#d4a017" stroke-width="1" />
  <path d="M16,16 L14,14" stroke="#d4a017" stroke-width="1" />
  <path d="M20,16 L18,14" stroke="#d4a017" stroke-width="1" />
  
  <!-- Stone texture -->
