<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="none"/>
  <!-- Three horizontal slash marks per cheek — warrior rank marks -->
  <g stroke="#C17F24" stroke-width="3" stroke-linecap="round" opacity="0.95">
    <line x1="18" y1="82" x2="42" y2="87"/>
    <line x1="16" y1="94" x2="40" y2="97"/>
    <line x1="18" y1="106" x2="42" y2="107"/>
    <line x1="158" y1="82" x2="182" y2="87"/>
    <line x1="160" y1="94" x2="184" y2="97"/>
    <line x1="158" y1="106" x2="182" y2="107"/>
  </g>
  <!-- Forehead chevron -->
  <g stroke="#F5A623" stroke-width="2.5" fill="none" stroke-linecap="round">
    <polyline points="80,30 100,22 120,30"/>
    <polyline points="85,40 100,33 115,40"/>
  </g>
  <!-- Chin triangle -->
  <polygon points="100,170 92,188 108,188" fill="none" stroke="#C17F24" stroke-width="2"/>
  <circle cx="100" cy="178" r="3" fill="#F5A623"/>
</svg>
