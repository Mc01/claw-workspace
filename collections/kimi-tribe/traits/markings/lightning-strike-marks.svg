<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="none"/>
  <!-- Lightning bolt war marks -->
  <g fill="#F5A623" opacity="0.9">
    <!-- Left cheek lightning -->
    <polygon points="20,72 30,72 24,90 34,90 18,118 28,90 20,90"/>
    <!-- Right cheek lightning (mirrored) -->
    <polygon points="180,72 170,72 176,90 166,90 182,118 172,90 180,90"/>
    <!-- Forehead single bolt -->
    <polygon points="100,22 106,22 102,36 110,36 96,58 104,36 98,36"/>
  </g>
  <!-- White highlight on lightning -->
  <g fill="#FFF8E7" opacity="0.5">
    <polygon points="21,74 26,74 22,86 28,86 20,102 26,86 22,86"/>
    <polygon points="179,74 174,74 178,86 172,86 180,102 174,86 178,86"/>
  </g>
</svg>
