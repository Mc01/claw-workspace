<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="none"/>
  <!-- Diamond chain scarification patterns -->
  <g fill="#8B4513" stroke="#C17F24" stroke-width="1.5" opacity="0.9">
    <!-- Left temple chain -->
    <polygon points="22,70 30,62 38,70 30,78"/>
    <polygon points="22,88 30,80 38,88 30,96"/>
    <polygon points="22,106 30,98 38,106 30,114"/>
    <!-- Right temple chain -->
    <polygon points="162,70 170,62 178,70 170,78"/>
    <polygon points="162,88 170,80 178,88 170,96"/>
    <polygon points="162,106 170,98 178,106 170,114"/>
    <!-- Nose bridge diamond -->
    <polygon points="100,42 108,50 100,58 92,50"/>
    <!-- Chin diamonds -->
    <polygon points="100,160 108,168 100,176 92,168"/>
  </g>
</svg>
