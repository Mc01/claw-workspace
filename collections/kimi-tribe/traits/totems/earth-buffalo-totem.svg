<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 400" width="120" height="400">
  <defs>
    <filter id="ebg"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="120" height="400" fill="none"/>
  <!-- Shaft -->
  <rect x="44" y="110" width="32" height="265" rx="5" fill="#4A3000" stroke="#C17F24" stroke-width="1"/>
  <!-- Base -->
  <rect x="28" y="366" width="64" height="18" rx="4" fill="#2C1A00" stroke="#C17F24" stroke-width="1.5"/>
  <!-- Buffalo head -->
  <ellipse cx="60" cy="75" rx="36" ry="32" fill="#5C3A10"/>
  <!-- Snout -->
  <ellipse cx="60" cy="92" rx="22" ry="16" fill="#3D2008"/>
  <!-- Nostrils -->
  <ellipse cx="52" cy="92" rx="5" ry="4" fill="#1A0D00"/>
  <ellipse cx="68" cy="92" rx="5" ry="4" fill="#1A0D00"/>
  <!-- Nostrils highlight -->
  <circle cx="51" cy="91" r="1.5" fill="#5C3A10"/>
  <circle cx="67" cy="91" r="1.5" fill="#5C3A10"/>
  <!-- Eyes -->
  <circle cx="40" cy="66" r="9" fill="#1A0800"/>
  <circle cx="80" cy="66" r="9" fill="#1A0800"/>
  <circle cx="40" cy="66" r="5" fill="#C17F24" filter="url(#ebg)"/>
  <circle cx="80" cy="66" r="5" fill="#C17F24" filter="url(#ebg)"/>
  <circle cx="39" cy="65" r="2" fill="#FFF8E7"/>
  <circle cx="79" cy="65" r="2" fill="#FFF8E7"/>
  <!-- Horns -->
  <path d="M26,58 Q8,35 12,18 Q20,38 28,52" stroke="#8B5E1A" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M94,58 Q112,35 108,18 Q100,38 92,52" stroke="#8B5E1A" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Horn tips -->
  <circle cx="12" cy="18" r="4" fill="#C17F24" filter="url(#ebg)"/>
  <circle cx="108" cy="18" r="4" fill="#C17F24" filter="url(#ebg)"/>
  <!-- Forehead ritual mark -->
  <polygon points="60,50 54,62 66,62" fill="#C17F24"/>
  <circle cx="60" cy="52" r="3" fill="#F5A623" filter="url(#ebg)"/>
  <!-- Fur texture lines on face -->
  <g stroke="#3D2008" stroke-width="1" opacity="0.5">
    <path d="M38,78 Q44,74 50,78"/>
    <path d="M70,78 Q76,74 82,78"/>
    <path d="M35,70 Q38,66 42,70"/>
    <path d="M78,70 Q82,66 85,70"/>
  </g>
  <!-- Totem earth bands -->
  <rect x="44" y="182" width="32" height="6" rx="2" fill="#C17F24" opacity="0.8"/>
  <rect x="44" y="264" width="32" height="6" rx="2" fill="#C17F24" opacity="0.8"/>
  <rect x="44" y="346" width="32" height="6" rx="2" fill="#C17F24" opacity="0.8"/>
  <!-- Earth pattern — concentric rectangles -->
  <g fill="none" stroke="#C17F24" stroke-width="1.2" opacity="0.6">
    <rect x="50" y="198" width="20" height="16" rx="2"/>
    <rect x="54" y="202" width="12" height="8" rx="1"/>
    <rect x="50" y="228" width="20" height="16" rx="2"/>
    <rect x="54" y="232" width="12" height="8" rx="1"/>
    <rect x="50" y="280" width="20" height="16" rx="2"/>
    <rect x="54" y="284" width="12" height="8" rx="1"/>
    <rect x="50" y="310" width="20" height="16" rx="2"/>
    <rect x="54" y="314" width="12" height="8" rx="1"/>
  </g>
</svg>
