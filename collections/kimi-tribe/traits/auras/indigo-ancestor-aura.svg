<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="indigoAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1B1464" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#2D2191" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1B1464" stop-opacity="0"/>
    </radialGradient>
    <filter id="ig"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="400" height="400" fill="none"/>
  <circle cx="200" cy="200" r="185" fill="url(#indigoAura)" filter="url(#ig)"/>
  <!-- Ancestor spiral pattern -->
  <g fill="none" stroke="#6B5AE0" stroke-width="1.5" opacity="0.7">
    <path d="M200,200 Q230,170 200,140 Q170,110 140,140 Q110,170 140,200 Q170,230 200,200"/>
    <path d="M200,200 Q245,155 200,110 Q155,65 110,110 Q65,155 110,200 Q155,245 200,200"/>
    <path d="M200,200 Q260,140 200,80 Q140,20 80,80 Q20,140 80,200 Q140,260 200,200"/>
  </g>
  <!-- Vertical ancestor lines -->
  <g stroke="#C17F24" stroke-width="1" opacity="0.5">
    <line x1="200" y1="30" x2="200" y2="370"/>
    <line x1="140" y1="40" x2="140" y2="360"/>
    <line x1="260" y1="40" x2="260" y2="360"/>
    <line x1="80" y1="80" x2="80" y2="320"/>
    <line x1="320" y1="80" x2="320" y2="320"/>
  </g>
  <!-- Geometric diamond grid -->
  <g fill="none" stroke="#6B5AE0" stroke-width="1" opacity="0.4">
    <path d="M200,80 L280,200 L200,320 L120,200 Z"/>
    <path d="M200,110 L260,200 L200,290 L140,200 Z"/>
    <path d="M200,140 L240,200 L200,260 L160,200 Z"/>
  </g>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#2D2191" stroke-width="1" opacity="0.4"/>
  <circle cx="200" cy="200" r="130" fill="none" stroke="#6B5AE0" stroke-width="1.5" opacity="0.5"/>
</svg>
