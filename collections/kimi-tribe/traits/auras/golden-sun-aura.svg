<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="sunAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#C17F24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C17F24" stop-opacity="0"/>
    </radialGradient>
    <filter id="sg"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  <rect width="400" height="400" fill="none"/>
  <!-- Outer glow -->
  <circle cx="200" cy="200" r="185" fill="url(#sunAura)" filter="url(#sg)"/>
  <!-- Sun rays — 16 rays alternating long/short -->
  <g stroke="#F5A623" stroke-linecap="round">
    <line x1="200" y1="25" x2="200" y2="65" stroke-width="4"/>
    <line x1="200" y1="335" x2="200" y2="375" stroke-width="4"/>
    <line x1="25" y1="200" x2="65" y2="200" stroke-width="4"/>
    <line x1="335" y1="200" x2="375" y2="200" stroke-width="4"/>
    <line x1="76" y1="76" x2="104" y2="104" stroke-width="4"/>
    <line x1="296" y1="296" x2="324" y2="324" stroke-width="4"/>
    <line x1="324" y1="76" x2="296" y2="104" stroke-width="4"/>
    <line x1="104" y1="296" x2="76" y2="324" stroke-width="4"/>
    <line x1="200" y1="38" x2="200" y2="62" stroke-width="2.5" transform="rotate(22.5,200,200)"/>
    <line x1="200" y1="338" x2="200" y2="362" stroke-width="2.5" transform="rotate(22.5,200,200)"/>
    <line x1="38" y1="200" x2="62" y2="200" stroke-width="2.5" transform="rotate(22.5,200,200)"/>
    <line x1="338" y1="200" x2="362" y2="200" stroke-width="2.5" transform="rotate(22.5,200,200)"/>
    <line x1="200" y1="38" x2="200" y2="62" stroke-width="2.5" transform="rotate(45,200,200)"/>
    <line x1="200" y1="338" x2="200" y2="362" stroke-width="2.5" transform="rotate(45,200,200)"/>
    <line x1="38" y1="200" x2="62" y2="200" stroke-width="2.5" transform="rotate(45,200,200)"/>
    <line x1="338" y1="200" x2="362" y2="200" stroke-width="2.5" transform="rotate(45,200,200)"/>
    <line x1="200" y1="38" x2="200" y2="55" stroke-width="2" transform="rotate(67.5,200,200)"/>
    <line x1="200" y1="345" x2="200" y2="362" stroke-width="2" transform="rotate(67.5,200,200)"/>
    <line x1="38" y1="200" x2="55" y2="200" stroke-width="2" transform="rotate(67.5,200,200)"/>
    <line x1="345" y1="200" x2="362" y2="200" stroke-width="2" transform="rotate(67.5,200,200)"/>
  </g>
  <!-- Concentric sun rings -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#F5A623" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#F5A623" stroke-width="1.5" opacity="0.4"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#C17F24" stroke-width="2" opacity="0.5"/>
  <!-- Adinkra sun symbols on ring -->
  <g fill="#F5A623" opacity="0.6">
    <circle cx="200" cy="60" r="4"/>
    <circle cx="340" cy="200" r="4"/>
    <circle cx="200" cy="340" r="4"/>
    <circle cx="60" cy="200" r="4"/>
    <circle cx="286" cy="114" r="3"/>
    <circle cx="286" cy="286" r="3"/>
    <circle cx="114" cy="286" r="3"/>
    <circle cx="114" cy="114" r="3"/>
  </g>
  <!-- Ochre glow ring -->
  <circle cx="200" cy="200" r="90" fill="none" stroke="#C17F24" stroke-width="3" opacity="0.6"/>
</svg>
