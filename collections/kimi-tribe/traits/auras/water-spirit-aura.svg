<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="waterAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E6B8C" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#5BA3C9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1E6B8C" stop-opacity="0"/>
    </radialGradient>
    <filter id="wg"><feGaussianBlur stdDeviation="5"/></filter>
  </defs>
  <rect width="400" height="400" fill="none"/>
  <circle cx="200" cy="200" r="180" fill="url(#waterAura)" filter="url(#wg)"/>
  <!-- Ripple rings -->
  <g fill="none" stroke="#5BA3C9" opacity="0.4">
    <ellipse cx="200" cy="200" rx="170" ry="60" stroke-width="1"/>
    <ellipse cx="200" cy="200" rx="140" ry="50" stroke-width="1.5"/>
    <ellipse cx="200" cy="200" rx="110" ry="40" stroke-width="2"/>
    <ellipse cx="200" cy="200" rx="80" ry="30" stroke-width="2"/>
    <ellipse cx="200" cy="200" rx="50" ry="18" stroke-width="2.5"/>
  </g>
  <!-- Wave lines -->
  <g fill="none" stroke="#5BA3C9" stroke-width="1" opacity="0.35">
    <path d="M30,160 Q70,150 110,160 Q150,170 190,160 Q230,150 270,160 Q310,170 350,160 Q375,155 390,160"/>
    <path d="M30,180 Q70,170 110,180 Q150,190 190,180 Q230,170 270,180 Q310,190 350,180 Q375,175 390,180"/>
    <path d="M30,220 Q70,210 110,220 Q150,230 190,220 Q230,210 270,220 Q310,230 350,220 Q375,215 390,220"/>
    <path d="M30,240 Q70,230 110,240 Q150,250 190,240 Q230,230 270,240 Q310,250 350,240 Q375,235 390,240"/>
  </g>
  <!-- Water droplet accents -->
  <g fill="#5BA3C9" opacity="0.5">
    <ellipse cx="200" cy="45" rx="5" ry="8"/>
    <ellipse cx="355" cy="200" rx="8" ry="5"/>
    <ellipse cx="200" cy="355" rx="5" ry="8"/>
    <ellipse cx="45" cy="200" rx="8" ry="5"/>
