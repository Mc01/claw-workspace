<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="mistAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2D6A2D" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#4A7C2F" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2D6A2D" stop-opacity="0"/>
    </radialGradient>
    <filter id="mist"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="mg"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="400" height="400" fill="none"/>
  <circle cx="200" cy="200" r="180" fill="url(#mistAura)" filter="url(#mist)"/>
  <!-- Leaf pattern aura -->
  <g fill="#4A7C2F" opacity="0.35">
    <ellipse cx="200" cy="55" rx="15" ry="25" transform="rotate(0,200,55)"/>
    <ellipse cx="255" cy="68" rx="15" ry="25" transform="rotate(30,255,68)"/>
    <ellipse cx="298" cy="102" rx="15" ry="25" transform="rotate(60,298,102)"/>
    <ellipse cx="322" cy="150" rx="15" ry="25" transform="rotate(90,322,150)"/>
    <ellipse cx="145" cy="68" rx="15" ry="25" transform="rotate(-30,145,68)"/>
    <ellipse cx="102" cy="102" rx="15" ry="25" transform="rotate(-60,102,102)"/>
    <ellipse cx="78" cy="150" rx="15" ry="25" transform="rotate(-90,78,150)"/>
  </g>
  <!-- Vine tendrils -->
  <g fill="none" stroke="#4A7C2F" stroke-width="1.5" opacity="0.4">
    <path d="M200,30 Q215,80 200,130 Q185,80 200,30"/>
    <path d="M200,370 Q215,320 200,270 Q185,320 200,370"/>
    <path d="M30,200 Q80,215 130,200 Q80,185 30,200"/>
    <path d="M370,200 Q320,215 270,200 Q320,185 370,200"/>
  </g>
  <circle cx="200" cy="200" r="160" fill="none" stroke="#4A7C2F" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="#7FD44C" stroke-width="1" opacity="0.2"/>
</svg>
