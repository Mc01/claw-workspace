<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="sdg"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="400" fill="none"/>
  <!-- Mask base — midnight indigo -->
  <path d="M200,50 Q280,52 312,108 Q338,158 335,220 Q328,282 300,318 Q268,348 200,352 Q132,348 100,318 Q72,282 65,220 Q62,158 88,108 Q120,52 200,50 Z" fill="#1B1464" stroke="#8B5CF6" stroke-width="2.5"/>
  <!-- Gold facial plane divisions — kuba-inspired geometry -->
  <g stroke="#C17F24" stroke-width="2" fill="none" opacity="0.8">
    <!-- Vertical axis -->
    <line x1="200" y1="55" x2="200" y2="345"/>
    <!-- Brow line -->
    <line x1="105" y1="155" x2="295" y2="155"/>
    <!-- Cheekbone line -->
    <line x1="78" y1="220" x2="322" y2="220"/>
  </g>
  <!-- Geometric panels in forehead quadrants -->
  <g fill="#2D2191" stroke="#8B5CF6" stroke-width="1" opacity="0.7">
    <polygon points="120,80 200,80 200,152 120,152"/>
    <polygon points="200,80 280,80 280,152 200,152"/>
  </g>
  <!-- Stars in panels -->
  <g fill="#F5A623" filter="url(#sdg)" opacity="0.8">
    <polygon points="155,108 150,118 140,118 148,125 145,135 155,128 165,135 162,125 170,118 160,118"/>
    <polygon points="245,108 240,118 230,118 238,125 235,135 245,128 255,135 252,125 260,118 250,118"/>
  </g>
  <!-- Eye holes — crescent-shaped -->
  <path d="M128,178 Q155,160 182,178 Q155,195 128,178" fill="#0A0520"/>
  <path d="M218,178 Q245,160 272,178 Q245,195 218,178" fill="#0A0520"/>
  <!-- Eye glow -->
  <ellipse cx="155" cy="178" rx="15" ry="8" fill="#C084FC" filter="url(#sdg)"/>
  <ellipse cx="245" cy="178" rx="15" ry="8" fill="#C084FC" filter="url(#sdg)"/>
  <!-- Nose bridge totem -->
  <rect x="195" y="208" width="10" height="28" rx="3" fill="#C17F24"/>
  <polygon points="200,200 194,212 206,212" fill="#F5A623"/>
  <!-- Mouth — ceremonial opening -->
  <path d="M158,278 Q178,268 200,272 Q222,268 242,278 L235,295 Q215,310 200,312 Q185,310 165,295 Z" fill="#0A0520" stroke="#8B5CF6" stroke-width="1.5"/>
  <!-- Mouth teeth marks -->
  <g fill="#C17F24" opacity="0.6">
    <rect x="180" y="280" width="8" height="10" rx="1"/>
    <rect x="196" y="278" width="8" height="12" rx="1"/>
    <rect x="212" y="280" width="8" height="10" rx="1"/>
  </g>
  <!-- Radiating celestial lines from mask -->
  <g stroke="#8B5CF6" stroke-width="1" opacity="0.4">
    <line x1="200" y1="50" x2="200" y2="20"/>
    <line x1="265" y1="68" x2="285" y2="48"/>
    <line x1="312" y1="108" x2="336" y2="95"/>
    <line x1="135" y1="68" x2="115" y2="48"/>
    <line x1="88" y1="108" x2="64" y2="95"/>
  </g>
  <!-- Crown headdress -->
  <g fill="#C17F24">
    <polygon points="200,42 194,20 206,20"/>
    <polygon points="180,48 172,25 182,30"/>
    <polygon points="220,48 228,25 218,30"/>
    <polygon points="160,58 150,38 162,44"/>
    <polygon points="240,58 250,38 238,44"/>
  </g>
</svg>
