    <ellipse cx="185" cy="142" rx="16" ry="11"/>
    <ellipse cx="215" cy="142" rx="16" ry="11"/>
    <ellipse cx="245" cy="148" rx="16" ry="11"/>
    <ellipse cx="275" cy="160" rx="16" ry="11"/>
