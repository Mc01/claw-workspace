  <!-- Ears -->
  <path d="M155,62 Q142,30 125,18 Q138,40 142,58" stroke="#8B5E1A" stroke-width="4" fill="#C17F24" stroke-linecap="round"/>
  <path d="M245,62 Q258,30 275,18 Q262,40 258,58" stroke="#8B5E1A" stroke-width="4" fill="#C17F24" stroke-linecap="round"/>
  <path d="M145,54 Q138,36 130,26 Q142,42 145,54" fill="#E85D04" opacity="0.5"/>
  <path d="M255,54 Q262,36 270,26 Q258,42 255,54" fill="#E85D04" opacity="0.5"/>
