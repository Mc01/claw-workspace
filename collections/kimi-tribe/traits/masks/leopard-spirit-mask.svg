<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="lg"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="400" fill="none"/>
  <!-- Mask base — ochre/tawny -->
  <path d="M200,55 Q278,58 308,110 Q335,160 330,220 Q322,278 295,315 Q265,345 200,350 Q135,345 105,315 Q78,278 70,220 Q65,160 92,110 Q122,58 200,55 Z" fill="#C17F24" stroke="#8B5E1A" stroke-width="2"/>
  <!-- Dark eye surround -->
