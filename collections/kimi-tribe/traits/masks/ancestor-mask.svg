  <ellipse cx="237" cy="180" rx="28" ry="18" fill="#1A0800"/>
  <ellipse cx="163" cy="180" rx="24" ry="14" fill="#0A0400"/>
  <ellipse cx="237" cy="180" rx="24" ry="14" fill="#0A0400"/>
