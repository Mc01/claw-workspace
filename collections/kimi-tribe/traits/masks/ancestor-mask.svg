  <path d="M200,60 Q270,62 295,100 Q320,138 318,200 Q316,255 295,295 Q275,330 200,340 Q125,330 105,295 Q84,255 82,200 Q80,138 105,100 Q130,62 200,60 Z" fill="#8B4513" stroke="#C17F24" stroke-width="2.5"/>
