<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050A1F"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>
    <linearGradient id="waterBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B3A6B"/>
      <stop offset="100%" stop-color="#0D1F3D"/>
    </linearGradient>
    <filter id="waterGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="auraWater" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E6B8C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1E6B8C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg3)"/>
  <ellipse cx="200" cy="200" rx="160" ry="170" fill="url(#auraWater)"/>
  <!-- Water ripple background -->
  <g fill="none" stroke="#1E6B8C" stroke-width="1" opacity="0.2">
    <ellipse cx="200" cy="370" rx="180" ry="30"/>
    <ellipse cx="200" cy="370" rx="150" ry="22"/>
    <ellipse cx="200" cy="370" rx="120" ry="16"/>
    <ellipse cx="200" cy="370" rx="90" ry="11"/>
  </g>
  <!-- Border -->
  <rect x="8" y="8" width="384" height="384" fill="none" stroke="#1E6B8C" stroke-width="2"/>
  <!-- Wave border pattern -->
  <g fill="none" stroke="#1E6B8C" stroke-width="1" opacity="0.6">
    <path d="M8,380 Q30,370 52,380 Q74,390 96,380 Q118,370 140,380 Q162,390 184,380 Q206,370 228,380 Q250,390 272,380 Q294,370 316,380 Q338,390 360,380 Q382,370 392,380"/>
  </g>
  <!-- Lower body — flowing water form -->
  <path d="M130,380 Q150,330 160,290 Q170,270 200,265 Q230,270 240,290 Q250,330 270,380 Z" fill="url(#waterBody)" opacity="0.9"/>
  <!-- Water flow lines on body -->
  <g fill="none" stroke="#5BA3C9" stroke-width="1.5" opacity="0.5">
    <path d="M160,295 Q170,310 165,330 Q160,350 162,370"/>
    <path d="M175,282 Q182,300 178,325 Q174,350 175,375"/>
    <path d="M200,278 Q200,300 200,325 Q200,350 200,378"/>
    <path d="M225,282 Q218,300 222,325 Q226,350 225,375"/>
    <path d="M240,295 Q230,310 235,330 Q240,350 238,370"/>
  </g>
  <!-- Upper body -->
  <ellipse cx="200" cy="285" rx="55" ry="30" fill="#1B3A6B"/>
  <!-- Torso -->
  <rect x="162" y="255" width="76" height="50" rx="10" fill="#1B3A6B"/>
  <!-- Adinkra symbol on chest -->
  <g fill="none" stroke="#5BA3C9" stroke-width="2">
    <circle cx="200" cy="275" r="14"/>
    <circle cx="200" cy="275" r="8"/>
    <line x1="200" y1="261" x2="200" y2="254"/>
    <line x1="200" y1="289" x2="200" y2="296"/>
    <line x1="186" y1="275" x2="179" y2="275"/>
    <line x1="214" y1="275" x2="221" y2="275"/>
  </g>
  <!-- Arms - watery tendrils -->
  <path d="M162,265 Q130,255 105,240 Q90,230 85,215" stroke="#1B3A6B" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M238,265 Q270,255 295,240 Q310,230 315,215" stroke="#1B3A6B" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Water droplets at arm tips -->
  <g fill="#5BA3C9" filter="url(#waterGlow)" opacity="0.8">
    <ellipse cx="83" cy="212" rx="8" ry="12" transform="rotate(-15,83,212)"/>
    <ellipse cx="317" cy="212" rx="8" ry="12" transform="rotate(15,317,212)"/>
  </g>
  <!-- Neck -->
  <rect x="188" y="232" width="24" height="28" rx="4" fill="#1B3A6B"/>
  <!-- Head -->
  <ellipse cx="200" cy="205" rx="44" ry="50" fill="#1B3A6B"/>
  <!-- Crown — water crest -->
  <path d="M160,195 Q170,160 185,150 Q200,145 215,150 Q230,160 240,195" fill="none" stroke="#5BA3C9" stroke-width="2.5"/>
  <g fill="#5BA3C9">
    <path d="M185,150 Q188,130 192,120 Q196,128 200,118 Q204,128 208,120 Q212,130 215,150" opacity="0.8"/>
  </g>
  <!-- Water droplet crown gems -->
  <g fill="#A8D8F0" filter="url(#waterGlow)">
    <ellipse cx="192" cy="122" rx="4" ry="6"/>
    <ellipse cx="200" cy="118" rx="4" ry="6"/>
    <ellipse cx="208" cy="122" rx="4" ry="6"/>
  </g>
  <!-- Eyes — deep water blue -->
  <ellipse cx="184" cy="200" rx="10" ry="8" fill="#050A1F"/>
  <ellipse cx="216" cy="200" rx="10" ry="8" fill="#050A1F"/>
  <ellipse cx="184" cy="200" rx="6" ry="5" fill="#5BA3C9" filter="url(#waterGlow)"/>
  <ellipse cx="216" cy="200" rx="6" ry="5" fill="#5BA3C9" filter="url(#waterGlow)"/>
  <circle cx="183" cy="199" r="2" fill="#E0F4FF"/>
  <circle cx="215" cy="199" r="2" fill="#E0F4FF"/>
  <!-- Face tribal markings — wave patterns -->
  <g fill="none" stroke="#C17F24" stroke-width="1.5" opacity="0.8">
    <path d="M162,205 Q168,200 174,205 Q180,210 186,205"/>
    <path d="M214,205 Q220,200 226,205 Q232,210 238,205"/>
  </g>
  <!-- Forehead mark -->
  <path d="M192,178 Q196,173 200,170 Q204,173 208,178" fill="none" stroke="#C17F24" stroke-width="2"/>
  <circle cx="200" cy="168" r="3" fill="#F5A623" filter="url(#waterGlow)"/>
  <!-- Nose -->
  <path d="M195,215 Q200,220 205,215" fill="none" stroke="#0D1F3D" stroke-width="2"/>
  <!-- Mouth -->
  <path d="M188,228 Q200,235 212,228" fill="none" stroke="#0D1F3D" stroke-width="2"/>
  <!-- Floating water droplets -->
  <g fill="#5BA3C9" filter="url(#waterGlow)" opacity="0.5">
    <ellipse cx="125" cy="155" rx="4" ry="6"/>
    <ellipse cx="112" cy="175" rx="3" ry="4"/>
    <ellipse cx="138" cy="135" rx="3" ry="4"/>
    <ellipse cx="275" cy="150" rx="4" ry="6"/>
    <ellipse cx="288" cy="170" rx="3" ry="4"/>
    <ellipse cx="263" cy="132" rx="3" ry="4"/>
    <ellipse cx="165" cy="95" rx="3" ry="4"/>
    <ellipse cx="235" cy="95" rx="3" ry="4"/>
    <ellipse cx="200" cy="88" rx="4" ry="6"/>
  </g>
  <text x="200" y="392" text-anchor="middle" font-family="serif" font-size="11" fill="#5BA3C9" letter-spacing="3">RIVER SPIRIT</text>
</svg>
