<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <title>Trait: Morning Mist</title>
  <desc>Background variant - misty forest morning</desc>
  <rect width="24" height="24" fill="#c8d8c0"/>
  <!-- Tree silhouettes -->
  <rect x="1" y="4" width="2" height="16" fill="#8aa880" opacity="0.4"/>
  <rect x="0" y="3" width="4" height="3" fill="#8aa880" opacity="0.3"/>
  <rect x="20" y="6" width="2" height="14" fill="#8aa880" opacity="0.4"/>
  <rect x="19" y="5" width="4" height="3" fill="#8aa880" opacity="0.3"/>
  <!-- Mist layers -->
  <rect x="0" y="12" width="24" height="2" fill="#dde8dd" opacity="0.6"/>
  <rect x="0" y="16" width="24" height="2" fill="#dde8dd" opacity="0.5"/>
  <!-- Ground -->
  <rect x="0" y="20" width="24" height="4" fill="#6a8a60"/>
</svg>
