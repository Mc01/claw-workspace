<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <title>Serpent - Vine Coil</title>
  <rect width="24" height="24" fill="#1e3a15"/>
  <!-- Coiled body -->
  <rect x="10" y="16" width="6" height="2" fill="#3d6b2a"/>
  <rect x="8" y="14" width="2" height="2" fill="#4a7c34"/>
  <rect x="16" y="14" width="2" height="2" fill="#4a7c34"/>
  <rect x="7" y="12" width="2" height="2" fill="#3d6b2a"/>
  <rect x="17" y="12" width="2" height="2" fill="#3d6b2a"/>
  <rect x="8" y="10" width="2" height="2" fill="#4a7c34"/>
  <rect x="16" y="10" width="2" height="2" fill="#4a7c34"/>
  <rect x="10" y="9" width="6" height="2" fill="#3d6b2a"/>
  <!-- Upper body rising -->
  <rect x="14" y="7" width="2" height="2" fill="#4a7c34"/>
  <rect x="15" y="5" width="2" height="2" fill="#3d6b2a"/>
  <rect x="16" y="3" width="2" height="3" fill="#4a7c34"/>
  <!-- Head -->
  <rect x="17" y="2" width="4" height="3" fill="#5a8f3e"/>
  <rect x="18" y="1" width="2" height="1" fill="#4a7c34"/>
  <!-- Eye -->
  <rect x="19" y="2" width="1" height="1" fill="#ccaa00"/>
  <!-- Tongue -->
  <rect x="21" y="3" width="1" height="1" fill="#cc3333"/>
  <rect x="22" y="2" width="1" height="1" fill="#cc3333"/>
  <rect x="22" y="4" width="1" height="1" fill="#cc3333"/>
  <!-- Vine tendrils -->
  <rect x="9" y="13" width="1" height="1" fill="#5a8f3e"/>
  <rect x="15" y="13" width="1" height="1" fill="#5a8f3e"/>
  <rect x="12" y="8" width="1" height="1" fill="#5a8f3e"/>
  <!-- Leaves -->
  <rect x="6" y="12" width="1" height="1" fill="#7ab356"/>
  <rect x="19" y="11" width="1" height="1" fill="#7ab356"/>
  <rect x="11" y="15" width="1" height="1" fill="#7ab356"/>
  <!-- Belly pattern -->
  <rect x="10" y="17" width="1" height="1" fill="#5a8f3e"/>
  <rect x="12" y="17" width="1" height="1" fill="#5a8f3e"/>
  <rect x="14" y="17" width="1" height="1" fill="#5a8f3e"/>
  <!-- Ground -->
  <rect x="0" y="18" width="24" height="6" fill="#3d2b1a"/>
  <rect x="3" y="18" width="1" height="1" fill="#4a7c34"/>
  <rect x="20" y="18" width="1" height="1" fill="#5a8f3e"/>
</svg>
