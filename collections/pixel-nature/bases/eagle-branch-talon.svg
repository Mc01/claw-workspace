<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <title>Eagle - Branch Talon</title>
  <rect width="24" height="24" fill="#2a3d1e"/>
  <!-- Branch perch -->
  <rect x="2" y="17" width="20" height="2" fill="#5c3a1e"/>
  <rect x="1" y="18" width="2" height="2" fill="#4a2e14"/>
  <rect x="21" y="18" width="2" height="2" fill="#4a2e14"/>
  <!-- Talons -->
  <rect x="9" y="17" width="1" height="1" fill="#6b4422"/>
  <rect x="8" y="18" width="1" height="1" fill="#5c3a1e"/>
  <rect x="10" y="18" width="1" height="1" fill="#5c3a1e"/>
  <rect x="14" y="17" width="1" height="1" fill="#6b4422"/>
  <rect x="13" y="18" width="1" height="1" fill="#5c3a1e"/>
  <rect x="15" y="18" width="1" height="1" fill="#5c3a1e"/>
  <!-- Legs -->
  <rect x="9" y="15" width="2" height="2" fill="#6b4422"/>
  <rect x="14" y="15" width="2" height="2" fill="#6b4422"/>
  <!-- Body -->
  <rect x="8" y="9" width="8" height="6" fill="#4a3520"/>
  <rect x="7" y="10" width="1" height="4" fill="#3d2b18"/>
  <rect x="16" y="10" width="1" height="4" fill="#3d2b18"/>
  <!-- Chest -->
  <rect x="14" y="10" width="2" height="4" fill="#e8dcc8"/>
  <!-- Wing -->
  <rect x="5" y="9" width="3" height="5" fill="#3d6b2a"/>
  <rect x="4" y="10" width="1" height="4" fill="#4a7c34"/>
  <rect x="3" y="11" width="1" height="3" fill="#3d6b2a"/>
  <!-- Head -->
  <rect x="14" y="5" width="4" height="4" fill="#e8dcc8"/>
  <rect x="13" y="6" width="1" height="3" fill="#ddd0b8"/>
  <!-- Eye -->
  <rect x="16" y="6" width="1" height="1" fill="#cc8800"/>
  <!-- Beak -->
  <rect x="18" y="7" width="2" height="1" fill="#cc8800"/>
  <rect x="18" y="8" width="1" height="1" fill="#b37700"/>
  <!-- Crown feathers -->
  <rect x="14" y="4" width="1" height="1" fill="#4a7c34"/>
  <rect x="16" y="4" width="1" height="1" fill="#3d6b2a"/>
  <rect x="15" y="3" width="1" height="2" fill="#5a8f3e"/>
  <!-- Tail -->
  <rect x="3" y="14" width="4" height="1" fill="#3d6b2a"/>
  <rect x="2" y="13" width="2" height="1" fill="#4a7c34"/>
  <!-- Ground -->
  <rect x="0" y="20" width="24" height="4" fill="#1e3a15"/>
</svg>
