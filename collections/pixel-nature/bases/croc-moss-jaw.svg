<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <title>Croc - Moss Jaw</title>
  <rect width="24" height="24" fill="#1a3312"/>
  <!-- Swamp -->
  <rect x="0" y="16" width="24" height="8" fill="#2a4a20"/>
  <rect x="0" y="18" width="24" height="6" fill="#1e3a15"/>
  <!-- Body -->
  <rect x="2" y="10" width="14" height="4" fill="#4a6b30"/>
  <rect x="1" y="11" width="1" height="2" fill="#3d5c28"/>
  <!-- Ridges -->
  <rect x="4" y="9" width="2" height="1" fill="#5a8040"/>
  <rect x="7" y="9" width="2" height="1" fill="#5a8040"/>
  <rect x="10" y="9" width="2" height="1" fill="#5a8040"/>
  <rect x="13" y="9" width="2" height="1" fill="#5a8040"/>
  <!-- Moss patches -->
  <rect x="3" y="10" width="2" height="1" fill="#6b9948"/>
  <rect x="8" y="10" width="2" height="1" fill="#7ab356"/>
  <rect x="12" y="10" width="1" height="1" fill="#6b9948"/>
  <!-- Head -->
  <rect x="14" y="9" width="6" height="4" fill="#4a6b30"/>
  <rect x="20" y="10" width="2" height="3" fill="#3d5c28"/>
  <!-- Jaw -->
  <rect x="14" y="13" width="8" height="2" fill="#3d5c28"/>
  <rect x="22" y="11" width="1" height="2" fill="#4a6b30"/>
  <rect x="15" y="13" width="2" height="1" fill="#6b9948"/>
  <rect x="19" y="13" width="1" height="1" fill="#7ab356"/>
  <!-- Teeth -->
  <rect x="20" y="12" width="1" height="1" fill="#e8e8d0"/>
  <rect x="22" y="12" width="1" height="1" fill="#e8e8d0"/>
  <rect x="21" y="13" width="1" height="1" fill="#e8e8d0"/>
  <!-- Eye -->
  <rect x="17" y="9" width="2" height="2" fill="#ccaa00"/>
  <rect x="18" y="9" width="1" height="1" fill="#1a1a1a"/>
  <!-- Eye ridge -->
  <rect x="16" y="8" width="3" height="1" fill="#3d5c28"/>
  <!-- Legs -->
  <rect x="4" y="14" width="2" height="3" fill="#3d5c28"/>
  <rect x="11" y="14" width="2" height="3" fill="#3d5c28"/>
  <!-- Claws -->
  <rect x="3" y="16" width="1" height="1" fill="#5a4a30"/>
  <rect x="6" y="16" width="1" height="1" fill="#5a4a30"/>
  <rect x="10" y="16" width="1" height="1" fill="#5a4a30"/>
  <rect x="13" y="16" width="1" height="1" fill="#5a4a30"/>
  <!-- Tail -->
  <rect x="1" y="11" width="2" height="2" fill="#4a6b30"/>
  <rect x="0" y="12" width="1" height="1" fill="#3d5c28"/>
  <!-- Water ripples -->
  <rect x="5" y="17" width="3" height="1" fill="#3d6b2a" opacity="0.5"/>
  <rect x="15" y="16" width="4" height="1" fill="#3d6b2a" opacity="0.5"/>
</svg>
