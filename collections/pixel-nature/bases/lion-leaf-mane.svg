<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <title>Lion - Leaf Mane</title>
  <rect width="24" height="24" fill="#2d4a22"/>
  <!-- Mane (leaves) -->
  <rect x="6" y="4" width="2" height="2" fill="#4a7c34"/>
  <rect x="8" y="3" width="2" height="2" fill="#5a8f3e"/>
  <rect x="10" y="2" width="2" height="2" fill="#4a7c34"/>
  <rect x="12" y="3" width="2" height="2" fill="#3d6b2a"/>
  <rect x="14" y="4" width="2" height="2" fill="#5a8f3e"/>
  <rect x="5" y="6" width="2" height="2" fill="#3d6b2a"/>
  <rect x="15" y="6" width="2" height="2" fill="#4a7c34"/>
  <rect x="5" y="8" width="2" height="2" fill="#5a8f3e"/>
  <rect x="15" y="8" width="2" height="2" fill="#3d6b2a"/>
  <rect x="6" y="10" width="2" height="2" fill="#4a7c34"/>
  <rect x="14" y="10" width="2" height="2" fill="#5a8f3e"/>
  <!-- Head -->
  <rect x="8" y="5" width="6" height="6" fill="#8B6914"/>
  <rect x="7" y="6" width="1" height="4" fill="#9a7518"/>
  <rect x="14" y="6" width="1" height="4" fill="#7a5c10"/>
  <!-- Eye -->
  <rect x="12" y="7" width="2" height="1" fill="#1a1a1a"/>
  <rect x="13" y="7" width="1" height="1" fill="#e8e8e8"/>
  <!-- Nose -->
  <rect x="14" y="9" width="1" height="1" fill="#5a3e08"/>
  <!-- Mouth -->
  <rect x="12" y="10" width="3" height="1" fill="#7a5c10"/>
  <!-- Body -->
  <rect x="8" y="11" width="6" height="5" fill="#9a7518"/>
  <rect x="7" y="12" width="1" height="3" fill="#8B6914"/>
  <rect x="14" y="11" width="1" height="4" fill="#8B6914"/>
  <!-- Legs -->
  <rect x="8" y="16" width="2" height="4" fill="#8B6914"/>
  <rect x="12" y="16" width="2" height="4" fill="#8B6914"/>
  <!-- Paws -->
  <rect x="7" y="19" width="3" height="1" fill="#7a5c10"/>
  <rect x="12" y="19" width="3" height="1" fill="#7a5c10"/>
  <!-- Tail -->
  <rect x="5" y="12" width="2" height="1" fill="#8B6914"/>
  <rect x="4" y="11" width="1" height="2" fill="#9a7518"/>
  <rect x="3" y="10" width="2" height="1" fill="#4a7c34"/>
  <!-- Ground -->
  <rect x="0" y="20" width="24" height="4" fill="#3d2b1a"/>
  <rect x="2" y="20" width="1" height="1" fill="#4a7c34"/>
  <rect x="18" y="20" width="1" height="1" fill="#5a8f3e"/>
</svg>
