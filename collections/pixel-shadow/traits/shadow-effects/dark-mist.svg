<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="none"/>
  <!-- Ground mist -->
  <rect x="10" y="160" width="180" height="10" fill="#1a0a2e" opacity="0.3"/>
  <rect x="5" y="170" width="190" height="10" fill="#1a0a2e" opacity="0.4"/>
  <rect x="0" y="180" width="200" height="20" fill="#0d0515" opacity="0.5"/>
  <!-- Rising mist tendrils -->
  <rect x="30" y="145" width="15" height="10" fill="#1a0a2e" opacity="0.2"/>
  <rect x="35" y="138" width="10" height="8" fill="#2d1b4e" opacity="0.15"/>
  <rect x="80" y="148" width="20" height="8" fill="#1a0a2e" opacity="0.25"/>
  <rect x="85" y="140" width="10" height="10" fill="#2d1b4e" opacity="0.15"/>
  <rect x="140" y="142" width="15" height="10" fill="#1a0a2e" opacity="0.2"/>
  <rect x="145" y="135" width="10" height="8" fill="#2d1b4e" opacity="0.12"/>
  <!-- Scattered mist -->
  <rect x="20" y="155" width="8" height="6" fill="#3b1f5e" opacity="0.15"/>
  <rect x="60" y="158" width="8" height="5" fill="#3b1f5e" opacity="0.18"/>
  <rect x="110" y="152" width="8" height="6" fill="#3b1f5e" opacity="0.15"/>
  <rect x="165" y="155" width="8" height="5" fill="#3b1f5e" opacity="0.18"/>
</svg>
