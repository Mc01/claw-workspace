  <rect x="82" y="80" width="4" height="6" fill="#00cc44"/>
  <rect x="82" y="86" width="4" height="6" fill="#00aa33"/>
  <rect x="82" y="92" width="4" height="4" fill="#008822"/>
  <rect x="83" y="96" width="3" height="3" fill="#00cc44" opacity="0.7"/>
  <rect x="104" y="80" width="4" height="6" fill="#00cc44"/>
  <rect x="104" y="86" width="4" height="8" fill="#00aa33"/>
  <rect x="104" y="94" width="4" height="4" fill="#008822"/>
  <rect x="105" y="98" width="3" height="4" fill="#00cc44" opacity="0.6"/>
