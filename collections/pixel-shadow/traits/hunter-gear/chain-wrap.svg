  <rect x="53" y="94" width="4" height="6" fill="#3a3a55"/>
  <rect x="59" y="94" width="4" height="6" fill="#3a3a55"/>
  <rect x="55" y="98" width="6" height="4" fill="#4a4a65"/>
  <!-- Link 2 -->
  <rect x="62" y="90" width="6" height="4" fill="#4a4a65"/>
  <rect x="60" y="92" width="4" height="6" fill="#3a3a55"/>
  <rect x="66" y="92" width="4" height="6" fill="#3a3a55"/>
  <rect x="62" y="96" width="6" height="4" fill="#4a4a65"/>
  <!-- Links continuing -->
  <rect x="69" y="88" width="6" height="4" fill="#4a4a65"/>
  <rect x="76" y="87" width="6" height="4" fill="#3a3a55"/>
  <rect x="83" y="86" width="6" height="4" fill="#4a4a65"/>
  <rect x="90" y="85" width="6" height="4" fill="#3a3a55"/>
  <rect x="97" y="86" width="6" height="4" fill="#4a4a65"/>
