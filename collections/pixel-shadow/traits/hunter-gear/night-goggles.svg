<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="none"/>
  <!-- Goggle strap -->
  <rect x="55" y="44" width="80" height="4" fill="#1a1a2e"/>
  <rect x="50" y="46" width="8" height="6" fill="#1a1a2e"/>
  <rect x="132" y="46" width="8" height="6" fill="#1a1a2e"/>
  <!-- Left lens housing -->
  <rect x="68" y="40" width="20" height="16" fill="#2a2a40"/>
  <rect x="70" y="42" width="16" height="12" fill="#0d0d1a"/>
  <!-- Right lens housing -->
  <rect x="102" y="40" width="20" height="16" fill="#2a2a40"/>
  <rect x="104" y="42" width="16" height="12" fill="#0d0d1a"/>
  <!-- Lens glow -->
  <rect x="72" y="44" width="12" height="8" fill="#00ff88" opacity="0.6"/>
  <rect x="74" y="45" width="8" height="6" fill="#00ff88" opacity="0.8"/>
  <rect x="106" y="44" width="12" height="8" fill="#00ff88" opacity="0.6"/>
  <rect x="108" y="45" width="8" height="6" fill="#00ff88" opacity="0.8"/>
  <!-- Bridge -->
  <rect x="88" y="46" width="14" height="6" fill="#2a2a40"/>
  <!-- Highlight -->
  <rect x="72" y="43" width="4" height="2" fill="#66ffbb" opacity="0.4"/>
  <rect x="106" y="43" width="4" height="2" fill="#66ffbb" opacity="0.4"/>
</svg>
