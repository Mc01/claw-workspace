<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="none"/>
  <!-- Blade strapped to back -->
  <rect x="140" y="30" width="4" height="8" fill="#2d2d50"/>
  <rect x="140" y="38" width="4" height="8" fill="#3d3d60"/>
  <rect x="140" y="46" width="4" height="8" fill="#2d2d50"/>
  <rect x="140" y="54" width="4" height="8" fill="#3d3d60"/>
  <rect x="140" y="62" width="4" height="8" fill="#2d2d50"/>
  <rect x="140" y="70" width="4" height="8" fill="#1a1a35"/>
  <!-- Blade edge glow -->
  <rect x="144" y="30" width="2" height="48" fill="#6633cc" opacity="0.4"/>
  <rect x="138" y="30" width="2" height="48" fill="#6633cc" opacity="0.3"/>
  <!-- Handle/guard -->
  <rect x="135" y="78" width="14" height="4" fill="#3d2a00"/>
  <rect x="137" y="82" width="10" height="6" fill="#2a1d00"/>
  <rect x="139" y="88" width="6" height="10" fill="#1a1100"/>
  <!-- Grip wrapping -->
  <rect x="139" y="84" width="6" height="2" fill="#4d3500"/>
  <rect x="139" y="90" width="6" height="2" fill="#4d3500"/>
  <!-- Pommel -->
  <rect x="138" y="98" width="8" height="4" fill="#4a2068"/>
  <rect x="140" y="100" width="4" height="4" fill="#bf00ff" opacity="0.5"/>
</svg>
