<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Giraffe - side profile, Pokemon style -->
  <!-- Body (lower, compact) -->
  <ellipse cx="52" cy="75" rx="22" ry="14" fill="#DAA520"/>
  <!-- Giraffe body patches -->
  <ellipse cx="45" cy="72" rx="6" ry="5" fill="#8B4513" opacity="0.7"/>
  <ellipse cx="58" cy="68" rx="5" ry="6" fill="#8B4513" opacity="0.7"/>
  <ellipse cx="65" cy="76" rx="4" ry="5" fill="#8B4513" opacity="0.7"/>
  <!-- Neck (long) -->
  <rect x="30" y="30" width="12" height="48" rx="5" fill="#DAA520"/>
  <!-- Neck patches -->
  <ellipse cx="36" cy="40" rx="4" ry="5" fill="#8B4513" opacity="0.7"/>
  <ellipse cx="36" cy="55" rx="4" ry="5" fill="#8B4513" opacity="0.7"/>
  <!-- Head (small) -->
  <ellipse cx="24" cy="22" rx="12" ry="9" fill="#DAA520"/>
  <!-- Ossicones (horns) -->
  <rect x="18" y="10" width="3" height="8" rx="1.5" fill="#8B4513"/>
  <rect x="25" y="10" width="3" height="8" rx="1.5" fill="#8B4513"/>
  <!-- Ear -->
  <ellipse cx="14" cy="22" rx="5" ry="7" fill="#DAA520" transform="rotate(-20,14,22)"/>
  <!-- Eye -->
  <circle cx="18" cy="20" r="2.5" fill="#1a1a1a"/>
  <circle cx="17.2" cy="19.2" r="0.7" fill="white"/>
  <!-- Nostril -->
  <ellipse cx="13" cy="25" rx="1.5" ry="1" fill="#8B4513"/>
  <!-- Legs (long, thin) -->
  <rect x="34" y="86" width="5" height="14" rx="2" fill="#C8962A"/>
  <rect x="44" y="86" width="5" height="14" rx="2" fill="#C8962A"/>
  <rect x="58" y="86" width="5" height="14" rx="2" fill="#C8962A"/>
  <rect x="67" y="86" width="5" height="14" rx="2" fill="#C8962A"/>
  <!-- Tail -->
  <path d="M73,75 Q82,70 80,62" stroke="#DAA520" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="80" cy="60" rx="3" ry="4" fill="#8B4513"/>
</svg>
