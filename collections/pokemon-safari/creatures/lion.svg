<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Lion - side profile, Pokemon style -->
  <!-- Body -->
  <ellipse cx="50" cy="65" rx="25" ry="18" fill="#D4A017"/>
  <!-- Mane -->
  <circle cx="22" cy="50" r="18" fill="#8B4513" opacity="0.9"/>
  <!-- Head -->
  <circle cx="22" cy="50" r="13" fill="#D4A017"/>
  <!-- Ear -->
  <polygon points="12,34 17,24 22,34" fill="#D4A017"/>
  <!-- Eye -->
  <circle cx="16" cy="48" r="2.5" fill="#1a1a1a"/>
  <circle cx="15.2" cy="47.2" r="0.7" fill="white"/>
  <!-- Nose -->
  <ellipse cx="10" cy="53" rx="2" ry="1.5" fill="#8B4513"/>
  <!-- Mouth -->
  <path d="M9,55 Q10,57 11,55" stroke="#8B4513" stroke-width="1" fill="none"/>
  <!-- Legs -->
  <rect x="30" y="78" width="6" height="14" rx="2" fill="#C49010"/>
  <rect x="42" y="78" width="6" height="14" rx="2" fill="#C49010"/>
  <rect x="55" y="78" width="6" height="14" rx="2" fill="#C49010"/>
  <rect x="65" y="78" width="6" height="14" rx="2" fill="#C49010"/>
  <!-- Tail -->
  <path d="M74,65 Q88,55 85,45 Q88,42 86,38" stroke="#D4A017" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Tail tuft -->
  <ellipse cx="86" cy="36" rx="5" ry="4" fill="#8B4513"/>
</svg>
