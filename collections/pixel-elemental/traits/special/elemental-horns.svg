<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Trait: Elemental Horns - Curved horns growing from head -->
  <!-- Left horn -->
  <rect x="70" y="34" width="8" height="10" fill="#E8D8C0" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="66" y="24" width="8" height="12" fill="#D8C8B0" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="62" y="16" width="6" height="10" fill="#C8B8A0" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="58" y="10" width="6" height="8" fill="#B8A890" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Right horn -->
  <rect x="98" y="34" width="8" height="10" fill="#E8D8C0" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="102" y="24" width="8" height="12" fill="#D8C8B0" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="106" y="16" width="6" height="10" fill="#C8B8A0" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="110" y="10" width="6" height="8" fill="#B8A890" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Horn ridges -->
  <rect x="68" y="28" width="6" height="2" fill="#A89880"/>
  <rect x="64" y="20" width="5" height="2" fill="#A89880"/>
  <rect x="104" y="28" width="6" height="2" fill="#A89880"/>
  <rect x="108" y="20" width="5" height="2" fill="#A89880"/>
</svg>
