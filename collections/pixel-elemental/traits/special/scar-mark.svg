<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Trait: Scar Mark - Battle scar across face/body -->
  <!-- Main scar line (diagonal across face area) -->
  <rect x="82" y="38" width="4" height="6" fill="#CC6666"/>
  <rect x="86" y="42" width="4" height="6" fill="#CC6666"/>
  <rect x="90" y="46" width="4" height="6" fill="#CC6666"/>
  <rect x="94" y="50" width="4" height="6" fill="#CC6666"/>
  <rect x="98" y="54" width="4" height="6" fill="#CC6666"/>
  <rect x="102" y="58" width="4" height="6" fill="#CC6666"/>
  <!-- Scar edges (lighter) -->
  <rect x="80" y="38" width="2" height="4" fill="#DDAAAA" opacity="0.6"/>
  <rect x="104" y="60" width="2" height="4" fill="#DDAAAA" opacity="0.6"/>
  <!-- Body scar -->
  <rect x="60" y="90" width="4" height="6" fill="#CC6666" opacity="0.7"/>
  <rect x="64" y="94" width="4" height="6" fill="#CC6666" opacity="0.7"/>
  <rect x="68" y="98" width="4" height="6" fill="#CC6666" opacity="0.7"/>
  <rect x="72" y="102" width="4" height="6" fill="#CC6666" opacity="0.7"/>
</svg>
