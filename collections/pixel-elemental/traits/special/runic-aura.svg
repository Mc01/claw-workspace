<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Trait: Runic Aura - Ancient runes floating around body -->
  <!-- Rune 1 (cross-like) -->
  <rect x="30" y="40" width="2" height="12" fill="#9966FF" opacity="0.8"/>
  <rect x="26" y="44" width="10" height="2" fill="#9966FF" opacity="0.8"/>
  <!-- Rune 2 (arrow) -->
  <rect x="160" y="50" width="2" height="14" fill="#9966FF" opacity="0.7"/>
  <rect x="156" y="50" width="4" height="2" fill="#9966FF" opacity="0.7"/>
  <rect x="164" y="50" width="4" height="2" fill="#9966FF" opacity="0.7"/>
  <!-- Rune 3 (zigzag) -->
  <rect x="50" y="150" width="4" height="2" fill="#BB88FF" opacity="0.7"/>
  <rect x="54" y="150" width="2" height="8" fill="#BB88FF" opacity="0.7"/>
  <rect x="54" y="156" width="4" height="2" fill="#BB88FF" opacity="0.7"/>
  <rect x="56" y="148" width="2" height="8" fill="#BB88FF" opacity="0.7"/>
  <!-- Rune 4 (diamond) -->
  <rect x="148" y="140" width="8" height="8" fill="none" stroke="#9966FF" stroke-width="2" opacity="0.6" transform="rotate(45 152 144)"/>
  <!-- Rune 5 (lines) -->
  <rect x="80" y="12" width="2" height="10" fill="#BB88FF" opacity="0.6"/>
  <rect x="86" y="10" width="2" height="14" fill="#9966FF" opacity="0.6"/>
  <rect x="92" y="12" width="2" height="10" fill="#BB88FF" opacity="0.6"/>
  <!-- Aura glow ring -->
  <rect x="44" y="58" width="100" height="4" fill="#9966FF" opacity="0.08"/>
  <rect x="40" y="120" width="108" height="4" fill="#9966FF" opacity="0.08"/>
</svg>
