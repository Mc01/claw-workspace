<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Trait: Glowing Eyes - Intense glowing eye overlay -->
  <!-- Primary glow -->
  <rect x="86" y="46" width="14" height="14" fill="#FF0044" opacity="0.2"/>
  <!-- Eye white replacement -->
  <rect x="89" y="49" width="10" height="10" fill="#FF2266" stroke="#FF0044" stroke-width="2"/>
  <!-- Pupil -->
  <rect x="93" y="51" width="5" height="6" fill="#FFFFFF"/>
  <!-- Light beams -->
  <rect x="100" y="52" width="12" height="2" fill="#FF0044" opacity="0.4"/>
  <rect x="100" y="56" width="8" height="2" fill="#FF0044" opacity="0.3"/>
  <rect x="98" y="48" width="10" height="2" fill="#FF0044" opacity="0.3"/>
</svg>
