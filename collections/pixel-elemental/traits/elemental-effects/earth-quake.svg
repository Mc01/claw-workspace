<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Trait: Earth Quake - Rocks and debris erupting -->
  <!-- Rising rocks -->
  <rect x="30" y="150" width="12" height="12" fill="#8B7355" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="50" y="140" width="10" height="10" fill="#A08060" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="140" y="145" width="14" height="14" fill="#7B6345" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="160" y="138" width="8" height="10" fill="#9B7A58" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Smaller debris -->
  <rect x="70" y="160" width="6" height="6" fill="#A08060" opacity="0.8"/>
  <rect x="120" y="158" width="6" height="6" fill="#8B7355" opacity="0.8"/>
  <rect x="90" y="165" width="8" height="8" fill="#7B6345" opacity="0.7"/>
  <!-- Crack lines in ground -->
  <rect x="20" y="176" width="160" height="3" fill="#5A4020" opacity="0.6"/>
  <rect x="60" y="172" width="4" height="8" fill="#5A4020" opacity="0.5"/>
  <rect x="100" y="170" width="4" height="10" fill="#5A4020" opacity="0.5"/>
  <rect x="140" y="174" width="4" height="6" fill="#5A4020" opacity="0.4"/>
  <!-- Dust clouds -->
  <rect x="24" y="162" width="10" height="6" fill="#C8B090" opacity="0.4"/>
  <rect x="152" y="155" width="12" height="6" fill="#C8B090" opacity="0.4"/>
</svg>
