  <rect x="26" y="36" width="6" height="20" fill="#E0F0FF" stroke="#88C8E8" stroke-width="1"/>
  <rect x="32" y="42" width="4" height="12" fill="#D0E8FF" stroke="#88C8E8" stroke-width="1"/>
  <!-- Crystal cluster 2 -->
