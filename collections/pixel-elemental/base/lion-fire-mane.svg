<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Pixel Elemental Beast: Lion - Fire Mane | Side profile -->
  
  <!-- Mane (fiery, blocky flames) -->
  <rect x="60" y="30" width="12" height="12" fill="#FF4500" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="72" y="24" width="12" height="12" fill="#FF6600" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="84" y="20" width="12" height="12" fill="#FF4500" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="96" y="24" width="12" height="12" fill="#FF6600" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="108" y="30" width="12" height="12" fill="#FF4500" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="48" y="42" width="12" height="12" fill="#FF6600" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="108" y="42" width="12" height="12" fill="#FF6600" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="72" y="30" width="12" height="12" fill="#FFAA00" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="84" y="28" width="12" height="12" fill="#FFAA00" stroke="#1a1a1a" stroke-width="2"/>
