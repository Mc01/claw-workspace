  <!-- Head -->
  <rect x="60" y="42" width="48" height="36" fill="#E8A040" stroke="#1a1a1a" stroke-width="3"/>
  
  <!-- Eye -->
  <rect x="90" y="50" width="10" height="10" fill="#FFF" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="94" y="52" width="6" height="6" fill="#1a1a1a"/>
  
  <!-- Snout -->
  <rect x="108" y="58" width="20" height="16" fill="#D4903A" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="122" y="62" width="6" height="4" fill="#1a1a1a"/>
  
  <!-- Mouth -->
  <rect x="108" y="72" width="16" height="2" fill="#1a1a1a"/>
  
  <!-- Ear -->
  <rect x="64" y="32" width="10" height="12" fill="#E8A040" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="67" y="35" width="4" height="6" fill="#D4903A"/>
  
  <!-- Body -->
  <rect x="40" y="78" width="72" height="48" fill="#E8A040" stroke="#1a1a1a" stroke-width="3"/>
  
  <!-- Chest tuft -->
  <rect x="100" y="80" width="12" height="20" fill="#FFCC66" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Spine highlight -->
  <rect x="40" y="78" width="60" height="4" fill="#D4903A"/>
  
  <!-- Front leg -->
  <rect x="92" y="126" width="14" height="32" fill="#E8A040" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="90" y="154" width="18" height="10" fill="#D4903A" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Back leg -->
  <rect x="48" y="118" width="16" height="24" fill="#D4903A" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="44" y="138" width="14" height="14" fill="#E8A040" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="42" y="154" width="18" height="10" fill="#D4903A" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Tail -->
  <rect x="24" y="82" width="16" height="8" fill="#E8A040" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="14" y="74" width="14" height="12" fill="#E8A040" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="10" y="64" width="12" height="14" fill="#FF6600" stroke="#1a1a1a" stroke-width="2"/>
