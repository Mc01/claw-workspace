<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Pixel Elemental Beast: Beetle - Earth Shell | Side profile -->
  
  <!-- Back legs -->
  <rect x="44" y="130" width="10" height="24" fill="#5A3A1A" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="40" y="150" width="16" height="8" fill="#4A2A0A" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Middle legs -->
  <rect x="72" y="132" width="10" height="22" fill="#5A3A1A" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="68" y="150" width="16" height="8" fill="#4A2A0A" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Front legs -->
  <rect x="104" y="128" width="12" height="26" fill="#5A3A1A" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="100" y="150" width="18" height="8" fill="#4A2A0A" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Shell / Elytra (main body) -->
  <rect x="28" y="72" width="88" height="56" rx="4" fill="#8B6914" stroke="#1a1a1a" stroke-width="3"/>
  
  <!-- Shell center line -->
  <rect x="71" y="72" width="3" height="56" fill="#6B4904"/>
  
  <!-- Shell earth-tone patterns -->
  <rect x="36" y="80" width="16" height="12" fill="#A07828" stroke="#6B4904" stroke-width="1"/>
  <rect x="56" y="84" width="12" height="16" fill="#9B7320" stroke="#6B4904" stroke-width="1"/>
  <rect x="80" y="80" width="16" height="12" fill="#A07828" stroke="#6B4904" stroke-width="1"/>
  <rect x="100" y="88" width="12" height="14" fill="#9B7320" stroke="#6B4904" stroke-width="1"/>
  <rect x="36" y="100" width="14" height="16" fill="#9B7320" stroke="#6B4904" stroke-width="1"/>
  <rect x="88" y="104" width="20" height="12" fill="#A07828" stroke="#6B4904" stroke-width="1"/>
  
  <!-- Pronotum (thorax plate) -->
  <rect x="108" y="68" width="28" height="32" fill="#6B4904" stroke="#1a1a1a" stroke-width="3"/>
  
  <!-- Head -->
  <rect x="130" y="74" width="28" height="24" fill="#5A3A1A" stroke="#1a1a1a" stroke-width="3"/>
  
  <!-- Eye -->
  <rect x="146" y="78" width="8" height="8" fill="#CCFF66" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="149" y="80" width="4" height="4" fill="#1a1a1a"/>
  
  <!-- Mandibles -->
  <rect x="158" y="80" width="16" height="6" fill="#4A2A0A" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="158" y="88" width="14" height="6" fill="#4A2A0A" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="172" y="78" width="6" height="6" fill="#3A1A00" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="170" y="90" width="6" height="6" fill="#3A1A00" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Antennae -->
  <rect x="140" y="68" width="4" height="10" fill="#5A3A1A" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="138" y="58" width="4" height="12" fill="#5A3A1A" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="134" y="50" width="6" height="10" fill="#5A3A1A" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="130" y="44" width="6" height="8" fill="#8B6914" stroke="#1a1a1a" stroke-width="2"/>
  
  <rect x="148" y="68" width="4" height="8" fill="#5A3A1A" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="150" y="58" width="4" height="12" fill="#5A3A1A" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="154" y="48" width="6" height="12" fill="#5A3A1A" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="158" y="42" width="6" height="8" fill="#8B6914" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Horn -->
  <rect x="152" y="70" width="8" height="6" fill="#4A2A0A" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="158" y="64" width="6" height="10" fill="#3A1A00" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="162" y="58" width="6" height="10" fill="#3A1A00" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Earth/crystal accents on shell -->
  <rect x="30" y="120" width="6" height="8" fill="#88CC44" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="112" y="94" width="4" height="6" fill="#88CC44" stroke="#1a1a1a" stroke-width="1"/>
</svg>
