<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Pixel Elemental Beast: Eagle - Wind Talons | Side profile -->
  
  <!-- Tail feathers -->
  <rect x="10" y="90" width="20" height="8" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="6" y="82" width="18" height="8" fill="#5BA0E9" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="14" y="98" width="16" height="8" fill="#5BA0E9" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Body -->
  <rect x="40" y="72" width="60" height="44" fill="#4A90D9" stroke="#1a1a1a" stroke-width="3"/>
  
  <!-- Wing (folded, layered feathers) -->
  <rect x="36" y="68" width="52" height="10" fill="#3A80C9" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="32" y="60" width="48" height="10" fill="#5BA0E9" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="28" y="52" width="40" height="10" fill="#6BB0F9" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Wing tip feathers (extended) -->
  <rect x="20" y="44" width="14" height="10" fill="#7BC0FF" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="14" y="38" width="10" height="10" fill="#8DD0FF" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Chest / belly -->
  <rect x="88" y="78" width="16" height="30" fill="#E8E8F0" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Neck -->
  <rect x="96" y="54" width="16" height="24" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Head -->
  <rect x="92" y="30" width="32" height="28" fill="#E8E8F0" stroke="#1a1a1a" stroke-width="3"/>
  
  <!-- Eye -->
  <rect x="110" y="36" width="10" height="10" fill="#FFD700" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="114" y="38" width="5" height="6" fill="#1a1a1a"/>
  
  <!-- Beak -->
  <rect x="124" y="40" width="20" height="8" fill="#FF8C00" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="124" y="48" width="16" height="6" fill="#E07000" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="140" y="40" width="8" height="4" fill="#E07000" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Brow ridge -->
  <rect x="106" y="30" width="18" height="4" fill="#3A80C9" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Head crest -->
  <rect x="92" y="22" width="8" height="10" fill="#4A90D9" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="100" y="18" width="8" height="10" fill="#5BA0E9" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Legs -->
  <rect x="70" y="116" width="8" height="28" fill="#FF8C00" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="90" y="116" width="8" height="28" fill="#FF8C00" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Talons (front leg) -->
  <rect x="86" y="144" width="6" height="8" fill="#FF8C00" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="92" y="148" width="8" height="8" fill="#FF8C00" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="100" y="150" width="6" height="6" fill="#E07000" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Talons (back leg) -->
  <rect x="66" y="144" width="6" height="8" fill="#FF8C00" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="72" y="148" width="8" height="8" fill="#FF8C00" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="80" y="150" width="6" height="6" fill="#E07000" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- Wind swirl marks around talons -->
  <rect x="106" y="142" width="8" height="3" fill="#B0D8FF" opacity="0.8"/>
  <rect x="110" y="148" width="10" height="3" fill="#B0D8FF" opacity="0.6"/>
  <rect x="58" y="146" width="8" height="3" fill="#B0D8FF" opacity="0.8"/>
</svg>
