<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Trait: Stick Insect Insect</title>
  <defs>
    <style>
      .body-seg { fill: #5a7a30; stroke: #3a5018; stroke-width: 1.5; }
      .leg { fill: none; stroke: #4a6828; stroke-width: 2.5; stroke-linecap: round; }
      .antenna { fill: none; stroke: #3a5018; stroke-width: 1.5; stroke-linecap: round; }
      .eye { fill: #cc8800; stroke: #884400; stroke-width: 1; }
      .thorn { fill: #3a5018; }
    </style>
  </defs>

  <!-- Stick insect camouflaged on shoulder/arm area -->
  <!-- Looks like a twig -->

  <!-- Main body (elongated, stick-like) -->
  <!-- Head -->
  <ellipse cx="268" cy="138" rx="7" ry="5" class="body-seg"/>
  <!-- Prothorax -->
  <rect x="262" y="143" width="12" height="22" rx="5" class="body-seg"/>
  <!-- Mesothorax -->
  <rect x="263" y="165" width="11" height="20" rx="4" class="body-seg"/>
  <!-- Metathorax -->
  <rect x="263" y="185" width="11" height="18" rx="4" class="body-seg"/>
  <!-- Abdomen segments -->
  <rect x="264" y="203" width="10" height="22" rx="4" class="body-seg"/>
  <rect x="265" y="225" width="9" height="22" rx="4" class="body-seg"/>
  <rect x="265" y="247" width="9" height="20" rx="4" class="body-seg"/>
  <rect x="266" y="267" width="8" height="18" rx="4" class="body-seg"/>
  <!-- Tail tip -->
  <ellipse cx="270" cy="287" rx="4" ry="7" class="body-seg"/>

  <!-- Thorn-like protrusions on body -->
  <path d="M262 153 Q256 150 254 146" class="thorn" stroke="#3a5018" stroke-width="2" fill="none"/>
  <path d="M274 160 Q280 157 282 153" class="thorn" stroke="#3a5018" stroke-width="2" fill="none"/>
  <path d="M262 175 Q256 172 254 167" class="thorn" stroke="#3a5018" stroke-width="2" fill="none"/>
  <path d="M274 182 Q280 178 283 174" class="thorn" stroke="#3a5018" stroke-width="2" fill="none"/>

  <!-- 6 legs (3 pairs) -->
  <!-- Front leg pair (prothorax) -->
  <path d="M262 150 Q248 148 238 142 Q228 138 222 132" class="leg"/>
  <path d="M274 150 Q288 148 298 142 Q308 138 314 132" class="leg"/>

  <!-- Middle leg pair (mesothorax) -->
  <path d="M263 172 Q248 178 238 188 Q228 196 222 205" class="leg"/>
  <path d="M274 172 Q289 178 299 188 Q309 196 315 205" class="leg"/>

  <!-- Back leg pair (metathorax) -->
  <path d="M263 190 Q246 202 236 215 Q228 226 225 238" class="leg"/>
  <path d="M274 190 Q291 202 301 215 Q309 226 312 238" class="leg"/>

  <!-- Claw tips -->
  <path d="M222 132 Q218 128 216 124" class="leg" stroke-width="1.5"/>
  <path d="M314 132 Q318 128 320 124" class="leg" stroke-width="1.5"/>
  <path d="M222 205 Q218 212 214 216" class="leg" stroke-width="1.5"/>
  <path d="M315 205 Q319 212 323 216" class="leg" stroke-width="1.5"/>

  <!-- Eyes (compound) -->
  <circle cx="264" cy="136" r="3" class="eye"/>
  <circle cx="264" cy="136" r="1.5" fill="#441a00"/>
  <circle cx="274" cy="136" r="3" class="eye"/>
  <circle cx="274" cy="136" r="1.5" fill="#441a00"/>

  <!-- Antennae (very long) -->
  <path d="M262 134 Q248 122 232 108 Q218 94 210 82" class="antenna"/>
  <path d="M276 134 Q290 122 306 108 Q320 94 328 82" class="antenna"/>

  <!-- Body color variation (camouflage markings) -->
  <path d="M264 210 L268 210" stroke="#7a9a50" stroke-width="2" opacity="0.6"/>
  <path d="M264 225 L268 225" stroke="#7a9a50" stroke-width="2" opacity="0.6"/>
  <path d="M264 240 L268 240" stroke="#7a9a50" stroke-width="2" opacity="0.6"/>
  <path d="M265 255 L269 255" stroke="#7a9a50" stroke-width="2" opacity="0.6"/>

  <!-- Label -->
  <rect x="8" y="372" width="128" height="22" rx="5" fill="#3a5018" opacity="0.88"/>
  <text x="72" y="387" text-anchor="middle" font-family="monospace" font-size="10" fill="white">STICK INSECT</text>
</svg>
