<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Trait: Night Vision Goggles Gear</title>
  <defs>
    <style>
      .frame { fill: #1a1a1a; stroke: #0a0a0a; stroke-width: 2.5; stroke-linejoin: round; }
      .lens { fill: #0a2a0a; stroke: #1a5a1a; stroke-width: 2; }
      .lens-glow { fill: #00ff44; opacity: 0.35; }
      .lens-ring { fill: none; stroke: #2a8a2a; stroke-width: 2; }
      .strap { fill: #2a2a2a; stroke: #1a1a1a; stroke-width: 1.5; }
      .chrome { fill: #888; stroke: #666; stroke-width: 1; }
      .led { fill: #00ff44; }
    </style>
  </defs>

  <!-- Head strap -->
  <path d="M148 128 Q148 118 200 114 Q252 118 252 128" class="strap" stroke-width="10" fill="none" stroke="none"/>
  <rect x="148" y="114" width="104" height="14" rx="7" class="strap"/>
  <!-- Strap adjustment -->
  <rect x="192" y="110" width="16" height="8" rx="3" class="chrome"/>
  <line x1="200" y1="110" x2="200" y2="118" stroke="#666" stroke-width="1.5"/>

  <!-- Main goggle body -->
  <rect x="155" y="124" width="90" height="32" rx="10" class="frame"/>

  <!-- Left lens housing -->
  <circle cx="176" cy="140" r="16" class="frame"/>
  <!-- Left lens -->
  <circle cx="176" cy="140" r="13" class="lens"/>
  <circle cx="176" cy="140" r="11" class="lens-glow"/>
  <circle cx="176" cy="140" r="8" fill="#00aa22" opacity="0.5"/>
  <circle cx="176" cy="140" r="5" fill="#00cc33" opacity="0.7"/>
  <!-- Lens cross hairs -->
  <line x1="168" y1="140" x2="184" y2="140" stroke="#00ff44" stroke-width="0.8" opacity="0.8"/>
  <line x1="176" y1="132" x2="176" y2="148" stroke="#00ff44" stroke-width="0.8" opacity="0.8"/>
  <!-- Lens shine -->
  <circle cx="172" cy="136" r="3" fill="white" opacity="0.15"/>
  <circle cx="176" cy="140" r="13" class="lens-ring"/>

  <!-- Right lens housing -->
  <circle cx="224" cy="140" r="16" class="frame"/>
  <!-- Right lens -->
  <circle cx="224" cy="140" r="13" class="lens"/>
  <circle cx="224" cy="140" r="11" class="lens-glow"/>
  <circle cx="224" cy="140" r="8" fill="#00aa22" opacity="0.5"/>
  <circle cx="224" cy="140" r="5" fill="#00cc33" opacity="0.7"/>
  <!-- Lens cross hairs -->
  <line x1="216" y1="140" x2="232" y2="140" stroke="#00ff44" stroke-width="0.8" opacity="0.8"/>
  <line x1="224" y1="132" x2="224" y2="148" stroke="#00ff44" stroke-width="0.8" opacity="0.8"/>
  <!-- Lens shine -->
  <circle cx="220" cy="136" r="3" fill="white" opacity="0.15"/>
  <circle cx="224" cy="140" r="13" class="lens-ring"/>

  <!-- Center bridge with controls -->
  <rect x="191" y="128" width="18" height="24" rx="5" class="frame"/>
  <!-- Control button -->
  <circle cx="200" cy="137" r="4" fill="#333" stroke="#555" stroke-width="1"/>
  <circle cx="200" cy="137" r="2.5" fill="#00ff44" opacity="0.8"/>

  <!-- IR emitter tubes (sticking forward) -->
  <rect x="162" y="136" width="20" height="10" rx="5" fill="#111" stroke="#0a0a0a" stroke-width="1.5"/>
  <ellipse cx="162" cy="141" rx="5" ry="5" fill="#0a1a0a"/>
  <circle cx="162" cy="141" r="3" fill="#001a00"/>
  <circle cx="162" cy="141" r="1.5" class="led" opacity="0.6"/>

  <rect x="218" y="136" width="20" height="10" rx="5" fill="#111" stroke="#0a0a0a" stroke-width="1.5"/>
  <ellipse cx="238" cy="141" rx="5" ry="5" fill="#0a1a0a"/>
  <circle cx="238" cy="141" r="3" fill="#001a00"/>
  <circle cx="238" cy="141" r="1.5" class="led" opacity="0.6"/>

  <!-- Side strap connection -->
  <rect x="148" y="130" width="12" height="20" rx="5" class="strap"/>
  <rect x="240" y="130" width="12" height="20" rx="5" class="strap"/>

  <!-- Power LED indicator (red on top) -->
  <circle cx="200" cy="124" r="4" fill="#cc0000" stroke="#880000" stroke-width="1"/>
  <circle cx="200" cy="124" r="2.5" fill="#ff2222" opacity="0.8"/>

  <!-- Label -->
  <rect x="8" y="372" width="168" height="22" rx="5" fill="#0a2a0a" opacity="0.88"/>
  <text x="92" y="387" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff44">NIGHT VISION GOGGLES</text>
</svg>
