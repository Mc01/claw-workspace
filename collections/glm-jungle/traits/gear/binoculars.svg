<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Trait: Binoculars Gear</title>
  <defs>
    <style>
      .body { fill: #1a1a1a; stroke: #0a0a0a; stroke-width: 2; }
      .lens { fill: #1a3a5a; stroke: #0d2040; stroke-width: 2; }
      .lens-shine { fill: #2a6aaa; opacity: 0.6; }
      .lens-ring { fill: none; stroke: #888; stroke-width: 2; }
      .strap { fill: none; stroke: #5a3a10; stroke-width: 6; stroke-linecap: round; }
      .detail { fill: #2a2a2a; stroke: #111; stroke-width: 1; }
      .chrome { fill: #aaaaaa; stroke: #777; stroke-width: 1; }
    </style>
  </defs>

  <!-- Strap around neck -->
  <path d="M165 158 Q148 175 148 200 Q150 218 165 225" class="strap"/>
  <path d="M235 158 Q252 175 252 200 Q250 218 235 225" class="strap"/>

  <!-- Binoculars body hanging at chest level -->
  <!-- Main housing -->
  <rect x="158" y="225" width="38" height="42" rx="10" class="body"/>
  <rect x="204" y="225" width="38" height="42" rx="10" class="body"/>
  <!-- Bridge connecting the two barrels -->
  <rect x="193" y="232" width="14" height="28" rx="5" class="detail"/>

  <!-- Focus wheel in center -->
  <ellipse cx="200" cy="248" rx="8" ry="6" class="chrome"/>
  <ellipse cx="200" cy="248" rx="5" ry="4" fill="#888"/>
  <!-- Focus wheel ridges -->
  <line x1="193" y1="248" x2="207" y2="248" stroke="#666" stroke-width="1.5"/>
  <line x1="200" y1="242" x2="200" y2="254" stroke="#666" stroke-width="1.5"/>
  <line x1="195" y1="243.5" x2="205" y2="252.5" stroke="#555" stroke-width="1"/>
  <line x1="205" y1="243.5" x2="195" y2="252.5" stroke="#555" stroke-width="1"/>

  <!-- Left objective lens -->
  <circle cx="177" cy="258" r="14" class="lens"/>
  <circle cx="177" cy="258" r="11" fill="#0d2848"/>
  <circle cx="177" cy="258" r="8" class="lens-shine"/>
  <circle cx="177" cy="258" r="5" fill="#1a4878"/>
  <!-- Lens reflection -->
  <circle cx="173" cy="254" r="3" fill="white" opacity="0.25"/>
  <circle cx="177" cy="258" r="14" class="lens-ring"/>

  <!-- Right objective lens -->
  <circle cx="223" cy="258" r="14" class="lens"/>
  <circle cx="223" cy="258" r="11" fill="#0d2848"/>
  <circle cx="223" cy="258" r="8" class="lens-shine"/>
  <circle cx="223" cy="258" r="5" fill="#1a4878"/>
  <!-- Lens reflection -->
  <circle cx="219" cy="254" r="3" fill="white" opacity="0.25"/>
  <circle cx="223" cy="258" r="14" class="lens-ring"/>

  <!-- Eyepiece end (near face) -->
  <ellipse cx="177" cy="228" rx="12" ry="6" class="body"/>
  <ellipse cx="177" cy="228" rx="9" ry="4" fill="#111"/>
  <ellipse cx="223" cy="228" rx="12" ry="6" class="body"/>
  <ellipse cx="223" cy="228" rx="9" ry="4" fill="#111"/>

  <!-- Rubber eye guards -->
  <ellipse cx="177" cy="226" rx="10" ry="5" fill="#2a2a2a" stroke="#111" stroke-width="1"/>
  <ellipse cx="223" cy="226" rx="10" ry="5" fill="#2a2a2a" stroke="#111" stroke-width="1"/>

  <!-- Strap connector clips -->
  <rect x="162" y="222" width="10" height="8" rx="2" class="chrome"/>
  <rect x="228" y="222" width="10" height="8" rx="2" class="chrome"/>

  <!-- Label -->
  <rect x="8" y="372" width="118" height="22" rx="5" fill="#1a1a2e" opacity="0.88"/>
  <text x="67" y="387" text-anchor="middle" font-family="monospace" font-size="10" fill="white">BINOCULARS</text>
</svg>
