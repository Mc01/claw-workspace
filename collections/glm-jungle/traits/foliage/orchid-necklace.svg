<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Trait: Orchid Necklace Foliage</title>
  <defs>
    <style>
      .petal { stroke-width: 1.5; }
      .vine-strand { fill: none; stroke: #4a7c20; stroke-width: 3; stroke-linecap: round; }
      .leaf-small { fill: #22c55e; stroke: #15803d; stroke-width: 1; }
    </style>
  </defs>

  <!-- Vine strand forming necklace -->
  <path d="M158 156 Q168 168 200 174 Q232 168 242 156" class="vine-strand"/>
  <path d="M158 156 Q152 148 155 138" class="vine-strand"/>
  <path d="M242 156 Q248 148 245 138" class="vine-strand"/>

  <!-- 5 orchid flowers hanging on necklace -->
  <!-- Center orchid (largest) -->
  <!-- Purple orchid -->
  <ellipse cx="200" cy="180" rx="12" ry="8" fill="#a855f7" stroke="#7e22ce" stroke-width="1.5" transform="rotate(-30 200 180)"/>
  <ellipse cx="200" cy="180" rx="12" ry="8" fill="#a855f7" stroke="#7e22ce" stroke-width="1.5" transform="rotate(30 200 180)"/>
  <ellipse cx="200" cy="180" rx="12" ry="8" fill="#c084fc" stroke="#a855f7" stroke-width="1.5" transform="rotate(0 200 180)"/>
  <ellipse cx="200" cy="182" rx="8" ry="5" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="1.2"/>
  <circle cx="200" cy="181" r="4" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <circle cx="200" cy="181" r="2" fill="#f59e0b"/>

  <!-- Left orchid 1 -->
  <ellipse cx="178" cy="176" rx="10" ry="6" fill="#ec4899" stroke="#be185d" stroke-width="1.5" transform="rotate(-25 178 176)"/>
  <ellipse cx="178" cy="176" rx="10" ry="6" fill="#ec4899" stroke="#be185d" stroke-width="1.5" transform="rotate(25 178 176)"/>
  <ellipse cx="178" cy="176" rx="10" ry="6" fill="#f472b6" stroke="#ec4899" stroke-width="1.5"/>
  <ellipse cx="178" cy="178" rx="6" ry="4" fill="#fdf2f8" stroke="#fbcfe8" stroke-width="1"/>
  <circle cx="178" cy="177" r="3" fill="#fbbf24"/>

  <!-- Left orchid 2 -->
  <ellipse cx="160" cy="168" rx="9" ry="6" fill="#818cf8" stroke="#4338ca" stroke-width="1.5" transform="rotate(-30 160 168)"/>
  <ellipse cx="160" cy="168" rx="9" ry="6" fill="#818cf8" stroke="#4338ca" stroke-width="1.5" transform="rotate(30 160 168)"/>
  <ellipse cx="160" cy="168" rx="9" ry="6" fill="#a5b4fc" stroke="#818cf8" stroke-width="1.5"/>
  <ellipse cx="160" cy="170" rx="5" ry="3.5" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <circle cx="160" cy="169" r="2.5" fill="#fbbf24"/>

  <!-- Right orchid 1 -->
  <ellipse cx="222" cy="176" rx="10" ry="6" fill="#f97316" stroke="#c2410c" stroke-width="1.5" transform="rotate(25 222 176)"/>
  <ellipse cx="222" cy="176" rx="10" ry="6" fill="#f97316" stroke="#c2410c" stroke-width="1.5" transform="rotate(-25 222 176)"/>
  <ellipse cx="222" cy="176" rx="10" ry="6" fill="#fb923c" stroke="#f97316" stroke-width="1.5"/>
  <ellipse cx="222" cy="178" rx="6" ry="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <circle cx="222" cy="177" r="3" fill="#fbbf24"/>

  <!-- Right orchid 2 -->
  <ellipse cx="240" cy="168" rx="9" ry="6" fill="#34d399" stroke="#059669" stroke-width="1.5" transform="rotate(30 240 168)"/>
  <ellipse cx="240" cy="168" rx="9" ry="6" fill="#34d399" stroke="#059669" stroke-width="1.5" transform="rotate(-30 240 168)"/>
  <ellipse cx="240" cy="168" rx="9" ry="6" fill="#6ee7b7" stroke="#34d399" stroke-width="1.5"/>
  <ellipse cx="240" cy="170" rx="5" ry="3.5" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <circle cx="240" cy="169" r="2.5" fill="#fbbf24"/>

  <!-- Small leaves along vine -->
  <ellipse cx="170" cy="160" rx="8" ry="5" class="leaf-small" transform="rotate(-20 170 160)"/>
  <ellipse cx="186" cy="164" rx="7" ry="4" class="leaf-small" transform="rotate(-10 186 164)"/>
  <ellipse cx="214" cy="164" rx="7" ry="4" class="leaf-small" transform="rotate(10 214 164)"/>
  <ellipse cx="230" cy="160" rx="8" ry="5" class="leaf-small" transform="rotate(20 230 160)"/>

  <!-- Label -->
  <rect x="8" y="372" width="148" height="22" rx="5" fill="#7e22ce" opacity="0.88"/>
  <text x="82" y="387" text-anchor="middle" font-family="monospace" font-size="10" fill="white">ORCHID NECKLACE</text>
</svg>
