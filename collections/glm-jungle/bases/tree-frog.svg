<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>GLM Jungle - Tree Frog</title>
  <defs>
    <style>
      .body { fill: #22c55e; stroke: #15803d; stroke-width: 2.5; stroke-linejoin: round; }
      .belly { fill: #bbf7d0; stroke: #86efac; stroke-width: 1.5; }
      .eye-bulge { fill: #fbbf24; stroke: #d97706; stroke-width: 2; }
      .eye-pupil { fill: #1a0a00; }
      .eye-shine { fill: white; opacity: 0.9; }
      .toe-pad { fill: #f97316; stroke: #ea580c; stroke-width: 1.5; }
      .stripe { fill: #16a34a; }
      .spot { fill: #facc15; opacity: 0.8; }
      .tongue { fill: #ec4899; }
    </style>
  </defs>

  <!-- Background: rainforest canopy -->
  <rect width="400" height="400" fill="#052e0f"/>
  <circle cx="200" cy="-50" r="300" fill="#064e1e" opacity="0.5"/>
  <!-- Dappled light -->
  <circle cx="280" cy="80" r="60" fill="#0a7a28" opacity="0.3"/>
  <circle cx="120" cy="130" r="50" fill="#0a7a28" opacity="0.25"/>

  <!-- Leaf / branch the frog sits on -->
  <ellipse cx="200" cy="370" rx="180" ry="30" fill="#15803d" opacity="0.6"/>
  <path d="M50 370 Q200 345 350 370" stroke="#166534" stroke-width="3" fill="none"/>

  <!-- Back legs (long, folded) -->
  <!-- Left back leg -->
  <path d="M148 295 Q110 320 105 355" stroke="#22c55e" stroke-width="20" fill="none" stroke-linecap="round"/>
  <path d="M105 355 Q100 370 108 378" stroke="#22c55e" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Left back toes with pads -->
  <path d="M104 374 Q92 380 86 376" stroke="#22c55e" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="84" cy="375" r="7" class="toe-pad"/>
  <path d="M104 374 Q100 385 96 384" stroke="#22c55e" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="95" cy="386" r="7" class="toe-pad"/>
  <path d="M104 374 Q108 385 112 383" stroke="#22c55e" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="113" cy="385" r="7" class="toe-pad"/>
  <path d="M104 374 Q115 378 118 374" stroke="#22c55e" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="120" cy="373" r="7" class="toe-pad"/>

  <!-- Right back leg -->
  <path d="M252 295 Q290 320 295 355" stroke="#22c55e" stroke-width="20" fill="none" stroke-linecap="round"/>
  <path d="M295 355 Q300 370 292 378" stroke="#22c55e" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Right back toes -->
  <path d="M296 374 Q308 380 314 376" stroke="#22c55e" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="316" cy="375" r="7" class="toe-pad"/>
  <path d="M296 374 Q300 385 304 384" stroke="#22c55e" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="305" cy="386" r="7" class="toe-pad"/>
  <path d="M296 374 Q292 385 288 383" stroke="#22c55e" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="287" cy="385" r="7" class="toe-pad"/>
  <path d="M296 374 Q285 378 282 374" stroke="#22c55e" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="280" cy="373" r="7" class="toe-pad"/>

  <!-- Body -->
  <ellipse cx="200" cy="275" rx="88" ry="72" class="body"/>
  <!-- Belly -->
  <ellipse cx="200" cy="290" rx="55" ry="52" class="belly"/>

  <!-- Side stripe detail -->
  <path d="M118 255 Q112 275 118 295" stroke="#16a34a" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M282 255 Q288 275 282 295" stroke="#16a34a" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Front legs (shorter) -->
  <!-- Left front -->
  <path d="M148 278 Q118 295 112 318" stroke="#22c55e" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M112 318 Q108 330 114 336" stroke="#22c55e" stroke-width="13" fill="none" stroke-linecap="round"/>
  <!-- Left front toe pads -->
  <circle cx="103" cy="338" r="6" class="toe-pad"/>
  <circle cx="112" cy="342" r="6" class="toe-pad"/>
  <circle cx="122" cy="342" r="6" class="toe-pad"/>
  <circle cx="130" cy="337" r="6" class="toe-pad"/>

  <!-- Right front -->
  <path d="M252 278 Q282 295 288 318" stroke="#22c55e" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M288 318 Q292 330 286 336" stroke="#22c55e" stroke-width="13" fill="none" stroke-linecap="round"/>
  <!-- Right front toe pads -->
  <circle cx="297" cy="338" r="6" class="toe-pad"/>
  <circle cx="288" cy="342" r="6" class="toe-pad"/>
  <circle cx="278" cy="342" r="6" class="toe-pad"/>
  <circle cx="270" cy="337" r="6" class="toe-pad"/>

  <!-- Head -->
  <ellipse cx="200" cy="210" rx="72" ry="60" class="body"/>

  <!-- Wide mouth -->
  <path d="M148 220 Q200 242 252 220" stroke="#15803d" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Slightly open / tongue hint -->
  <path d="M175 225 Q200 238 225 225" fill="#d1fae5" stroke="#86efac" stroke-width="1.5"/>
  <!-- Tongue curl -->
  <path d="M192 232 Q200 242 208 232" stroke="#ec4899" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Belly pattern dots (poison dart frog style) -->
  <circle cx="192" cy="285" r="6" class="spot"/>
  <circle cx="208" cy="285" r="6" class="spot"/>
  <circle cx="200" cy="298" r="6" class="spot"/>
  <circle cx="185" cy="300" r="5" class="spot"/>
  <circle cx="215" cy="300" r="5" class="spot"/>

  <!-- Huge bulging eyes -->
  <circle cx="168" cy="192" r="24" class="eye-bulge"/>
  <circle cx="168" cy="192" r="17" class="eye-pupil"/>
  <!-- Horizontal pupil slit -->
  <ellipse cx="168" cy="192" r="17" ry="10" fill="#1a0a00"/>
  <ellipse cx="168" cy="192" rx="8" ry="16" fill="#1a0a00"/>
  <circle cx="173" cy="187" r="5" class="eye-shine"/>

  <circle cx="232" cy="192" r="24" class="eye-bulge"/>
  <circle cx="232" cy="192" r="17" class="eye-pupil"/>
  <ellipse cx="232" cy="192" rx="17" ry="10" fill="#1a0a00"/>
  <ellipse cx="232" cy="192" rx="8" ry="16" fill="#1a0a00"/>
  <circle cx="237" cy="187" r="5" class="eye-shine"/>

  <!-- Nostril dots -->
  <circle cx="190" cy="212" r="4" fill="#15803d"/>
  <circle cx="210" cy="212" r="4" fill="#15803d"/>

  <!-- GLM tag -->
  <rect x="8" y="8" width="112" height="26" rx="7" fill="#16a34a" opacity="0.92"/>
  <text x="64" y="25.5" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="white">GLM TREE FROG</text>
</svg>
