<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>GLM Jungle - Okapi</title>
  <defs>
    <style>
      .body { fill: #8B6914; stroke: #5a4008; stroke-width: 2.5; stroke-linejoin: round; }
      .stripe { fill: #f0f0e0; stroke: #ccc; stroke-width: 0.5; }
      .head { fill: #7a5c10; stroke: #5a4008; stroke-width: 2.5; }
      .dark { fill: #1a1200; }
      .eye-shine { fill: white; opacity: 0.8; }
      .hoof { fill: #2a2a2a; stroke: #111; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Background: deep jungle -->
  <rect width="400" height="400" fill="#0d2010"/>
  <ellipse cx="200" cy="420" rx="280" ry="200" fill="#1a3a10" opacity="0.6"/>
  <ellipse cx="80" cy="200" rx="60" ry="250" fill="#153010" opacity="0.5"/>
  <ellipse cx="320" cy="180" rx="55" ry="240" fill="#153010" opacity="0.5"/>

  <!-- Tail -->
  <path d="M288 238 Q330 215 320 265" stroke="#8B6914" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M320 265 Q332 280 324 292" stroke="#5a4008" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Back legs with zebra stripes -->
  <rect x="220" y="290" width="26" height="72" rx="10" class="body"/>
  <rect x="220" y="296" width="26" height="11" rx="3" class="stripe"/>
  <rect x="220" y="316" width="26" height="11" rx="3" class="stripe"/>
  <rect x="220" y="336" width="26" height="11" rx="3" class="stripe"/>
  <ellipse cx="233" cy="364" rx="14" ry="7" class="hoof"/>

  <rect x="252" y="290" width="26" height="72" rx="10" class="body"/>
  <rect x="252" y="296" width="26" height="11" rx="3" class="stripe"/>
  <rect x="252" y="316" width="26" height="11" rx="3" class="stripe"/>
  <rect x="252" y="336" width="26" height="11" rx="3" class="stripe"/>
  <ellipse cx="265" cy="364" rx="14" ry="7" class="hoof"/>

  <!-- Body -->
  <ellipse cx="200" cy="242" rx="95" ry="68" class="body"/>
  <!-- Belly highlight -->
  <ellipse cx="200" cy="258" rx="58" ry="42" fill="#a07c20" stroke="none"/>

  <!-- Front legs with zebra stripes -->
  <rect x="148" y="288" width="26" height="72" rx="10" class="body"/>
  <rect x="148" y="294" width="26" height="11" rx="3" class="stripe"/>
  <rect x="148" y="314" width="26" height="11" rx="3" class="stripe"/>
  <rect x="148" y="334" width="26" height="11" rx="3" class="stripe"/>
  <ellipse cx="161" cy="362" rx="14" ry="7" class="hoof"/>

  <rect x="178" y="288" width="26" height="72" rx="10" class="body"/>
  <rect x="178" y="294" width="26" height="11" rx="3" class="stripe"/>
  <rect x="178" y="314" width="26" height="11" rx="3" class="stripe"/>
  <rect x="178" y="334" width="26" height="11" rx="3" class="stripe"/>
  <ellipse cx="191" cy="362" rx="14" ry="7" class="hoof"/>

  <!-- Neck -->
  <rect x="168" y="152" width="58" height="85" rx="22" class="body"/>

  <!-- Head -->
  <ellipse cx="196" cy="136" rx="44" ry="34" class="head"/>
  <!-- Long okapi snout -->
  <ellipse cx="220" cy="148" rx="30" ry="15" class="head"/>
  <!-- Nostril -->
  <ellipse cx="242" cy="152" rx="6" ry="4" fill="#4a3508"/>
  <!-- Mouth line -->
  <path d="M225 158 Q232 162 240 158" stroke="#4a3508" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Ossicones (small horns) -->
  <rect x="184" y="104" width="8" height="20" rx="4" fill="#5a4008"/>
  <circle cx="188" cy="103" r="5" fill="#6b5010"/>
  <rect x="200" y="102" width="8" height="22" rx="4" fill="#5a4008"/>
  <circle cx="204" cy="101" r="5" fill="#6b5010"/>

  <!-- Ear -->
  <ellipse cx="170" cy="116" rx="11" ry="18" fill="#7a5c10" stroke="#5a4008" stroke-width="1.5"/>
  <ellipse cx="170" cy="116" rx="6" ry="12" fill="#c8806a" opacity="0.7"/>

  <!-- Eye -->
  <circle cx="182" cy="128" r="9" fill="#1a1200"/>
  <circle cx="182" cy="128" r="6" fill="#0d0800"/>
  <circle cx="184" cy="126" r="2.5" class="eye-shine"/>

  <!-- Mane / ridge -->
  <path d="M183 108 Q195 92 207 105" stroke="#5a4008" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M188 104 Q195 86 202 100" stroke="#4a3808" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- GLM tag -->
  <rect x="8" y="8" width="88" height="26" rx="7" fill="#16a34a" opacity="0.92"/>
  <text x="52" y="25.5" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="white">GLM OKAPI</text>
</svg>
