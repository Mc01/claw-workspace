<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Giraffe Base Body - African Safari Collection v1 -->
  <defs>
    <style>
      .body { fill: #E8C06A; stroke: #9A7830; stroke-width: 2.5; stroke-linejoin: round; }
      .patch { fill: #8B5E1A; opacity: 0.75; }
      .belly { fill: #F0D898; stroke: #C8A048; stroke-width: 1.5; }
      .face { fill: #D4AA58; stroke: #9A7830; stroke-width: 2.5; }
      .leg { fill: #D4AA58; stroke: #9A7830; stroke-width: 2; }
      .hoof { fill: #3A2810; stroke: #1A1000; stroke-width: 1.5; }
      .outline { fill: none; stroke: #9A7830; stroke-width: 2; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Long neck -->
  <rect x="168" y="48" width="64" height="200" rx="28" class="body"/>
  <!-- Neck patches (giraffe pattern on neck) -->
  <rect x="174" y="60" width="52" height="32" rx="12" class="patch"/>
  <rect x="172" y="108" width="24" height="28" rx="10" class="patch"/>
  <rect x="204" y="100" width="22" height="30" rx="10" class="patch"/>
  <rect x="176" y="152" width="50" height="30" rx="12" class="patch"/>
  <rect x="178" y="196" width="22" height="26" rx="9" class="patch"/>
  <rect x="206" y="188" width="20" height="28" rx="9" class="patch"/>

  <!-- Back legs -->
  <rect x="105" y="295" width="28" height="90" rx="12" class="leg"/>
  <rect x="267" y="295" width="28" height="90" rx="12" class="leg"/>
  <!-- Hooves back -->
  <rect x="103" y="372" width="32" height="18" rx="7" class="hoof"/>
  <rect x="265" y="372" width="32" height="18" rx="7" class="hoof"/>

  <!-- Body -->
  <ellipse cx="200" cy="280" rx="105" ry="75" class="body"/>
  <!-- Body patches -->
  <ellipse cx="162" cy="258" rx="28" ry="22" class="patch"/>
  <ellipse cx="238" cy="252" rx="24" ry="20" class="patch"/>
  <ellipse cx="200" cy="290" rx="22" ry="18" class="patch"/>
  <ellipse cx="155" cy="295" rx="18" ry="15" class="patch"/>
  <ellipse cx="248" cy="298" rx="20" ry="16" class="patch"/>

  <!-- Belly -->
  <ellipse cx="200" cy="295" rx="60" ry="45" class="belly"/>

  <!-- Front legs -->
  <rect x="148" y="316" width="28" height="78" rx="12" class="leg"/>
  <rect x="224" y="316" width="28" height="78" rx="12" class="leg"/>
  <!-- Hooves front -->
  <rect x="146" y="382" width="32" height="16" rx="7" class="hoof"/>
  <rect x="222" y="382" width="32" height="16" rx="7" class="hoof"/>
  <!-- Leg patches -->
  <rect x="150" y="328" width="24" height="18" rx="7" class="patch"/>
  <rect x="226" y="322" width="24" height="18" rx="7" class="patch"/>

  <!-- Head (small, at top of neck) -->
  <ellipse cx="200" cy="45" rx="40" ry="34" class="face"/>

  <!-- Muzzle -->
  <ellipse cx="200" cy="56" rx="18" ry="14" fill="#C89A48" stroke="#9A7830" stroke-width="1.5"/>
  <!-- Nostrils -->
  <ellipse cx="194" cy="57" rx="4" ry="3" fill="#7A5820"/>
  <ellipse cx="206" cy="57" rx="4" ry="3" fill="#7A5820"/>

  <!-- TRAIT SLOTS -->
  <!-- eyes: left cx=182 cy=40, right cx=218 cy=40 -->
  <!-- ears: left cx=166 cy=28, right cx=234 cy=28 -->
  <!-- horns/ossicones: cx=190 cy=14, cx=210 cy=14 -->
  <!-- mane: along neck cx=200 -->
  <!-- pattern: on body -->
  <!-- accessories: cx=200 cy=20 -->
</svg>
