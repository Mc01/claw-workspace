<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80">
  <!-- Giraffe Ears with Ossicone nubbins -->
  <!-- Left ear -->
  <ellipse cx="22" cy="45" rx="14" ry="20" fill="#D4AA58" stroke="#9A7830" stroke-width="2"/>
  <ellipse cx="22" cy="48" rx="8" ry="13" fill="#F0D898"/>
  <!-- Left ossicone -->
  <ellipse cx="22" cy="22" rx="5" ry="14" fill="#8B5E1A" stroke="#6A4A10" stroke-width="1.5"/>
  <circle cx="22" cy="8" r="6" fill="#A87820" stroke="#6A4A10" stroke-width="1.5"/>
  <!-- Right ear -->
  <ellipse cx="98" cy="45" rx="14" ry="20" fill="#D4AA58" stroke="#9A7830" stroke-width="2"/>
  <ellipse cx="98" cy="48" rx="8" ry="13" fill="#F0D898"/>
  <!-- Right ossicone -->
  <ellipse cx="98" cy="22" rx="5" ry="14" fill="#8B5E1A" stroke="#6A4A10" stroke-width="1.5"/>
  <circle cx="98" cy="8" r="6" fill="#A87820" stroke="#6A4A10" stroke-width="1.5"/>
</svg>
