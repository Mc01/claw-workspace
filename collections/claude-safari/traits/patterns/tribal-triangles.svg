      <polygon points="18,2 34,34 2,34" fill="#6A3010" opacity="0.55"/>
      <polygon points="18,8 28,30 8,30" fill="none" stroke="#C87030" stroke-width="1.5" opacity="0.6"/>
      <circle cx="18" cy="22" r="3" fill="#C87030" opacity="0.5"/>
