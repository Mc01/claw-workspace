<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 170" width="220" height="170">
  <!-- Kente-inspired Stripe Pattern -->
  <defs>
    <pattern id="kente" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <!-- Horizontal bands -->
      <rect x="0" y="0" width="44" height="10" fill="#D4A020" opacity="0.7"/>
      <rect x="0" y="10" width="44" height="6" fill="#8A1800" opacity="0.7"/>
      <rect x="0" y="16" width="44" height="10" fill="#1A5A00" opacity="0.7"/>
      <rect x="0" y="26" width="44" height="6" fill="#8A1800" opacity="0.7"/>
      <rect x="0" y="32" width="44" height="12" fill="#D4A020" opacity="0.7"/>
      <!-- Vertical accent lines -->
      <rect x="8" y="0" width="3" height="44" fill="#5A0000" opacity="0.5"/>
      <rect x="22" y="0" width="3" height="44" fill="#5A0000" opacity="0.5"/>
      <rect x="36" y="0" width="3" height="44" fill="#5A0000" opacity="0.5"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="220" height="170" fill="url(#kente)" opacity="0.6"/>
</svg>
