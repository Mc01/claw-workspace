<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 170" width="220" height="170">
  <!-- African Geometric Diamond Pattern -->
  <defs>
    <pattern id="diamonds" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <polygon points="20,2 38,20 20,38 2,20" fill="none" stroke="#8A4010" stroke-width="2.5" opacity="0.7"/>
      <polygon points="20,10 30,20 20,30 10,20" fill="#C86020" opacity="0.35"/>
      <circle cx="20" cy="20" r="3" fill="#8A4010" opacity="0.6"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="220" height="170" fill="url(#diamonds)"/>
</svg>
