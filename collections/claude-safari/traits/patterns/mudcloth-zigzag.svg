<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 170" width="220" height="170">
  <!-- Bogolan / Mudcloth Zigzag Pattern -->
  <defs>
    <pattern id="mud" x="0" y="0" width="48" height="32" patternUnits="userSpaceOnUse">
      <!-- Zigzag rows -->
      <polyline points="0,8 12,2 24,14 36,2 48,8" fill="none" stroke="#5A3010" stroke-width="3" opacity="0.75"/>
      <polyline points="0,24 12,18 24,30 36,18 48,24" fill="none" stroke="#5A3010" stroke-width="3" opacity="0.75"/>
      <!-- Small squares at joints -->
      <rect x="10" y="0" width="5" height="5" fill="#8A5020" opacity="0.6"/>
      <rect x="22" y="12" width="5" height="5" fill="#8A5020" opacity="0.6"/>
      <rect x="34" y="0" width="5" height="5" fill="#8A5020" opacity="0.6"/>
      <rect x="10" y="16" width="5" height="5" fill="#8A5020" opacity="0.6"/>
      <rect x="22" y="28" width="5" height="5" fill="#8A5020" opacity="0.6"/>
      <rect x="34" y="16" width="5" height="5" fill="#8A5020" opacity="0.6"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="220" height="170" fill="url(#mud)" opacity="0.65"/>
</svg>
