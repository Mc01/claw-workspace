<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 50" width="120" height="50">
  <!-- Cool Sunglasses -->
  <!-- Bridge -->
  <rect x="52" y="22" width="16" height="5" rx="2" fill="#2A1800"/>
  <!-- Left lens frame -->
  <rect x="8" y="12" width="42" height="30" rx="14" fill="#1A0A00" stroke="#3A2010" stroke-width="3"/>
  <!-- Left lens -->
  <rect x="12" y="16" width="34" height="22" rx="10" fill="#2A5A10" opacity="0.85"/>
  <!-- Right lens frame -->
  <rect x="70" y="12" width="42" height="30" rx="14" fill="#1A0A00" stroke="#3A2010" stroke-width="3"/>
  <!-- Right lens -->
  <rect x="74" y="16" width="34" height="22" rx="10" fill="#2A5A10" opacity="0.85"/>
  <!-- Temple arms -->
  <rect x="0" y="20" width="10" height="5" rx="2" fill="#2A1800"/>
  <rect x="110" y="20" width="10" height="5" rx="2" fill="#2A1800"/>
  <!-- Glare on lenses -->
  <ellipse cx="22" cy="22" rx="6" ry="3" fill="white" opacity="0.3" transform="rotate(-20, 22, 22)"/>
  <ellipse cx="86" cy="22" rx="6" ry="3" fill="white" opacity="0.3" transform="rotate(-20, 86, 22)"/>
</svg>
