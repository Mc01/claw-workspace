<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="none"/>
  <!-- Floating halo -->
  <rect x="8" y="0" width="2" height="2" fill="#ffd700"/>
  <rect x="10" y="0" width="2" height="2" fill="#ffd700"/>
  <rect x="12" y="0" width="2" height="2" fill="#ffd700"/>
  <rect x="14" y="0" width="2" height="2" fill="#ffd700"/>
  <rect x="16" y="0" width="2" height="2" fill="#ffd700"/>
  <rect x="6" y="0" width="2" height="2" fill="#d4a017"/>
  <rect x="18" y="0" width="2" height="2" fill="#d4a017"/>
  <!-- Glow -->
  <rect x="8" y="2" width="2" height="2" fill="#ffd700" opacity="0.4"/>
  <rect x="16" y="2" width="2" height="2" fill="#ffd700" opacity="0.4"/>
</svg>
