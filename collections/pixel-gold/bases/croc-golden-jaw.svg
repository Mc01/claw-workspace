  <rect x="16" y="10" width="2" height="2" fill="#5a8f4a"/>
  <rect x="16" y="12" width="2" height="2" fill="#6ba35a"/>
  <rect x="18" y="10" width="2" height="2" fill="#4a7a3e"/>
  <rect x="18" y="12" width="2" height="2" fill="#5a8f4a"/>
  <rect x="20" y="10" width="2" height="2" fill="#5a8f4a"/>
  <rect x="20" y="12" width="2" height="2" fill="#6ba35a"/>
  <rect x="14" y="14" width="2" height="2" fill="#5a8f4a"/>
  <rect x="16" y="14" width="2" height="2" fill="#6ba35a"/>
  <rect x="18" y="14" width="2" height="2" fill="#5a8f4a"/>
  <rect x="20" y="14" width="2" height="2" fill="#4a7a3e"/>
