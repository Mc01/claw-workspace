  <rect x="10" y="8" width="2" height="2" fill="#6ba35a"/>
  <rect x="12" y="8" width="2" height="2" fill="#5a8f4a"/>
  <rect x="14" y="8" width="2" height="2" fill="#ffd700"/>
  <rect x="16" y="8" width="2" height="2" fill="#5a8f4a"/>
  <!-- Golden jaw -->
  <rect x="2" y="12" width="2" height="2" fill="#d4a017"/>
  <rect x="4" y="12" width="2" height="2" fill="#ffd700"/>
  <rect x="6" y="12" width="2" height="2" fill="#d4a017"/>
  <rect x="8" y="10" width="2" height="2" fill="#6ba35a"/>
  <rect x="8" y="12" width="2" height="2" fill="#ffd700"/>
  <rect x="10" y="10" width="2" height="2" fill="#5a8f4a"/>
  <rect x="10" y="12" width="2" height="2" fill="#d4a017"/>
  <rect x="12" y="10" width="2" height="2" fill="#6ba35a"/>
  <rect x="12" y="12" width="2" height="2" fill="#5a8f4a"/>
  <rect x="14" y="10" width="2" height="2" fill="#5a8f4a"/>
  <rect x="14" y="12" width="2" height="2" fill="#4a7a3e"/>
