  <rect x="22" y="12" width="2" height="2" fill="#4a7a3e"/>
  <rect x="24" y="10" width="2" height="2" fill="#4a7a3e"/>
  <rect x="24" y="12" width="2" height="2" fill="#5a8f4a"/>
