  <rect x="4" y="10" width="2" height="2" fill="#ffffff"/>
  <rect x="6" y="10" width="2" height="2" fill="#ffd700"/>
  <!-- Head -->
  <rect x="10" y="4" width="2" height="2" fill="#d4a017"/>
  <rect x="12" y="4" width="2" height="2" fill="#5a8f4a"/>
  <rect x="14" y="4" width="2" height="2" fill="#4a7a3e"/>
  <rect x="10" y="6" width="2" height="2" fill="#ffd700"/>
  <rect x="12" y="6" width="2" height="2" fill="#6ba35a"/>
