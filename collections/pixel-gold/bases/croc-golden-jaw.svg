<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="#1a0a2e"/>
  <!-- Snout top -->
  <rect x="2" y="8" width="2" height="2" fill="#4a7a3e"/>
  <rect x="4" y="8" width="2" height="2" fill="#5a8f4a"/>
  <rect x="6" y="8" width="2" height="2" fill="#5a8f4a"/>
