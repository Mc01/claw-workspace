  <rect x="12" y="16" width="2" height="2" fill="#4a7a3e"/>
  <rect x="12" y="18" width="2" height="2" fill="#ffd700"/>
  <rect x="10" y="18" width="2" height="2" fill="#d4a017"/>
  <!-- Hind legs -->
  <rect x="20" y="16" width="2" height="2" fill="#4a7a3e"/>
  <rect x="20" y="18" width="2" height="2" fill="#5a8f4a"/>
  <rect x="20" y="20" width="2" height="2" fill="#ffd700"/>
  <rect x="18" y="20" width="2" height="2" fill="#d4a017"/>
