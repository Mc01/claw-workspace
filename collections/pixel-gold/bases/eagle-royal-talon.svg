<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="#1a0a2e"/>
  <!-- Head -->
  <rect x="6" y="6" width="2" height="2" fill="#4a3728"/>
  <rect x="8" y="4" width="2" height="2" fill="#5c4033"/>
  <rect x="10" y="4" width="2" height="2" fill="#6b4e37"/>
  <rect x="12" y="4" width="2" height="2" fill="#5c4033"/>
  <rect x="8" y="6" width="2" height="2" fill="#6b4e37"/>
  <rect x="10" y="6" width="2" height="2" fill="#8b6844"/>
  <rect x="12" y="6" width="2" height="2" fill="#6b4e37"/>
  <rect x="14" y="6" width="2" height="2" fill="#5c4033"/>
  <!-- Eye -->
  <rect x="8" y="8" width="2" height="2" fill="#ffd700"/>
  <rect x="10" y="8" width="2" height="2" fill="#6b4e37"/>
  <!-- Beak -->
  <rect x="4" y="8" width="2" height="2" fill="#d4a017"/>
  <rect x="6" y="8" width="2" height="2" fill="#ffd700"/>
  <rect x="2" y="10" width="2" height="2" fill="#b8860b"/>
