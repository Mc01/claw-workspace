  <rect x="10" y="20" width="2" height="2" fill="#d4a017"/>
  <rect x="12" y="20" width="2" height="2" fill="#ffd700"/>
  <rect x="14" y="20" width="2" height="2" fill="#d4a017"/>
  <rect x="16" y="20" width="2" height="2" fill="#ffd700"/>
  <rect x="8" y="22" width="2" height="2" fill="#b8860b"/>
  <rect x="12" y="22" width="2" height="2" fill="#b8860b"/>
  <rect x="16" y="22" width="2" height="2" fill="#b8860b"/>
