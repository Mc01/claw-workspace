  <rect x="22" y="14" width="2" height="2" fill="#ffd700"/>
  <rect x="24" y="14" width="2" height="2" fill="#d4a017"/>
  <rect x="26" y="14" width="2" height="2" fill="#7b2d8e"/>
  <!-- Legs -->
