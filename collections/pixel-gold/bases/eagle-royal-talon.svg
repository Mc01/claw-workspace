  <rect x="14" y="4" width="2" height="2" fill="#ffd700"/>
  <!-- Neck -->
  <rect x="8" y="10" width="2" height="2" fill="#8b6844"/>
  <rect x="10" y="10" width="2" height="2" fill="#6b4e37"/>
  <rect x="12" y="8" width="2" height="2" fill="#5c4033"/>
  <rect x="12" y="10" width="2" height="2" fill="#6b4e37"/>
  <!-- Body -->
  <rect x="8" y="12" width="2" height="2" fill="#5c4033"/>
  <rect x="10" y="12" width="2" height="2" fill="#8b6844"/>
  <rect x="12" y="12" width="2" height="2" fill="#6b4e37"/>
  <rect x="14" y="10" width="2" height="2" fill="#5c4033"/>
  <rect x="14" y="12" width="2" height="2" fill="#8b6844"/>
  <rect x="16" y="12" width="2" height="2" fill="#6b4e37"/>
  <rect x="10" y="14" width="2" height="2" fill="#6b4e37"/>
  <rect x="12" y="14" width="2" height="2" fill="#8b6844"/>
  <rect x="14" y="14" width="2" height="2" fill="#6b4e37"/>
  <rect x="16" y="14" width="2" height="2" fill="#5c4033"/>
  <!-- Wing -->
  <rect x="16" y="8" width="2" height="2" fill="#ffd700"/>
  <rect x="18" y="8" width="2" height="2" fill="#d4a017"/>
  <rect x="18" y="10" width="2" height="2" fill="#ffd700"/>
  <rect x="20" y="10" width="2" height="2" fill="#d4a017"/>
  <rect x="20" y="8" width="2" height="2" fill="#b8860b"/>
  <rect x="22" y="10" width="2" height="2" fill="#ffd700"/>
  <rect x="22" y="12" width="2" height="2" fill="#d4a017"/>
  <rect x="24" y="12" width="2" height="2" fill="#b8860b"/>
  <rect x="18" y="12" width="2" height="2" fill="#d4a017"/>
  <rect x="20" y="12" width="2" height="2" fill="#ffd700"/>
  <rect x="18" y="14" width="2" height="2" fill="#b8860b"/>
  <rect x="20" y="14" width="2" height="2" fill="#d4a017"/>
