  <rect x="16" y="12" width="2" height="2" fill="#d4a017"/>
  <!-- Shell (treasure) -->
  <rect x="6" y="12" width="2" height="2" fill="#b8860b"/>
  <rect x="8" y="12" width="2" height="2" fill="#ffd700"/>
  <rect x="10" y="12" width="2" height="2" fill="#d4a017"/>
  <rect x="12" y="12" width="2" height="2" fill="#d4a017"/>
  <rect x="14" y="12" width="2" height="2" fill="#ffd700"/>
  <rect x="16" y="12" width="2" height="2" fill="#b8860b"/>
  <rect x="4" y="14" width="2" height="2" fill="#b8860b"/>
  <rect x="6" y="14" width="2" height="2" fill="#d4a017"/>
  <rect x="8" y="14" width="2" height="2" fill="#ffd700"/>
  <rect x="10" y="14" width="2" height="2" fill="#ffd700"/>
  <rect x="12" y="14" width="2" height="2" fill="#ffd700"/>
  <rect x="14" y="14" width="2" height="2" fill="#ffd700"/>
  <rect x="16" y="14" width="2" height="2" fill="#d4a017"/>
  <rect x="18" y="14" width="2" height="2" fill="#b8860b"/>
