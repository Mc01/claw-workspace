  <rect x="10" y="14" width="2" height="2" fill="#c0392b"/>
  <rect x="12" y="14" width="2" height="2" fill="#c0392b"/>
  <!-- Shell mid -->
  <rect x="4" y="16" width="2" height="2" fill="#d4a017"/>
  <rect x="6" y="16" width="2" height="2" fill="#ffd700"/>
  <rect x="8" y="16" width="2" height="2" fill="#d4a017"/>
  <rect x="10" y="16" width="2" height="2" fill="#ffd700"/>
  <rect x="12" y="16" width="2" height="2" fill="#ffd700"/>
  <rect x="14" y="16" width="2" height="2" fill="#d4a017"/>
  <rect x="16" y="16" width="2" height="2" fill="#ffd700"/>
  <rect x="18" y="16" width="2" height="2" fill="#d4a017"/>
  <!-- Shell bottom -->
  <rect x="6" y="18" width="2" height="2" fill="#b8860b"/>
  <rect x="8" y="18" width="2" height="2" fill="#d4a017"/>
  <rect x="10" y="18" width="2" height="2" fill="#ffd700"/>
  <rect x="12" y="18" width="2" height="2" fill="#ffd700"/>
  <rect x="14" y="18" width="2" height="2" fill="#d4a017"/>
  <rect x="16" y="18" width="2" height="2" fill="#b8860b"/>
  <rect x="8" y="20" width="2" height="2" fill="#b8860b"/>
  <rect x="10" y="20" width="2" height="2" fill="#d4a017"/>
  <rect x="12" y="20" width="2" height="2" fill="#d4a017"/>
  <rect x="14" y="20" width="2" height="2" fill="#b8860b"/>
