<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="#1a0a2e"/>
  <!-- Antennae -->
  <rect x="8" y="4" width="2" height="2" fill="#ffd700"/>
  <rect x="8" y="6" width="2" height="2" fill="#d4a017"/>
  <rect x="14" y="4" width="2" height="2" fill="#ffd700"/>
  <rect x="14" y="6" width="2" height="2" fill="#d4a017"/>
  <!-- Head -->
  <rect x="8" y="8" width="2" height="2" fill="#3d2b5e"/>
  <rect x="10" y="8" width="2" height="2" fill="#4a3568"/>
  <rect x="12" y="8" width="2" height="2" fill="#4a3568"/>
  <rect x="14" y="8" width="2" height="2" fill="#3d2b5e"/>
  <rect x="6" y="10" width="2" height="2" fill="#2d1b4e"/>
  <rect x="8" y="10" width="2" height="2" fill="#4a3568"/>
  <rect x="10" y="10" width="2" height="2" fill="#5a4578"/>
  <rect x="12" y="10" width="2" height="2" fill="#5a4578"/>
  <rect x="14" y="10" width="2" height="2" fill="#4a3568"/>
  <rect x="16" y="10" width="2" height="2" fill="#2d1b4e"/>
