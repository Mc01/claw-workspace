  <rect x="18" y="14" width="2" height="2" fill="#4a3568"/>
  <rect x="20" y="16" width="2" height="2" fill="#4a3568"/>
  <rect x="20" y="18" width="2" height="2" fill="#3d2b5e"/>
  <rect x="18" y="18" width="2" height="2" fill="#4a3568"/>
