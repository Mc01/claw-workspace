<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="#1a0a2e"/>
  <!-- Head -->
  <rect x="6" y="6" width="2" height="2" fill="#2e8b57"/>
  <rect x="8" y="4" width="2" height="2" fill="#3cb371"/>
  <rect x="10" y="4" width="2" height="2" fill="#3cb371"/>
  <rect x="12" y="4" width="2" height="2" fill="#3cb371"/>
  <rect x="6" y="8" width="2" height="2" fill="#3cb371"/>
  <rect x="8" y="6" width="2" height="2" fill="#50c878"/>
  <rect x="10" y="6" width="2" height="2" fill="#50c878"/>
  <rect x="12" y="6" width="2" height="2" fill="#3cb371"/>
  <rect x="14" y="6" width="2" height="2" fill="#2e8b57"/>
  <!-- Eye -->
  <rect x="8" y="8" width="2" height="2" fill="#ffd700"/>
  <rect x="10" y="8" width="2" height="2" fill="#50c878"/>
  <rect x="12" y="8" width="2" height="2" fill="#3cb371"/>
  <!-- Tongue -->
  <rect x="4" y="10" width="2" height="2" fill="#c0392b"/>
  <rect x="2" y="10" width="2" height="2" fill="#e74c3c"/>
  <!-- Jewel on head -->
  <rect x="10" y="2" width="2" height="2" fill="#ffd700"/>
  <rect x="10" y="0" width="2" height="2" fill="#c0392b"/>
  <!-- Jaw -->
  <rect x="6" y="10" width="2" height="2" fill="#3cb371"/>
  <rect x="8" y="10" width="2" height="2" fill="#50c878"/>
  <rect x="10" y="10" width="2" height="2" fill="#3cb371"/>
  <!-- Coil segment 1 -->
  <rect x="12" y="10" width="2" height="2" fill="#2e8b57"/>
  <rect x="14" y="8" width="2" height="2" fill="#ffd700"/>
  <rect x="14" y="10" width="2" height="2" fill="#3cb371"/>
  <rect x="16" y="10" width="2" height="2" fill="#50c878"/>
  <rect x="16" y="12" width="2" height="2" fill="#3cb371"/>
  <rect x="14" y="12" width="2" height="2" fill="#ffd700"/>
  <rect x="12" y="12" width="2" height="2" fill="#3cb371"/>
  <rect x="10" y="12" width="2" height="2" fill="#50c878"/>
  <!-- Coil segment 2 -->
  <rect x="8" y="14" width="2" height="2" fill="#3cb371"/>
  <rect x="10" y="14" width="2" height="2" fill="#ffd700"/>
  <rect x="12" y="14" width="2" height="2" fill="#50c878"/>
  <rect x="14" y="14" width="2" height="2" fill="#3cb371"/>
  <rect x="16" y="14" width="2" height="2" fill="#2e8b57"/>
  <rect x="18" y="12" width="2" height="2" fill="#3cb371"/>
  <rect x="18" y="14" width="2" height="2" fill="#50c878"/>
  <rect x="18" y="16" width="2" height="2" fill="#3cb371"/>
  <!-- Coil segment 3 -->
  <rect x="16" y="16" width="2" height="2" fill="#ffd700"/>
  <rect x="14" y="16" width="2" height="2" fill="#50c878"/>
  <rect x="12" y="16" width="2" height="2" fill="#3cb371"/>
  <rect x="10" y="16" width="2" height="2" fill="#50c878"/>
  <rect x="8" y="16" width="2" height="2" fill="#2e8b57"/>
  <!-- Inner coil -->
  <rect x="8" y="18" width="2" height="2" fill="#3cb371"/>
  <rect x="10" y="18" width="2" height="2" fill="#ffd700"/>
  <rect x="12" y="18" width="2" height="2" fill="#3cb371"/>
  <rect x="14" y="18" width="2" height="2" fill="#50c878"/>
  <rect x="16" y="18" width="2" height="2" fill="#3cb371"/>
  <rect x="18" y="18" width="2" height="2" fill="#2e8b57"/>
  <!-- Tail -->
  <rect x="18" y="20" width="2" height="2" fill="#3cb371"/>
  <rect x="16" y="20" width="2" height="2" fill="#ffd700"/>
  <rect x="14" y="20" width="2" height="2" fill="#50c878"/>
  <rect x="12" y="20" width="2" height="2" fill="#3cb371"/>
  <rect x="10" y="20" width="2" height="2" fill="#2e8b57"/>
  <rect x="10" y="22" width="2" height="2" fill="#3cb371"/>
  <rect x="12" y="22" width="2" height="2" fill="#ffd700"/>
  <rect x="14" y="22" width="2" height="2" fill="#3cb371"/>
  <rect x="14" y="24" width="2" height="2" fill="#ffd700"/>
  <rect x="16" y="24" width="2" height="2" fill="#d4a017"/>
  <!-- Ground -->
  <rect x="0" y="26" width="32" height="6" fill="#2d1b4e"/>
</svg>
