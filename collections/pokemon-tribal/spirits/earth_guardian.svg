<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Earth Guardian - side profile, massive armored stone spirit -->
  <!-- Palette: stone #8B7355, clay red #A0522D, warm sand #C4A882, dark earth #3D2B1F -->

  <!-- Stone feet / base -->
  <rect x="70" y="176" width="26" height="16" fill="#8B7355" rx="3"/>
  <rect x="106" y="176" width="24" height="16" fill="#8B7355" rx="3"/>
  <!-- Toe cracks on feet -->
  <line x1="78" y1="178" x2="78" y2="190" stroke="#5C3D1A" stroke-width="1.5"/>
  <line x1="88" y1="178" x2="88" y2="190" stroke="#5C3D1A" stroke-width="1.5"/>
  <line x1="112" y1="178" x2="112" y2="190" stroke="#5C3D1A" stroke-width="1.5"/>
  <line x1="120" y1="178" x2="120" y2="190" stroke="#5C3D1A" stroke-width="1.5"/>

  <!-- Massive body - boulder-like -->
  <ellipse cx="100" cy="130" rx="50" ry="52" fill="#8B7355"/>
  <!-- Stone plate armor segments -->
  <path d="M68,108 Q84,100 100,108 Q116,100 132,108" fill="none" stroke="#5C3D1A" stroke-width="2"/>
  <path d="M64,124 Q82,116 100,124 Q118,116 136,124" fill="none" stroke="#5C3D1A" stroke-width="2"/>
  <path d="M64,140 Q82,132 100,140 Q118,132 136,140" fill="none" stroke="#5C3D1A" stroke-width="2"/>
  <path d="M66,156 Q84,148 100,156 Q116,148 134,156" fill="none" stroke="#5C3D1A" stroke-width="2"/>
  <!-- Clay tribal markings on body -->
  <path d="M80,112 L76,122 L80,132" fill="none" stroke="#A0522D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M90,108 L86,120 L90,132" fill="none" stroke="#A0522D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M100,106 L96,120 L100,134" fill="none" stroke="#A0522D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M110,108 L106,120 L110,132" fill="none" stroke="#A0522D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M120,112 L116,124 L120,136" fill="none" stroke="#A0522D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Central chest tribal diamond -->
  <polygon points="100,112 110,124 100,136 90,124" fill="none" stroke="#C4A882" stroke-width="2.5"/>
  <polygon points="100,116 107,124 100,132 93,124" fill="#A0522D" opacity="0.5"/>
  <circle cx="100" cy="124" r="4" fill="#C4A882" opacity="0.8"/>

  <!-- Neck - thick column -->
  <rect x="88" y="82" width="24" height="24" fill="#8B7355" rx="5"/>
  <!-- Neck collar stone plate -->
  <path d="M86,88 Q100,84 114,88 L112,94 Q100,90 88,94 Z" fill="#7A6347"/>

  <!-- Head - side profile, massive horned head facing right -->
  <path d="M84,62 Q86,44 104,42 Q124,42 132,58 Q138,72 132,86 Q124,96 108,96 Q90,94 84,82 Z" fill="#8B7355"/>
  <!-- Stone texture on head -->
  <path d="M104,42 Q122,44 132,58 Q136,70 130,84 L104,42 Z" fill="#7A6347" opacity="0.4"/>
  <!-- Brow ridge - heavy stone shelf -->
  <path d="M84,66 Q100,60 120,62 Q126,64 128,70" fill="none" stroke="#5C3D1A" stroke-width="4" stroke-linecap="round"/>
  <!-- Deep set eye - glowing amber -->
  <circle cx="120" cy="72" r="7" fill="#3D2B1F"/>
  <circle cx="120" cy="72" r="5" fill="#A0522D"/>
  <circle cx="120" cy="72" r="3" fill="#E8A030"/>
  <circle cx="121" cy="71" r="1.5" fill="#FFFDE0"/>

  <!-- Stone snout / muzzle -->
  <path d="M130,72 L150,76 Q155,80 152,86 Q148,90 142,88 L130,84 Z" fill="#7A6347"/>
  <!-- Muzzle tribal crack markings -->
  <line x1="136" y1="74" x2="140" y2="86" stroke="#A0522D" stroke-width="1.5"/>
  <line x1="142" y1="76" x2="146" y2="86" stroke="#A0522D" stroke-width="1.5"/>
  <!-- Nostril -->
  <ellipse cx="150" cy="80" rx="2.5" ry="2" fill="#3D2B1F"/>

  <!-- Stone horns -->
  <path d="M100,44 Q94,28 86,20 Q90,34 100,44 Z" fill="#7A6347"/>
  <path d="M110,42 Q108,24 112,14 Q114,28 110,42 Z" fill="#8B7355"/>
  <path d="M118,44 Q122,28 130,22 Q124,36 118,44 Z" fill="#7A6347"/>
  <!-- Horn tribal ring -->
  <path d="M92,32 Q96,30 100,32" stroke="#C4A882" stroke-width="2" fill="none"/>
  <path d="M109,26 Q111,24 113,26" stroke="#C4A882" stroke-width="2" fill="none"/>

  <!-- Massive arms -->
  <!-- Left arm - huge boulder fist -->
  <path d="M62,108 Q42,120 38,142" fill="none" stroke="#8B7355" stroke-width="18" stroke-linecap="round"/>
  <!-- Left fist -->
  <circle cx="40" cy="148" r="14" fill="#7A6347"/>
  <line x1="30" y1="144" x2="50" y2="152" stroke="#5C3D1A" stroke-width="2"/>
  <line x1="30" y1="150" x2="50" y2="148" stroke="#5C3D1A" stroke-width="1.5"/>

  <!-- Right arm raised -->
  <path d="M138,108 Q158,115 162,138" fill="none" stroke="#8B7355" stroke-width="16" stroke-linecap="round"/>
  <!-- Right fist -->
  <circle cx="164" cy="144" r="13" fill="#7A6347"/>
  <line x1="154" y1="140" x2="174" y2="148" stroke="#5C3D1A" stroke-width="2"/>

  <!-- Ground crack effect -->
  <path d="M50,192 Q75,185 100,192 Q125,185 150,192" fill="none" stroke="#5C3D1A" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="100" cy="192" rx="50" ry="6" fill="#5C3D1A" opacity="0.25"/>
</svg>
