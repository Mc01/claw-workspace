<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Nature Guardian - side profile, sturdy plant-spirit form -->
  <!-- Palette: forest green #4A7C59, moss #6B8F5E, earth brown #5C3D1A, leaf gold #8BC34A -->

  <!-- Root tendrils at base -->
  <path d="M80,185 Q70,195 60,190 Q72,182 78,178" fill="none" stroke="#5C3D1A" stroke-width="3" stroke-linecap="round"/>
  <path d="M100,188 Q96,200 86,198 Q92,188 97,184" fill="none" stroke="#5C3D1A" stroke-width="3" stroke-linecap="round"/>
  <path d="M120,185 Q128,196 140,192 Q128,183 122,180" fill="none" stroke="#5C3D1A" stroke-width="3" stroke-linecap="round"/>

  <!-- Body - broad, rooted, mossy -->
  <ellipse cx="100" cy="135" rx="42" ry="50" fill="#4A7C59"/>
  <!-- Bark/hide texture strips -->
  <path d="M72,115 Q75,130 72,148" fill="none" stroke="#3A5C40" stroke-width="3" stroke-linecap="round"/>
  <path d="M84,110 Q87,128 84,150" fill="none" stroke="#3A5C40" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M100,108 Q103,128 100,152" fill="none" stroke="#3A5C40" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M116,110 Q119,130 116,152" fill="none" stroke="#3A5C40" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M128,115 Q131,132 128,150" fill="none" stroke="#3A5C40" stroke-width="3" stroke-linecap="round"/>
  <!-- Tribal belly marking -->
  <path d="M85,128 L92,120 L100,128 L108,120 L115,128" fill="none" stroke="#8BC34A" stroke-width="2"/>
  <path d="M82,138 L92,130 L100,138 L108,130 L118,138" fill="none" stroke="#8BC34A" stroke-width="2"/>

  <!-- Neck -->
  <rect x="92" y="90" width="18" height="20" fill="#4A7C59" rx="4"/>

  <!-- Head - side profile facing right, broad snout -->
  <path d="M86,68 Q88,50 106,48 Q124,48 130,64 Q134,78 128,92 Q120,102 106,102 Q90,100 86,88 Z" fill="#4A7C59"/>
  <!-- Profile highlights -->
  <path d="M106,48 Q122,50 130,64 Q132,78 126,90 L106,48 Z" fill="#3A5C40" opacity="0.3"/>

  <!-- Eye - deep forest green with amber iris -->
  <circle cx="118" cy="72" r="6" fill="#1A2E1A"/>
  <circle cx="118" cy="72" r="4" fill="#8BC34A"/>
  <circle cx="119" cy="71" r="2" fill="#C8E86A"/>
  <circle cx="120" cy="70" r="1" fill="#FFFDE0"/>

  <!-- Snout side profile -->
  <path d="M128,76 L138,82 Q140,86 136,88 L128,86" fill="#3A5C40"/>
  <!-- Nostril -->
  <ellipse cx="136" cy="83" rx="2" ry="1.5" fill="#1A2E1A"/>

  <!-- Tribal forehead marking -->
  <path d="M95,60 Q100,54 110,56 Q115,58 112,64" fill="none" stroke="#8BC34A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Third eye leaf symbol -->
  <ellipse cx="103" cy="68" rx="5" ry="3" fill="#8BC34A" transform="rotate(-20,103,68)"/>
  <line x1="103" y1="65" x2="103" y2="60" stroke="#5C3D1A" stroke-width="1.5"/>

  <!-- Leaf crown / headdress -->
  <path d="M86,68 Q84,54 94,48" fill="none" stroke="#5C3D1A" stroke-width="2"/>
  <!-- Large leaves -->
  <path d="M94,48 Q80,34 68,38 Q74,52 88,52 Z" fill="#6B8F5E"/>
  <path d="M94,48 Q86,28 96,20 Q100,36 94,48 Z" fill="#4A7C59"/>
  <path d="M94,48 Q106,30 120,32 Q112,46 98,48 Z" fill="#8BC34A"/>
  <path d="M94,48 Q112,36 118,24 Q108,40 94,48 Z" fill="#6B8F5E"/>
  <!-- Leaf veins -->
  <line x1="76" y1="38" x2="88" y2="50" stroke="#3A5C40" stroke-width="1"/>
  <line x1="96" y1="20" x2="94" y2="46" stroke="#3A5C40" stroke-width="1"/>
  <line x1="118" y1="26" x2="98" y2="46" stroke="#3A5C40" stroke-width="1"/>

  <!-- Arm branches -->
  <path d="M74,112 Q56,128 58,148" fill="none" stroke="#4A7C59" stroke-width="12" stroke-linecap="round"/>
  <!-- Branch fingers -->
  <path d="M58,148 Q48,158 44,170" fill="none" stroke="#5C3D1A" stroke-width="4" stroke-linecap="round"/>
  <path d="M58,148 Q54,162 58,172" fill="none" stroke="#5C3D1A" stroke-width="3" stroke-linecap="round"/>
  <!-- Leaves on arm -->
  <path d="M55,135 Q46,128 44,135 Q50,140 55,135 Z" fill="#8BC34A"/>
  <path d="M50,148 Q40,144 40,152 Q46,154 50,148 Z" fill="#6B8F5E"/>

  <!-- Right arm -->
  <path d="M126,112 Q142,120 138,142" fill="none" stroke="#4A7C59" stroke-width="10" stroke-linecap="round"/>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="192" rx="44" ry="7" fill="#3A5C40" opacity="0.35"/>
</svg>
