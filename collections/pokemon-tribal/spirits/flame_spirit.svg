<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Flame Spirit - side profile, lithe fire elemental -->
  <!-- Palette: ember red #C0392B, flame orange #E67E22, gold #F1C40F muted, charcoal #2C1A0E, warm white #FFF3E0 -->

  <!-- Heat shimmer / base flames -->
  <path d="M60,185 Q55,170 62,158 Q58,145 66,135" fill="none" stroke="#E67E22" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <path d="M140,185 Q145,168 138,155 Q144,142 136,130" fill="none" stroke="#E67E22" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <!-- Body - flame-shaped, tapers at top and bottom -->
  <path d="M68,175 Q66,150 70,130 Q72,112 88,102 Q100,96 114,102 Q130,112 132,130 Q136,150 132,175 Q116,182 100,182 Q84,182 68,175 Z" fill="#C0392B"/>
  <!-- Inner flame gradient -->
  <path d="M80,172 Q78,150 82,132 Q84,118 96,110 Q100,107 108,110 Q118,118 120,132 Q124,150 120,172 Q110,178 100,178 Q90,178 80,172 Z" fill="#E67E22" opacity="0.8"/>
  <ellipse cx="100" cy="142" rx="16" ry="25" fill="#F1C40F" opacity="0.5"/>
  <!-- Tribal body flame markings -->
  <path d="M82,135 L78,148 L82,162" fill="none" stroke="#2C1A0E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M90,128 L86,145 L90,163" fill="none" stroke="#2C1A0E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M100,125 L96,144 L100,165" fill="none" stroke="#2C1A0E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M110,128 L106,145 L110,163" fill="none" stroke="#2C1A0E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M118,135 L114,148 L118,162" fill="none" stroke="#2C1A0E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Chest tribal sun symbol -->
  <circle cx="100" cy="145" r="10" fill="none" stroke="#F1C40F" stroke-width="2"/>
  <circle cx="100" cy="145" r="5" fill="#F1C40F" opacity="0.6"/>
  <!-- Sun rays -->
  <line x1="100" y1="133" x2="100" y2="130" stroke="#F1C40F" stroke-width="2"/>
  <line x1="100" y1="157" x2="100" y2="160" stroke="#F1C40F" stroke-width="2"/>
  <line x1="88" y1="145" x2="85" y2="145" stroke="#F1C40F" stroke-width="2"/>
  <line x1="112" y1="145" x2="115" y2="145" stroke="#F1C40F" stroke-width="2"/>
  <line x1="91" y1="136" x2="89" y2="134" stroke="#F1C40F" stroke-width="1.5"/>
  <line x1="109" y1="136" x2="111" y2="134" stroke="#F1C40F" stroke-width="1.5"/>
  <line x1="91" y1="154" x2="89" y2="156" stroke="#F1C40F" stroke-width="1.5"/>
  <line x1="109" y1="154" x2="111" y2="156" stroke="#F1C40F" stroke-width="1.5"/>

  <!-- Neck -->
  <rect x="92" y="84" width="16" height="20" fill="#C0392B" rx="3"/>

  <!-- Head - side profile facing right, sleek -->
  <path d="M86,64 Q88,46 106,44 Q124,44 130,60 Q134,74 128,88 Q120,96 106,96 Q90,94 86,82 Z" fill="#C0392B"/>
  <!-- Face warmth gradient -->
  <path d="M106,44 Q122,46 130,60 Q132,72 126,86 L106,44 Z" fill="#E67E22" opacity="0.35"/>

  <!-- Eye - intense, narrow predator flame eye -->
  <ellipse cx="118" cy="70" rx="7" ry="5" fill="#2C1A0E"/>
  <ellipse cx="118" cy="70" rx="5" ry="3.5" fill="#F1C40F"/>
  <ellipse cx="118" cy="70" rx="2.5" ry="3" fill="#2C1A0E"/>
  <circle cx="119" cy="69" r="1" fill="#FFF3E0"/>
  <!-- Ember eye glow -->
  <ellipse cx="118" cy="70" rx="9" ry="7" fill="none" stroke="#E67E22" stroke-width="1" opacity="0.4"/>

  <!-- Snout / jaw profile -->
  <path d="M128,66 L146,70 Q150,74 148,80 Q145,84 140,82 L128,80 Z" fill="#A93226"/>
  <!-- Open mouth with fire -->
  <path d="M128,80 L146,80 Q148,82 146,84 L128,84 Z" fill="#2C1A0E"/>
  <path d="M132,80 Q136,76 140,80" fill="#F1C40F" opacity="0.8"/>
  <path d="M134,80 Q137,74 140,78 Q137,76 134,80 Z" fill="#FFF3E0" opacity="0.7"/>
  <!-- Nostril -->
  <ellipse cx="145" cy="73" rx="2" ry="1.5" fill="#2C1A0E"/>

  <!-- Flame crest / mane -->
  <!-- Base flame spikes -->
  <path d="M86,64 Q80,52 86,40 Q90,52 86,64 Z" fill="#E67E22"/>
  <path d="M90,58 Q84,42 90,30 Q96,44 90,58 Z" fill="#C0392B"/>
  <path d="M96,54 Q92,36 98,22 Q104,38 96,54 Z" fill="#E67E22"/>
  <path d="M103,52 Q100,32 106,18 Q112,34 103,52 Z" fill="#F1C40F" opacity="0.9"/>
  <path d="M110,54 Q110,34 116,22 Q120,38 110,54 Z" fill="#C0392B"/>
  <path d="M116,58 Q118,40 124,30 Q124,44 116,58 Z" fill="#E67E22"/>
  <path d="M120,64 Q124,50 130,42 Q128,56 120,64 Z" fill="#C0392B" opacity="0.8"/>
  <!-- Flame crest tribal dots -->
  <circle cx="96" cy="38" r="2" fill="#F1C40F"/>
  <circle cx="106" cy="30" r="2.5" fill="#FFF3E0"/>
  <circle cx="116" cy="36" r="2" fill="#F1C40F"/>

  <!-- Arms - flame limbs -->
  <path d="M74,108 Q54,120 50,142" fill="none" stroke="#C0392B" stroke-width="11" stroke-linecap="round"/>
  <!-- Flame hand -->
  <path d="M50,142 Q40,135 38,148 Q44,155 52,148 Z" fill="#E67E22"/>
  <path d="M50,142 Q46,130 40,136 Q40,146 50,148 Z" fill="#C0392B"/>
  <path d="M50,142 Q54,130 60,138 Q58,148 50,148 Z" fill="#E67E22" opacity="0.7"/>

  <path d="M128,108 Q148,116 150,138" fill="none" stroke="#C0392B" stroke-width="9" stroke-linecap="round"/>

  <!-- Ember particles floating -->
  <circle cx="45" cy="80" r="3" fill="#F1C40F" opacity="0.6"/>
  <circle cx="40" cy="68" r="2" fill="#E67E22" opacity="0.5"/>
  <circle cx="52" cy="58" r="2.5" fill="#F1C40F" opacity="0.4"/>
  <circle cx="162" cy="72" r="2.5" fill="#F1C40F" opacity="0.5"/>
  <circle cx="168" cy="60" r="2" fill="#E67E22" opacity="0.4"/>

  <!-- Ground scorch -->
  <ellipse cx="100" cy="190" rx="46" ry="7" fill="#2C1A0E" opacity="0.35"/>
  <path d="M70,188 Q100,183 130,188" fill="none" stroke="#E67E22" stroke-width="1" opacity="0.3"/>
</svg>
