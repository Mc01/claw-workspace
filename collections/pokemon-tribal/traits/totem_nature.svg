<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Trait: Nature Totem - carved tree spirit face post -->
  <!-- Root base -->
  <path d="M34,76 Q28,80 24,78 Q30,72 34,72" fill="#5C3D1A" stroke="#3D2314" stroke-width="1"/>
  <path d="M46,76 Q52,80 56,78 Q50,72 46,72" fill="#5C3D1A" stroke="#3D2314" stroke-width="1"/>
  <!-- Post trunk -->
  <rect x="34" y="20" width="12" height="58" fill="#5C3D1A" rx="3"/>
  <!-- Bark lines -->
  <path d="M36,22 Q37,40 36,58" fill="none" stroke="#3D2314" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M40,22 Q41,40 40,58" fill="none" stroke="#3D2314" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M44,22 Q45,40 44,58" fill="none" stroke="#3D2314" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Carved face on post -->
  <ellipse cx="40" cy="34" rx="10" ry="12" fill="#4A7C59"/>
  <!-- Carved eyes -->
  <ellipse cx="36" cy="30" rx="3" ry="2.5" fill="#1A2E1A"/>
  <ellipse cx="44" cy="30" rx="3" ry="2.5" fill="#1A2E1A"/>
  <ellipse cx="36" cy="30" rx="2" ry="1.5" fill="#8BC34A"/>
  <ellipse cx="44" cy="30" rx="2" ry="1.5" fill="#8BC34A"/>
  <!-- Carved smile -->
  <path d="M34,38 Q40,44 46,38" fill="none" stroke="#1A2E1A" stroke-width="2" stroke-linecap="round"/>
  <!-- Leaf decorations on post -->
  <path d="M34,50 Q24,46 22,52 Q28,58 34,54 Z" fill="#8BC34A"/>
  <path d="M46,50 Q56,46 58,52 Q52,58 46,54 Z" fill="#6B8F5E"/>
  <path d="M34,62 Q26,58 24,64 Q30,68 34,64 Z" fill="#6B8F5E"/>
  <path d="M46,62 Q54,58 56,64 Q50,68 46,64 Z" fill="#8BC34A"/>
  <!-- Top leaf crown -->
  <path d="M40,20 Q34,8 30,4 Q36,12 40,20 Z" fill="#8BC34A"/>
  <path d="M40,20 Q40,6 44,2 Q46,12 40,20 Z" fill="#4A7C59"/>
  <path d="M40,20 Q46,8 50,4 Q44,12 40,20 Z" fill="#8BC34A"/>
</svg>
