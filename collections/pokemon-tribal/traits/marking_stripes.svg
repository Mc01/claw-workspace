<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Trait: War Stripe Marking - bold warrior stripes -->
  <rect width="80" height="80" fill="#D4C4A8" rx="6"/>
  <!-- Bold horizontal war stripes -->
  <rect x="6" y="14" width="68" height="8" fill="#A0522D" rx="2" opacity="0.8"/>
  <rect x="6" y="28" width="68" height="5" fill="#5C3D1A" rx="2" opacity="0.7"/>
  <rect x="6" y="39" width="68" height="8" fill="#C8A84A" rx="2" opacity="0.8"/>
  <rect x="6" y="53" width="68" height="5" fill="#5C3D1A" rx="2" opacity="0.7"/>
  <rect x="6" y="64" width="68" height="8" fill="#A0522D" rx="2" opacity="0.8"/>
  <!-- Vertical accent marks at edges -->
  <line x1="14" y1="8" x2="14" y2="72" stroke="#8B6F47" stroke-width="2" opacity="0.5"/>
  <line x1="66" y1="8" x2="66" y2="72" stroke="#8B6F47" stroke-width="2" opacity="0.5"/>
</svg>
