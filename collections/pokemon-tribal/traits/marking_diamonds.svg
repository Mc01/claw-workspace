<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Trait: Diamond Marking - ceremonial diamond body pattern -->
  <rect width="80" height="80" fill="#C4A882" rx="6"/>
  <!-- Diamond grid pattern -->
  <polygon points="20,10 30,20 20,30 10,20" fill="none" stroke="#8B6F47" stroke-width="2"/>
  <polygon points="40,10 50,20 40,30 30,20" fill="none" stroke="#8B6F47" stroke-width="2"/>
  <polygon points="60,10 70,20 60,30 50,20" fill="none" stroke="#8B6F47" stroke-width="2"/>
  <polygon points="20,30 30,40 20,50 10,40" fill="none" stroke="#8B6F47" stroke-width="2"/>
  <polygon points="40,30 50,40 40,50 30,40" fill="#A0522D" stroke="#8B6F47" stroke-width="2" opacity="0.4"/>
  <polygon points="60,30 70,40 60,50 50,40" fill="none" stroke="#8B6F47" stroke-width="2"/>
  <polygon points="20,50 30,60 20,70 10,60" fill="none" stroke="#8B6F47" stroke-width="2"/>
  <polygon points="40,50 50,60 40,70 30,60" fill="none" stroke="#8B6F47" stroke-width="2"/>
  <polygon points="60,50 70,60 60,70 50,60" fill="#A0522D" stroke="#8B6F47" stroke-width="2" opacity="0.4"/>
  <!-- Center filled highlights -->
  <circle cx="20" cy="20" r="3" fill="#C8A84A"/>
  <circle cx="40" cy="20" r="3" fill="#C8A84A"/>
  <circle cx="60" cy="20" r="3" fill="#C8A84A"/>
  <circle cx="20" cy="40" r="3" fill="#C8A84A"/>
  <circle cx="60" cy="40" r="3" fill="#C8A84A"/>
  <circle cx="20" cy="60" r="3" fill="#C8A84A"/>
  <circle cx="40" cy="60" r="3" fill="#C8A84A"/>
  <circle cx="60" cy="60" r="3" fill="#C8A84A"/>
</svg>
