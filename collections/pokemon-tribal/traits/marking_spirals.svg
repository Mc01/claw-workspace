<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Trait: Spiral Marking - Maori-inspired koru spiral body art -->
  <rect width="80" height="80" fill="#C8B89A" rx="6"/>
  <!-- Large spiral center -->
  <path d="M40,40 Q40,28 50,28 Q60,28 60,38 Q60,50 48,52 Q36,54 32,44 Q28,34 36,28 Q40,24 46,26" fill="none" stroke="#5C3D1A" stroke-width="3" stroke-linecap="round"/>
  <!-- Small spiral top-left -->
  <path d="M18,18 Q18,12 22,12 Q26,12 26,16 Q26,22 20,22 Q16,22 16,18 Q16,14 18,12" fill="none" stroke="#8B6F47" stroke-width="2" stroke-linecap="round"/>
  <!-- Small spiral top-right -->
  <path d="M58,18 Q58,12 62,12 Q66,12 66,16 Q66,22 60,22 Q56,22 56,18 Q56,14 58,12" fill="none" stroke="#8B6F47" stroke-width="2" stroke-linecap="round"/>
  <!-- Small spiral bottom-left -->
  <path d="M18,62 Q18,56 22,56 Q26,56 26,60 Q26,66 20,66 Q16,66 16,62 Q16,58 18,56" fill="none" stroke="#8B6F47" stroke-width="2" stroke-linecap="round"/>
  <!-- Small spiral bottom-right -->
  <path d="M58,62 Q58,56 62,56 Q66,56 66,60 Q66,66 60,66 Q56,66 56,62 Q56,58 58,56" fill="none" stroke="#8B6F47" stroke-width="2" stroke-linecap="round"/>
  <!-- Connecting dots -->
  <circle cx="14" cy="40" r="2.5" fill="#C8A84A"/>
  <circle cx="66" cy="40" r="2.5" fill="#C8A84A"/>
  <circle cx="40" cy="8" r="2.5" fill="#C8A84A"/>
  <circle cx="40" cy="72" r="2.5" fill="#C8A84A"/>
</svg>
