<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Trait: Ancestor Mask - oval ceremonial mask, side-facing -->
  <ellipse cx="40" cy="40" rx="24" ry="28" fill="#C8B89A"/>
  <!-- Eye hole - hollow, elongated -->
  <ellipse cx="48" cy="36" rx="8" ry="5" fill="#3D2B1F"/>
  <!-- Eyebrow carved line -->
  <path d="M40,30 Q48,27 56,30" fill="none" stroke="#8B6F47" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Nose bridge carved -->
  <path d="M52,38 L56,44 L53,46" fill="none" stroke="#8B6F47" stroke-width="2" stroke-linecap="round"/>
  <!-- Mouth slot -->
  <rect x="44" y="50" width="14" height="5" fill="#3D2B1F" rx="2"/>
  <!-- Tribal forehead marks -->
  <line x1="28" y1="32" x2="34" y2="32" stroke="#8B6F47" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="38" x2="34" y2="38" stroke="#8B6F47" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="44" x2="34" y2="44" stroke="#8B6F47" stroke-width="2" stroke-linecap="round"/>
  <!-- Cheek diamond -->
  <polygon points="40,42 44,46 40,50 36,46" fill="none" stroke="#C8A84A" stroke-width="1.5"/>
  <!-- Mask border ridges -->
  <ellipse cx="40" cy="40" rx="24" ry="28" fill="none" stroke="#8B6F47" stroke-width="2"/>
</svg>
