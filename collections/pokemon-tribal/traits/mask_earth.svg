<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Trait: Earth Mask - heavy stone ritual mask, horned -->
  <path d="M12,40 Q12,18 40,14 Q68,18 68,40 Q68,62 40,66 Q12,62 12,40 Z" fill="#8B7355"/>
  <!-- Stone texture cracks -->
  <path d="M24,28 Q30,36 26,44" fill="none" stroke="#5C3D1A" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M52,26 Q56,34 54,44" fill="none" stroke="#5C3D1A" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Horns on top -->
  <path d="M28,18 Q22,6 18,2 Q22,12 28,18 Z" fill="#7A6347"/>
  <path d="M52,18 Q56,4 60,2 Q56,12 52,18 Z" fill="#7A6347"/>
  <!-- Brow shelf heavy -->
  <path d="M16,34 Q40,28 64,34" fill="none" stroke="#5C3D1A" stroke-width="4" stroke-linecap="round"/>
  <!-- Deep eye sockets -->
  <ellipse cx="30" cy="40" rx="9" ry="7" fill="#3D2B1F"/>
  <ellipse cx="50" cy="40" rx="9" ry="7" fill="#3D2B1F"/>
  <!-- Glowing amber eyes -->
  <circle cx="30" cy="40" r="5" fill="#E8A030"/>
  <circle cx="50" cy="40" r="5" fill="#E8A030"/>
  <circle cx="30" cy="40" r="2.5" fill="#FFFDE0"/>
  <circle cx="50" cy="40" r="2.5" fill="#FFFDE0"/>
  <!-- Nose flat wide -->
  <path d="M34,50 Q40,55 46,50" fill="none" stroke="#5C3D1A" stroke-width="3" stroke-linecap="round"/>
  <circle cx="37" cy="51" r="2" fill="#3D2B1F"/>
  <circle cx="43" cy="51" r="2" fill="#3D2B1F"/>
  <!-- Mouth - grimace -->
  <path d="M26,58 Q40,64 54,58" fill="none" stroke="#5C3D1A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Chin tribal markings -->
  <line x1="36" y1="60" x2="34" y2="64" stroke="#C4A882" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="62" x2="40" y2="66" stroke="#C4A882" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="60" x2="46" y2="64" stroke="#C4A882" stroke-width="1.5" stroke-linecap="round"/>
</svg>
