<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Meerkat - Desert Winds Collection #4 -->
  <defs>
    <linearGradient id="meerBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A85A"/>
      <stop offset="100%" stop-color="#A07030"/>
    </linearGradient>
    <radialGradient id="meerBelly" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0E0A0"/>
      <stop offset="100%" stop-color="#D4B870"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="200" cy="380" rx="60" ry="10" fill="#6B4010" opacity="0.25"/>

  <!-- Tail -->
  <path d="M218,340 Q230,360 220,375 Q210,388 200,375 Q192,365 205,350 Q210,345 218,340 Z" fill="#8B6030" stroke="#6B4010" stroke-width="1.5"/>
  <path d="M208,370 Q204,380 200,375 Q196,368 204,366 Z" fill="#2C2C2C"/>

  <!-- Body (upright sentinel pose) -->
  <rect x="162" y="200" width="76" height="145" rx="30" fill="url(#meerBody)" stroke="#7A5020" stroke-width="2"/>

  <!-- Belly -->
  <ellipse cx="200" cy="270" rx="28" ry="48" fill="url(#meerBelly)" opacity="0.75"/>

  <!-- Dark back stripe -->
  <rect x="192" y="200" width="16" height="130" rx="6" fill="#7A5020" opacity="0.3"/>

  <!-- Arms (raised lookout pose) -->
  <path d="M162,240 Q130,225 125,250 Q120,268 145,270 Q158,268 165,258 Z" fill="#C4982A" stroke="#7A5020" stroke-width="1.5"/>
  <path d="M238,240 Q270,225 275,250 Q280,268 255,270 Q242,268 235,258 Z" fill="#C4982A" stroke="#7A5020" stroke-width="1.5"/>

  <!-- Hands -->
  <ellipse cx="125" cy="265" rx="10" ry="7" fill="#A07030"/>
  <ellipse cx="275" cy="265" rx="10" ry="7" fill="#A07030"/>

  <!-- Feet -->
  <ellipse cx="176" cy="348" rx="18" ry="8" fill="#A07030" stroke="#7A5020" stroke-width="1.5"/>
  <ellipse cx="224" cy="348" rx="18" ry="8" fill="#A07030" stroke="#7A5020" stroke-width="1.5"/>
  <!-- Claws -->
  <line x1="162" y1="352" x2="158" y2="358" stroke="#6B4010" stroke-width="1.5"/>
  <line x1="170" y1="354" x2="168" y2="360" stroke="#6B4010" stroke-width="1.5"/>
  <line x1="210" y1="352" x2="206" y2="358" stroke="#6B4010" stroke-width="1.5"/>
  <line x1="218" y1="354" x2="216" y2="360" stroke="#6B4010" stroke-width="1.5"/>

  <!-- Neck -->
  <rect x="178" y="178" width="44" height="28" rx="14" fill="#C4982A" stroke="#7A5020" stroke-width="1.5"/>

  <!-- Head -->
  <ellipse cx="200" cy="158" rx="48" ry="46" fill="url(#meerBody)" stroke="#7A5020" stroke-width="2"/>

  <!-- Face mask (dark markings) -->
  <ellipse cx="200" cy="162" rx="36" ry="32" fill="#C8A058" opacity="0.4"/>

  <!-- Ears -->
  <ellipse cx="162" cy="128" rx="12" ry="16" fill="#C4982A" stroke="#7A5020" stroke-width="1.5"/>
  <ellipse cx="238" cy="128" rx="12" ry="16" fill="#C4982A" stroke="#7A5020" stroke-width="1.5"/>
  <ellipse cx="162" cy="128" rx="7" ry="10" fill="#D4887A" opacity="0.6"/>
  <ellipse cx="238" cy="128" rx="7" ry="10" fill="#D4887A" opacity="0.6"/>

  <!-- Dark eye patches -->
  <ellipse cx="182" cy="158" rx="14" ry="12" fill="#4A3010" opacity="0.5"/>
  <ellipse cx="218" cy="158" rx="14" ry="12" fill="#4A3010" opacity="0.5"/>

  <!-- Eyes -->
  <circle cx="182" cy="158" r="9" fill="#1A1008"/>
  <circle cx="218" cy="158" r="9" fill="#1A1008"/>
  <circle cx="185" cy="155" r="3" fill="white"/>
  <circle cx="221" cy="155" r="3" fill="white"/>

  <!-- Nose -->
  <ellipse cx="200" cy="178" rx="7" ry="5" fill="#2C1808"/>

  <!-- Muzzle -->
  <ellipse cx="200" cy="182" rx="16" ry="11" fill="#D4A858" opacity="0.6"/>

  <!-- Mouth -->
  <path d="M194,185 Q200,191 206,185" fill="none" stroke="#7A5020" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="168" y1="180" x2="188" y2="182" stroke="#5A3808" stroke-width="1" opacity="0.7"/>
  <line x1="212" y1="182" x2="232" y2="180" stroke="#5A3808" stroke-width="1" opacity="0.7"/>

  <!-- Alert eye shine highlight -->
  <circle cx="186" cy="156" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="222" cy="156" r="1.5" fill="white" opacity="0.8"/>
</svg>
