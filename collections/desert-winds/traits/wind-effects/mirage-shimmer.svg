<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Heat Mirage Shimmer Effect Trait -->
  <defs>
    <linearGradient id="mirageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A8E0F0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C8F0FF" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- Heat distortion waves near ground -->
  <path d="M0,330 Q50,322 100,332 Q150,342 200,330 Q250,318 300,332 Q350,342 400,330"
        fill="none" stroke="#87CEEB" stroke-width="3" opacity="0.4" filter="url(#blur)"/>
  <path d="M0,345 Q50,337 100,347 Q150,357 200,345 Q250,333 300,347 Q350,357 400,345"
        fill="none" stroke="#87CEEB" stroke-width="2.5" opacity="0.35" filter="url(#blur)"/>
  <path d="M0,358 Q50,350 100,360 Q150,370 200,358 Q250,346 300,360 Q350,370 400,358"
        fill="none" stroke="#A8E0F0" stroke-width="2" opacity="0.3" filter="url(#blur)"/>

  <!-- Mirage water pool illusion -->
  <ellipse cx="200" cy="368" rx="130" ry="18" fill="url(#mirageGrad)" filter="url(#blur)"/>
  <ellipse cx="200" cy="372" rx="100" ry="12" fill="#87CEEB" opacity="0.15" filter="url(#blur)"/>

  <!-- Sky reflections in mirage -->
  <path d="M100,368 Q140,355 180,368" fill="none" stroke="#87CEEB" stroke-width="1.5" opacity="0.3" filter="url(#blur)"/>
  <path d="M220,368 Q260,355 300,368" fill="none" stroke="#87CEEB" stroke-width="1.5" opacity="0.3" filter="url(#blur)"/>

  <!-- Heat shimmer verticals (rising hot air) -->
  <path d="M80,320 Q78,300 82,280 Q86,260 80,240" fill="none" stroke="#F0E0A0" stroke-width="2" opacity="0.2" filter="url(#blur)"/>
  <path d="M150,315 Q148,295 153,272 Q157,250 152,228" fill="none" stroke="#F0E0A0" stroke-width="2.5" opacity="0.18" filter="url(#blur)"/>
  <path d="M200,318 Q198,295 202,270 Q206,248 200,225" fill="none" stroke="#F0E0A0" stroke-width="2" opacity="0.2" filter="url(#blur)"/>
  <path d="M250,315 Q252,292 248,268 Q244,245 250,222" fill="none" stroke="#F0E0A0" stroke-width="2.5" opacity="0.18" filter="url(#blur)"/>
  <path d="M320,320 Q322,300 318,278 Q314,256 320,235" fill="none" stroke="#F0E0A0" stroke-width="2" opacity="0.2" filter="url(#blur)"/>

  <!-- Distant shimmer blobs -->
  <ellipse cx="120" cy="305" rx="30" ry="8" fill="#87CEEB" opacity="0.15" filter="url(#blur)"/>
  <ellipse cx="280" cy="298" rx="40" ry="8" fill="#A8E0F0" opacity="0.12" filter="url(#blur)"/>
</svg>
