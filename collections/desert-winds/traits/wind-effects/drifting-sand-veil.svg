<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Drifting Sand Veil Trait -->
  <defs>
    <linearGradient id="veilGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A840" stop-opacity="0"/>
      <stop offset="30%" stop-color="#C89030" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#D4A840" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E0B050" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Main veil band -->
