  <path d="M182,175 Q200,165 218,175 Q235,185 230,210 Q225,230 200,235 Q175,230 170,210 Q165,190 182,175 Z"
        fill="none" stroke="#D4A840" stroke-width="3" opacity="0.5"/>
  <path d="M168,210 Q200,195 232,210 Q248,240 232,270 Q200,282 168,270 Q152,240 168,210 Z"
        fill="none" stroke="#C89030" stroke-width="2.5" opacity="0.45"/>
  <path d="M152,270 Q200,252 248,270 Q268,308 248,345 Q200,362 152,345 Q132,308 152,270 Z"
