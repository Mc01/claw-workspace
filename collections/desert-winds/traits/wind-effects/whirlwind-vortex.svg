<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Whirlwind / Dust Devil Vortex Trait -->
  <defs>
    <linearGradient id="vortexGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#C89030" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E0B050" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Vortex funnel shape -->
  <path d="M175,380 Q160,320 140,260 Q125,210 110,170 Q100,145 115,125 Q130,108 155,115 Q175,120 185,140 Q192,155 188,175"
