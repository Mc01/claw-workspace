  <rect x="262" y="180" width="6" height="4" rx="1" fill="#A07020" opacity="0.3" transform="rotate(-20,265,182)"/>
  <rect x="145" y="235" width="9" height="5" rx="1" fill="#8B5E18" opacity="0.35" transform="rotate(40,149,237)"/>
  <rect x="248" y="250" width="7" height="4" rx="1" fill="#A07020" opacity="0.3" transform="rotate(-35,251,252)"/>
  <circle cx="172" cy="192" r="3" fill="#C89030" opacity="0.5"/>
  <circle cx="228" cy="200" r="2.5" fill="#D4A840" opacity="0.45"/>
  <circle cx="165" cy="300" r="3" fill="#C89030" opacity="0.4"/>
  <circle cx="235" cy="320" r="2" fill="#D4A840" opacity="0.4"/>

