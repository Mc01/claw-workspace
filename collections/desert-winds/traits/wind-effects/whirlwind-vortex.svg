  <path d="M225,380 Q240,320 260,260 Q275,210 290,170 Q300,145 285,125 Q270,108 245,115 Q225,120 215,140 Q208,155 212,175"
        fill="none" stroke="#C89030" stroke-width="22" opacity="0.35" stroke-linecap="round"/>

