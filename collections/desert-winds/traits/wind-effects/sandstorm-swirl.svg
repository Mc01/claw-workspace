<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Sandstorm Swirl Wind Effect Trait -->
  <defs>
    <radialGradient id="stormGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A040" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C89030" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Spiral sandstorm arms -->
  <path d="M200,200 Q280,150 320,200 Q360,250 300,310 Q240,370 160,340 Q80,310 60,230 Q40,150 110,100 Q180,50 260,80 Q320,100 350,160"
        fill="none" stroke="#D4A040" stroke-width="18" opacity="0.3" stroke-linecap="round"/>
  <path d="M200,200 Q260,170 290,210 Q320,250 280,300 Q240,350 180,330 Q120,310 100,250 Q80,190 130,148 Q180,106 240,130"
        fill="none" stroke="#C89030" stroke-width="12" opacity="0.35" stroke-linecap="round"/>
  <path d="M200,200 Q245,185 262,218 Q280,250 255,288 Q228,325 190,312 Q152,298 140,265 Q128,232 155,208 Q180,185 210,195"
        fill="none" stroke="#E0B050" stroke-width="8" opacity="0.4" stroke-linecap="round"/>
  <!-- Sand particles -->
  <circle cx="160" cy="120" r="3" fill="#D4A040" opacity="0.5"/>
  <circle cx="310" cy="180" r="2.5" fill="#C89030" opacity="0.5"/>
  <circle cx="280" cy="330" r="3" fill="#D4A040" opacity="0.45"/>
  <circle cx="85" cy="260" r="2.5" fill="#C89030" opacity="0.5"/>
  <circle cx="340" cy="280" r="2" fill="#D4A040" opacity="0.4"/>
  <circle cx="120" cy="155" r="2" fill="#C89030" opacity="0.45"/>
  <circle cx="245" cy="65" r="3" fill="#D4A040" opacity="0.45"/>
  <!-- Fine particles -->
  <circle cx="185" cy="88" r="1.5" fill="#D4A040" opacity="0.4"/>
  <circle cx="355" cy="220" r="1.5" fill="#C89030" opacity="0.4"/>
  <circle cx="48" cy="310" r="1.5" fill="#D4A040" opacity="0.35"/>
  <!-- Center eye of storm -->
  <circle cx="200" cy="200" r="25" fill="url(#stormGrad)"/>
</svg>
