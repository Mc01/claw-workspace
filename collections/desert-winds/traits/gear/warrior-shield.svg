<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Desert Warrior Shield Trait -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5E18"/>
      <stop offset="100%" stop-color="#5A3808"/>
    </linearGradient>
    <radialGradient id="shieldCenter" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#A07020"/>
      <stop offset="100%" stop-color="#6A4510"/>
    </radialGradient>
  </defs>
  <!-- Shield body -->
  <path d="M200,60 Q270,75 310,120 Q340,165 330,230 Q318,295 200,360 Q82,295 70,230 Q60,165 90,120 Q130,75 200,60 Z"
        fill="url(#shieldGrad)" stroke="#3A2008" stroke-width="3"/>
  <!-- Shield face -->
  <path d="M200,80 Q258,93 292,130 Q316,168 308,224 Q298,282 200,338 Q102,282 92,224 Q84,168 108,130 Q142,93 200,80 Z"
        fill="url(#shieldCenter)"/>
  <!-- Berber sun motif center -->
  <circle cx="200" cy="200" r="50" fill="none" stroke="#D4A030" stroke-width="3"/>
  <circle cx="200" cy="200" r="35" fill="#C89020" opacity="0.4"/>
  <!-- Sun rays on shield -->
  <g transform="translate(200,200)" opacity="0.7">
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="#D4A030" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="#D4A030" stroke-width="3" stroke-linecap="round" transform="rotate(45)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="#D4A030" stroke-width="3" stroke-linecap="round" transform="rotate(90)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="#D4A030" stroke-width="3" stroke-linecap="round" transform="rotate(135)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="#D4A030" stroke-width="3" stroke-linecap="round" transform="rotate(180)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="#D4A030" stroke-width="3" stroke-linecap="round" transform="rotate(225)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="#D4A030" stroke-width="3" stroke-linecap="round" transform="rotate(270)"/>
    <line x1="0" y1="-55" x2="0" y2="-75" stroke="#D4A030" stroke-width="3" stroke-linecap="round" transform="rotate(315)"/>
  </g>
  <!-- Center boss -->
  <circle cx="200" cy="200" r="20" fill="#D4A030" stroke="#8B6010" stroke-width="2"/>
  <circle cx="200" cy="200" r="12" fill="#F0D060"/>
  <!-- Turquoise inlays -->
  <circle cx="200" cy="130" r="8" fill="#3AB8C8" stroke="#2A8898" stroke-width="1.5"/>
  <circle cx="200" cy="270" r="8" fill="#3AB8C8" stroke="#2A8898" stroke-width="1.5"/>
  <circle cx="130" cy="200" r="8" fill="#3AB8C8" stroke="#2A8898" stroke-width="1.5"/>
  <circle cx="270" cy="200" r="8" fill="#3AB8C8" stroke="#2A8898" stroke-width="1.5"/>
  <!-- Corner red inlays -->
  <circle cx="160" cy="155" r="6" fill="#C83020" stroke="#8B2010" stroke-width="1"/>
  <circle cx="240" cy="155" r="6" fill="#C83020" stroke="#8B2010" stroke-width="1"/>
  <circle cx="160" cy="245" r="6" fill="#C83020" stroke="#8B2010" stroke-width="1"/>
  <circle cx="240" cy="245" r="6" fill="#C83020" stroke="#8B2010" stroke-width="1"/>
  <!-- Rim detail -->
  <path d="M200,60 Q270,75 310,120 Q340,165 330,230 Q318,295 200,360 Q82,295 70,230 Q60,165 90,120 Q130,75 200,60 Z"
        fill="none" stroke="#D4A030" stroke-width="2" opacity="0.4"/>
</svg>
