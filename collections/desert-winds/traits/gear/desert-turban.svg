      <stop offset="0%" stop-color="#1A4A7A"/>
      <stop offset="100%" stop-color="#0D2E50"/>
    </linearGradient>
  </defs>
  <!-- Main turban wrap -->
  <path d="M120,180 Q100,140 115,105 Q135,65 200,55 Q265,45 290,85 Q315,120 300,165 Q285,155 265,150 Q240,145 215,148 Q185,150 160,158 Q140,165 120,180 Z"
