  <path d="M118,155 Q132,115 170,98 Q210,80 255,90 Q282,98 296,128"
        fill="none" stroke="#2A6AAA" stroke-width="4" opacity="0.3"/>
  <!-- Tagelmust face veil hanging part -->
  <path d="M120,178 Q108,195 106,220 Q104,245 115,260 Q110,258 105,270 Q100,282 108,295 Q102,292 100,305"
        fill="none" stroke="#1A4A7A" stroke-width="18" stroke-linecap="round" opacity="0.85"/>
  <path d="M120,178 Q108,195 106,220 Q104,245 115,260 Q110,258 105,270 Q100,282 108,295"
        fill="none" stroke="#2A5A8A" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <!-- Wrap folds -->
  <path d="M130,90 Q145,80 165,78" fill="none" stroke="#3A7ABB" stroke-width="2.5" opacity="0.4"/>
  <path d="M200,60 Q220,56 240,62" fill="none" stroke="#3A7ABB" stroke-width="2" opacity="0.35"/>
  <!-- Gold trim -->
  <path d="M118,160 Q200,145 295,158" fill="none" stroke="#D4A030" stroke-width="2" opacity="0.6"/>
  <path d="M122,170 Q200,155 298,168" fill="none" stroke="#D4A030" stroke-width="1.5" opacity="0.4"/>
