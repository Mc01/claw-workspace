<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Sun Scarab (Khepri) Trait -->
  <defs>
    <radialGradient id="scarabGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1A6A3A"/>
      <stop offset="100%" stop-color="#0A3A1A"/>
    </radialGradient>
    <radialGradient id="sunBall" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF080"/>
      <stop offset="100%" stop-color="#E0A020"/>
    </radialGradient>
  </defs>
  <!-- Sun ball being pushed -->
  <circle cx="200" cy="105" r="45" fill="url(#sunBall)" stroke="#C88010" stroke-width="2"/>
  <!-- Sun rays -->
  <g transform="translate(200,105)" opacity="0.6">
    <line x1="0" y1="-52" x2="0" y2="-68" stroke="#F0C030" stroke-width="2.5" stroke-linecap="round" transform="rotate(0)"/>
    <line x1="0" y1="-52" x2="0" y2="-68" stroke="#F0C030" stroke-width="2.5" stroke-linecap="round" transform="rotate(45)"/>
    <line x1="0" y1="-52" x2="0" y2="-68" stroke="#F0C030" stroke-width="2.5" stroke-linecap="round" transform="rotate(90)"/>
    <line x1="0" y1="-52" x2="0" y2="-68" stroke="#F0C030" stroke-width="2.5" stroke-linecap="round" transform="rotate(135)"/>
    <line x1="0" y1="-52" x2="0" y2="-68" stroke="#F0C030" stroke-width="2.5" stroke-linecap="round" transform="rotate(180)"/>
    <line x1="0" y1="-52" x2="0" y2="-68" stroke="#F0C030" stroke-width="2.5" stroke-linecap="round" transform="rotate(225)"/>
    <line x1="0" y1="-52" x2="0" y2="-68" stroke="#F0C030" stroke-width="2.5" stroke-linecap="round" transform="rotate(270)"/>
    <line x1="0" y1="-52" x2="0" y2="-68" stroke="#F0C030" stroke-width="2.5" stroke-linecap="round" transform="rotate(315)"/>
  </g>

  <!-- Scarab body -->
  <ellipse cx="200" cy="255" rx="70" ry="82" fill="url(#scarabGrad)" stroke="#0A3010" stroke-width="2"/>
  <!-- Wing cases (elytra) line -->
  <line x1="200" y1="185" x2="200" y2="335" stroke="#1A5A2A" stroke-width="2" opacity="0.5"/>
  <!-- Abdomen segments -->
  <path d="M135,230 Q200,222 265,230" fill="none" stroke="#2A7A3A" stroke-width="1.5" opacity="0.5"/>
  <path d="M132,248 Q200,240 268,248" fill="none" stroke="#2A7A3A" stroke-width="1.5" opacity="0.5"/>
  <path d="M133,266 Q200,258 267,266" fill="none" stroke="#2A7A3A" stroke-width="1.5" opacity="0.5"/>
  <path d="M136,284 Q200,276 264,284" fill="none" stroke="#2A7A3A" stroke-width="1.5" opacity="0.5"/>
  <path d="M140,302 Q200,294 260,302" fill="none" stroke="#2A7A3A" stroke-width="1.5" opacity="0.5"/>

  <!-- Head -->
  <ellipse cx="200" cy="185" rx="35" ry="22" fill="#1A6A3A" stroke="#0A3010" stroke-width="1.5"/>
  <!-- Head horns -->
  <path d="M180,178 Q168,158 160,145" fill="none" stroke="#1A6A3A" stroke-width="6" stroke-linecap="round"/>
  <path d="M190,176 Q182,155 178,140" fill="none" stroke="#1A6A3A" stroke-width="5" stroke-linecap="round"/>
  <path d="M200,175 Q200,152 200,138" fill="none" stroke="#1A6A3A" stroke-width="5" stroke-linecap="round"/>
  <path d="M210,176 Q218,155 222,140" fill="none" stroke="#1A6A3A" stroke-width="5" stroke-linecap="round"/>
  <path d="M220,178 Q232,158 240,145" fill="none" stroke="#1A6A3A" stroke-width="6" stroke-linecap="round"/>

  <!-- Legs (3 pairs) -->
  <path d="M135,220 Q110,215 90,205" fill="none" stroke="#0A3010" stroke-width="5" stroke-linecap="round"/>
  <path d="M133,248 Q108,248 88,242" fill="none" stroke="#0A3010" stroke-width="5" stroke-linecap="round"/>
  <path d="M135,275 Q112,278 92,275" fill="none" stroke="#0A3010" stroke-width="5" stroke-linecap="round"/>
  <path d="M265,220 Q290,215 310,205" fill="none" stroke="#0A3010" stroke-width="5" stroke-linecap="round"/>
  <path d="M267,248 Q292,248 312,242" fill="none" stroke="#0A3010" stroke-width="5" stroke-linecap="round"/>
  <path d="M265,275 Q288,278 308,275" fill="none" stroke="#0A3010" stroke-width="5" stroke-linecap="round"/>
</svg>
