<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Sunbeam Aura Around Character Trait -->
  <defs>
    <radialGradient id="auraGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F8E060" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#E09020" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C06010" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Aura glow -->
  <circle cx="200" cy="200" r="185" fill="url(#auraGrad)"/>
