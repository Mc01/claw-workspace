<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Desert Sunrise Background Trait -->
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="45%" stop-color="#F0C060"/>
      <stop offset="70%" stop-color="#E07030"/>
      <stop offset="100%" stop-color="#C05020"/>
    </linearGradient>
    <radialGradient id="sunRise" cx="50%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#FFF080"/>
      <stop offset="50%" stop-color="#F0A020" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#E06010" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky gradient -->
  <rect width="400" height="400" fill="url(#skyGrad)" opacity="0.35"/>
  <!-- Sun glow at horizon -->
  <ellipse cx="200" cy="295" rx="160" ry="100" fill="url(#sunRise)"/>
  <!-- Sun disc at horizon -->
  <ellipse cx="200" cy="298" rx="55" ry="30" fill="#FFE060" opacity="0.7"/>
  <!-- Horizon dune silhouette -->
  <path d="M0,320 Q50,290 100,305 Q150,318 200,300 Q250,282 300,305 Q350,320 400,295 L400,400 L0,400 Z"
        fill="#8B5818" opacity="0.5"/>
  <path d="M0,350 Q80,330 160,345 Q240,360 320,340 Q370,330 400,345 L400,400 L0,400 Z"
        fill="#A07030" opacity="0.4"/>
  <!-- Light rays from sun -->
  <path d="M200,295 L100,200" stroke="#F0C040" stroke-width="1.5" opacity="0.2"/>
  <path d="M200,295 L150,180" stroke="#F0C040" stroke-width="1.5" opacity="0.25"/>
  <path d="M200,295 L200,160" stroke="#F0C040" stroke-width="1.5" opacity="0.3"/>
  <path d="M200,295 L250,180" stroke="#F0C040" stroke-width="1.5" opacity="0.25"/>
  <path d="M200,295 L300,200" stroke="#F0C040" stroke-width="1.5" opacity="0.2"/>
</svg>
