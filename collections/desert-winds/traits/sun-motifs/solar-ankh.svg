<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Solar Ankh Trait -->
  <defs>
    <linearGradient id="ankhGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D060"/>
      <stop offset="100%" stop-color="#C08020"/>
    </linearGradient>
  </defs>
  <!-- Ankh loop (top) -->
  <ellipse cx="200" cy="148" rx="52" ry="62" fill="none" stroke="url(#ankhGrad)" stroke-width="14"/>
  <ellipse cx="200" cy="148" rx="52" ry="62" fill="none" stroke="#F8E080" stroke-width="6" opacity="0.4"/>

  <!-- Cross horizontal bar -->
  <rect x="128" y="202" width="144" height="18" rx="7" fill="url(#ankhGrad)"/>
  <rect x="128" y="205" width="144" height="8" rx="3" fill="#F8E080" opacity="0.3"/>

  <!-- Cross vertical stem -->
  <rect x="189" y="212" width="22" height="130" rx="8" fill="url(#ankhGrad)"/>
  <rect x="193" y="215" width="10" height="120" rx="4" fill="#F8E080" opacity="0.3"/>

  <!-- Center solar disc -->
  <circle cx="200" cy="148" r="22" fill="#F8E080" opacity="0.3"/>
  <circle cx="200" cy="148" r="14" fill="#E0A820"/>

  <!-- Decorative notches on crossbar -->
  <rect x="140" y="204" width="6" height="14" rx="2" fill="#8B5E10"/>
  <rect x="155" y="204" width="6" height="14" rx="2" fill="#8B5E10"/>
  <rect x="239" y="204" width="6" height="14" rx="2" fill="#8B5E10"/>
  <rect x="254" y="204" width="6" height="14" rx="2" fill="#8B5E10"/>

  <!-- Glow effect -->
  <ellipse cx="200" cy="148" rx="30" ry="30" fill="#F8E060" opacity="0.12"/>
</svg>
