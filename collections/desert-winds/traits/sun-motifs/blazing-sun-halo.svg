<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Blazing Sun Halo Trait -->
  <defs>
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF0A0"/>
      <stop offset="40%" stop-color="#F0C030"/>
      <stop offset="100%" stop-color="#E07010" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F8D040" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E08010" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="200" cy="110" r="120" fill="url(#sunGlow)"/>
  <!-- Sun rays -->
  <g transform="translate(200,110)">
    <!-- 12 major rays -->
    <line x1="0" y1="-70" x2="0" y2="-105" stroke="#F0C030" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="-70" x2="0" y2="-105" stroke="#F0C030" stroke-width="4" stroke-linecap="round" opacity="0.8" transform="rotate(30)"/>
    <line x1="0" y1="-70" x2="0" y2="-105" stroke="#F0C030" stroke-width="4" stroke-linecap="round" opacity="0.8" transform="rotate(60)"/>
    <line x1="0" y1="-70" x2="0" y2="-105" stroke="#F0C030" stroke-width="4" stroke-linecap="round" opacity="0.8" transform="rotate(90)"/>
    <line x1="0" y1="-70" x2="0" y2="-105" stroke="#F0C030" stroke-width="4" stroke-linecap="round" opacity="0.8" transform="rotate(120)"/>
    <line x1="0" y1="-70" x2="0" y2="-105" stroke="#F0C030" stroke-width="4" stroke-linecap="round" opacity="0.8" transform="rotate(150)"/>
    <line x1="0" y1="-70" x2="0" y2="-105" stroke="#F0C030" stroke-width="4" stroke-linecap="round" opacity="0.8" transform="rotate(180)"/>
    <line x1="0" y1="-70" x2="0" y2="-105" stroke="#F0C030" stroke-width="4" stroke-linecap="round" opacity="0.8" transform="rotate(210)"/>
    <line x1="0" y1="-70" x2="0" y2="-105" stroke="#F0C030" stroke-width="4" stroke-linecap="round" opacity="0.8" transform="rotate(240)"/>
    <line x1="0" y1="-70" x2="0" y2="-105" stroke="#F0C030" stroke-width="4" stroke-linecap="round" opacity="0.8" transform="rotate(270)"/>
    <line x1="0" y1="-70" x2="0" y2="-105" stroke="#F0C030" stroke-width="4" stroke-linecap="round" opacity="0.8" transform="rotate(300)"/>
    <line x1="0" y1="-70" x2="0" y2="-105" stroke="#F0C030" stroke-width="4" stroke-linecap="round" opacity="0.8" transform="rotate(330)"/>
    <!-- 12 minor rays -->
    <line x1="0" y1="-65" x2="0" y2="-88" stroke="#E0A820" stroke-width="2" stroke-linecap="round" opacity="0.6" transform="rotate(15)"/>
    <line x1="0" y1="-65" x2="0" y2="-88" stroke="#E0A820" stroke-width="2" stroke-linecap="round" opacity="0.6" transform="rotate(45)"/>
    <line x1="0" y1="-65" x2="0" y2="-88" stroke="#E0A820" stroke-width="2" stroke-linecap="round" opacity="0.6" transform="rotate(75)"/>
    <line x1="0" y1="-65" x2="0" y2="-88" stroke="#E0A820" stroke-width="2" stroke-linecap="round" opacity="0.6" transform="rotate(105)"/>
    <line x1="0" y1="-65" x2="0" y2="-88" stroke="#E0A820" stroke-width="2" stroke-linecap="round" opacity="0.6" transform="rotate(135)"/>
    <line x1="0" y1="-65" x2="0" y2="-88" stroke="#E0A820" stroke-width="2" stroke-linecap="round" opacity="0.6" transform="rotate(165)"/>
    <line x1="0" y1="-65" x2="0" y2="-88" stroke="#E0A820" stroke-width="2" stroke-linecap="round" opacity="0.6" transform="rotate(195)"/>
    <line x1="0" y1="-65" x2="0" y2="-88" stroke="#E0A820" stroke-width="2" stroke-linecap="round" opacity="0.6" transform="rotate(225)"/>
    <line x1="0" y1="-65" x2="0" y2="-88" stroke="#E0A820" stroke-width="2" stroke-linecap="round" opacity="0.6" transform="rotate(255)"/>
    <line x1="0" y1="-65" x2="0" y2="-88" stroke="#E0A820" stroke-width="2" stroke-linecap="round" opacity="0.6" transform="rotate(285)"/>
    <line x1="0" y1="-65" x2="0" y2="-88" stroke="#E0A820" stroke-width="2" stroke-linecap="round" opacity="0.6" transform="rotate(315)"/>
    <line x1="0" y1="-65" x2="0" y2="-88" stroke="#E0A820" stroke-width="2" stroke-linecap="round" opacity="0.6" transform="rotate(345)"/>
  </g>
  <!-- Sun disc -->
  <circle cx="200" cy="110" r="62" fill="url(#sunCore)" stroke="#E08010" stroke-width="2"/>
  <!-- Inner ring -->
  <circle cx="200" cy="110" r="48" fill="none" stroke="#F0D060" stroke-width="2" opacity="0.5"/>
  <!-- Eye of the sun (Egyptian Ra motif) -->
  <ellipse cx="200" cy="110" rx="18" ry="12" fill="#E07010" opacity="0.6"/>
  <circle cx="200" cy="110" r="7" fill="#FFF0A0" opacity="0.8"/>
</svg>
