<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Trait: Dried Riverbed - mud-textures (dry season cracked earth) -->
  <defs>
    <linearGradient id="dryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9A7A50"/>
      <stop offset="100%" stop-color="#6A5030"/>
    </linearGradient>
  </defs>
  <!-- Cracked ground -->
  <rect x="0" y="300" width="400" height="100" fill="url(#dryGrad)"/>

