  <ellipse cx="235" cy="285" rx="38" ry="22" fill="url(#plateGrad)" stroke="#2A1808" stroke-width="2"/>

  <!-- Plate shine (dried mud highlights) -->
  <path d="M115 182 Q125 178 135 183" fill="none" stroke="#8B7058" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <path d="M260 182 Q270 178 280 183" fill="none" stroke="#8B7058" stroke-width="2.5" opacity="0.6" stroke-linecap="round"/>
  <path d="M168 224 Q200 220 232 224" fill="none" stroke="#8B7058" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
