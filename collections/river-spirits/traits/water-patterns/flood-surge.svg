<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Trait: Flood Surge - water-patterns (annual Nile flood) -->
  <defs>
    <linearGradient id="surgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A8BA8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1A4E68" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Flood water mass -->
  <path d="M0 310 Q50 295 100 305 Q150 315 200 300 Q250 285 300 298 Q350 310 400 295 L400 400 L0 400Z" fill="url(#surgeGrad)"/>
  <!-- Wave crests -->
  <path d="M0 310 Q50 295 100 305 Q150 315 200 300 Q250 285 300 298 Q350 310 400 295" fill="none" stroke="#7AC8E8" stroke-width="3" opacity="0.7"/>
  <path d="M0 325 Q60 312 120 322 Q180 332 240 318 Q300 304 360 315 Q385 320 400 313" fill="none" stroke="#5AB0D0" stroke-width="2" opacity="0.6"/>
  <!-- Debris -->
  <rect x="80" y="300" width="18" height="6" rx="3" fill="#6B4A2A" opacity="0.6" transform="rotate(-8 80 300)"/>
  <rect x="220" y="292" width="22" height="5" rx="3" fill="#6B4A2A" opacity="0.5" transform="rotate(5 220 292)"/>
  <rect x="330" y="299" width="15" height="5" rx="3" fill="#6B4A2A" opacity="0.6" transform="rotate(-3 330 299)"/>
  <!-- Foam -->
  <ellipse cx="160" cy="304" rx="12" ry="5" fill="white" opacity="0.4"/>
  <ellipse cx="270" cy="296" rx="10" ry="4" fill="white" opacity="0.35"/>
</svg>
