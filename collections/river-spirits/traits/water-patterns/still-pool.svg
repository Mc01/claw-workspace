<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Trait: Still Pool - water-patterns -->
  <defs>
    <radialGradient id="poolGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A8AB8" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#1A6A90" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0D4260" stop-opacity="0.85"/>
    </radialGradient>
  </defs>
  <!-- Still pool surface -->
  <ellipse cx="200" cy="330" rx="175" ry="55" fill="url(#poolGrad)"/>
  <!-- Sky reflection -->
  <ellipse cx="200" cy="325" rx="90" ry="25" fill="#A8D8F0" opacity="0.25"/>
  <!-- Reflection ripple rings (tiny) -->
  <ellipse cx="200" cy="330" rx="30" ry="8" fill="none" stroke="#3AA0C8" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="200" cy="330" rx="55" ry="14" fill="none" stroke="#3AA0C8" stroke-width="1" opacity="0.3"/>
  <!-- Water strider tracks -->
  <circle cx="155" cy="322" r="3.5" fill="none" stroke="#2A8AB8" stroke-width="1.5" opacity="0.5"/>
  <circle cx="245" cy="326" r="3.5" fill="none" stroke="#2A8AB8" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="318" r="3" fill="none" stroke="#2A8AB8" stroke-width="1.5" opacity="0.4"/>
</svg>
